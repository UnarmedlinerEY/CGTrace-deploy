          return (
            <div key={c.id} style={{ fontSize:11.5, color:"#F3E3BD", lineHeight:1.5 }}>
              <span style={{ color:"#E0B86A", marginRight:6 }}>●</span>{c.name}
              <span style={{ color:"#9C7F47", marginLeft:6, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>· synced {pmSince(hrs)}</span>
            </div>
          );
        })}
      </div>

      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
        <button onClick={onViewClients} style={{ background:"none", border:"1px solid rgba(224,184,106,0.35)", color:"#E0B86A", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>View in Client Portfolio List →</button>
      </div>

      <AutopilotPermissionStep newClients={newClients} onAcceptPlan={onAcceptPlan} onViewClients={onViewClients} onCommitReconstruction={onCommitReconstruction} onResetReconstruction={onResetReconstruction}/>

      <div style={{ fontSize:10, color:"#9C7F47", lineHeight:1.5, marginTop:10, paddingTop:10, borderTop:"1px solid rgba(224,184,106,0.20)" }}>
        Detect, Surface &amp; Permission — Autopilot flags these from the sync feed and proposes a plan. Accepting it below plays a scripted (mock) reconstruction — broker API, PDF search, registry scan — for each client, including one real cross-source conflict to resolve before anything commits. No live API calls are made; the underlying source data is pre-authored for this demo, but accepted holdings are written to real app state, and each client's resulting CGT figure is pushed to their linked tax job in Practice Manager at Chain.
      </div>
    </>
  );
}

// Permission-stage UX — plan doc §4 stage 3 ("names the exact next action(s) and asks
// before doing anything"), modelled on an agentic plan/permission-step pattern: shows
// where Autopilot sits in its own task lifecycle, states the proposed next action, and
// waits for an explicit accept/reject/alternative before doing anything. Stage strip
// mirrors the existing 5-stage reconciliation strip's visual pattern (SummaryView's
// WORKFLOW_STAGES) rather than inventing a new one, re-skinned in the Autopilot amber
// palette. Maps onto the master plan's 9-stage lifecycle; "Flag exceptions" is folded
// into "Validate" for an 8-chip strip that still fits the panel width. Sample 1 only —
// the Advisory briefing intentionally skips this (plan doc §7: "no permission/
// orchestration/commit stages... a readout of already-computed truth").
//
// Phase 4 (28 Jun): accepting the DEFAULT plan now runs a real per-client engine —
// AUTOPILOT_RECON_SEEDS plays a scripted but genuine step-reveal (broker API / PDF
// search / registry scan) for each of the newClients, surfaces a Review stage with
// one deliberate cross-source contradiction (Larsen Family Trust's BHP/South32
// demerger), and — once every REVIEW row is resolved — commits real holdings via
// onCommitReconstruction at Chain. Still a scripted demo (no live API calls; see
// AUTOPILOT_RECON_SEEDS above), but the holdings it commits are real app state, not
// just a status message. The two ALTERNATIVES plans intentionally keep the OLD
// generic ticker (no real commit) — a second full reconstruction engine for "just
// one client" / "skip broker API" was excess scope for what the demo needs.
//
// Phase 5 (28 Jun): onCommitReconstruction (App.handleCommitReconstruction) now also
// pushes each client's real FY2025-26 obligation to Practice Manager (pmPushCGT) and
// flips their tax-return job to Synced — see that function's comment for why the
// pushed figure is a genuine $0 for this batch, not a stand-in. No new code needed
// in this component; Chain already calls onCommitReconstruction per client, which is
// the one hook Phase 5 needed.
function AutopilotPermissionStep({ newClients, onAcceptPlan, onViewClients, onCommitReconstruction, onResetReconstruction }) {
  const STAGES = ["Detect","Surface","Permission","Orchestrate","Stitch","Validate","Review","Chain"];
  const [stage, setStage] = useState(2); // already past Detect+Surface by the time this card renders
  const [status, setStatus] = useState(null);
  const [decision, setDecision] = useState(null); // null | "accepted" | "rejected"
  const [altOpen, setAltOpen] = useState(false);
  const [richMode, setRichMode] = useState(false); // true only when the DEFAULT plan (real per-client engine) is running
  const [runLog, setRunLog] = useState([]); // rich mode: flattened {label,src,clientName} steps as they reveal
  const [allRows, setAllRows] = useState([]); // rich mode: flattened review rows across all clients, built once steps finish
  const [resolutions, setResolutions] = useState({}); // rich mode: { [rowId]: chosenOptionKey } for REVIEW rows
  const firstName = newClients[0] ? newClients[0].name : "the first client";

  const DEFAULT_PLAN = {
    label: `Reconstruct portfolios for all ${newClients.length} client${newClients.length===1?"":"s"} using broker statement data + PDF search + corporate-action matching.`,
    steps: [
      `Connecting to broker statement API and searching for client PDF statements for all ${newClients.length} client${newClients.length===1?"":"s"}… (mock)`,
      "Merging broker, PDF, and corporate-action sources into one candidate parcel set per client… (mock)",
      "Running conservation/consistency checks against the merged data… (mock)",
      "Compiling results into a reviewable table… (mock)",
    ],
  };
  const [plan, setPlan] = useState(DEFAULT_PLAN);

  const ALTERNATIVES = [
    { label:`Just ${firstName} — lower risk, faster to review`,
      steps:[
        `Connecting to broker statement API and searching for client PDF statements for ${firstName}… (mock)`,
        "Merging broker, PDF, and corporate-action sources into one candidate parcel set… (mock)",
        "Running conservation/consistency checks against the merged data… (mock)",
        "Compiling results into a reviewable table… (mock)",
      ] },
    { label:"Skip the broker API — PDF search only, flag anything that needs broker data",
      steps:[
        "Searching for client PDF statements only — no broker API call… (mock)",
        "Flagging items that would normally be resolved by broker data… (mock)",
        "Running conservation/consistency checks against the merged data… (mock)",
        "Compiling results into a reviewable table… (mock)",
      ] },
  ];

  // Rich path — DEFAULT_PLAN only. Plays each client's real seed steps in sequence,
  // then surfaces the flattened review rows once every client's steps have run.
  // onAcceptPlan fires later, at Chain (continueToChain) — not here — to match the
  // alternative path's timing (the "plan accepted" signal fires once real work is done).
  function acceptDefault() {
    const queue = newClients.slice();
    setDecision("accepted");
    setRichMode(true);
    setAltOpen(false);
    setRunLog([]);
    setAllRows([]);
    setResolutions({});
    setStage(3); // Orchestrate

    const flatSteps = [];
    queue.forEach(c => {
      const seed = AUTOPILOT_RECON_SEEDS[c.id];
      const steps = seed ? seed.steps : genericReconSteps(c);
      steps.forEach(s => flatSteps.push({ ...s, clientName:c.name }));
    });
    const total = flatSteps.length;

    const advance = (i) => {
      if (i >= total) {
        setStage(5); // Validate
        setStatus("Running conservation/consistency checks across all clients… (mock)");
        setTimeout(() => {
          const rows = [];
          queue.forEach(c => {
            const seed = AUTOPILOT_RECON_SEEDS[c.id];
            if (seed) rows.push(...seed.rows);
            else rows.push({ id:`generic-${c.id}`, clientId:c.id, label:c.name, status:"CONFIRMED",
              source:"—", reason:"No detailed seed data authored for this client in the demo — generic fallback path only." });
          });
          setAllRows(rows);
          setStage(6); // Review
          setStatus(null);
        }, 700);
        return;
      }
      const s = flatSteps[i];
      setRunLog(log => [...log, s]);
      setStage(i < Math.ceil(total / 2) ? 3 : 4); // Orchestrate → Stitch, roughly halfway through
      setTimeout(() => advance(i + 1), s.ms || 800);
    };
    setTimeout(() => advance(0), 700);
  }

  // Old generic path — kept exactly as-is for the two ALTERNATIVES; no real commit.
  function acceptAlternative(p) {
    const acceptedIds = newClients.map(c => c.id); // captured now — closure stays correct even if newClients changes on a later render
    setDecision("accepted");
    setRichMode(false);
    setAltOpen(false);
    setStage(3); // Orchestrate
    setStatus(p.steps[0]);
    let i = 0;
    const tick = () => {
      i++;
      if (i < p.steps.length) {
        setStage(3 + i); // 4 Stitch, 5 Validate, 6 Review
        setStatus(p.steps[i]);
        setTimeout(tick, 900);
      } else {
        setStage(7); // Chain
        setStatus("Mock outcome — this demo doesn't run a live engine past this point. In a real build, you'd review and approve the reconstructed portfolio here before anything commits.");
        // Signal upstream so the Client Portfolio List can show a "Plan accepted (mock)"
        // receipt next to these clients' names — otherwise accepting here leaves zero
        // trace anywhere else in the app (the gap flagged in review).
        if (onAcceptPlan) onAcceptPlan(acceptedIds);
      }
    };
    setTimeout(tick, 900);
  }

  function accept() {
    if (plan === DEFAULT_PLAN) acceptDefault();
    else acceptAlternative(plan);
  }

  function resolveRow(rowId, key) {
    setResolutions(r => ({ ...r, [rowId]: key }));
  }

  function continueToChain() {
    const queue = newClients.slice();
    const acceptedIds = queue.map(c => c.id);
    let holdingsCount = 0;
    let pushedTotal = 0;
    queue.forEach(c => {
      const seed = AUTOPILOT_RECON_SEEDS[c.id];
      if (!seed || !onCommitReconstruction) return;
      const newHoldings = seed.buildHoldings(resolutions);
      holdingsCount += Object.keys(newHoldings).length;
      const pushed = onCommitReconstruction(c.id, newHoldings);
      pushedTotal += pushed || 0;
    });
    setStage(7); // Chain
    // pushedTotal is read back from handleCommitReconstruction's own getClientObligations
    // computation (not re-derived here) — so this line stays accurate whatever the seed
    // data actually produces, rather than hardcoding a $0 or any other outcome.
    const cgtSummary = pushedTotal > 0
      ? `$${pushedTotal.toLocaleString()} combined assessable gain for this batch`
      : `$0 for this batch (cost base recovered, no disposals reconstructed)`;
    setStatus(`Reconstructed and committed ${holdingsCount} holding${holdingsCount===1?"":"s"} across ${queue.length} client${queue.length===1?"":"s"}, and pushed each client's FY2025-26 CGT figure to their linked tax job — ${cgtSummary}, so all ${queue.length} job${queue.length===1?"":"s"} move to Synced on the Tax Obligations tab. Real parcels now appear in the Client Portfolio List.`);
    // Same signal/timing as the alternative path — fires once real work (the commit) is done.
    if (onAcceptPlan) onAcceptPlan(acceptedIds);
  }

  function reject() {
    setDecision("rejected");
    setStatus("Noted — I'll keep flagging these here until you're ready.");
  }

  function chooseAlternative(alt) {
    setPlan(alt);
    setAltOpen(false);
    setDecision(null);
    setStatus(null);
    setStage(2);
  }

  function resetDemo() {
    setDecision(null);
    setRichMode(false);
    setStage(2);
    setStatus(null);
    setPlan(DEFAULT_PLAN);
    setRunLog([]);
    setAllRows([]);
    setResolutions({});
    if (onResetReconstruction) onResetReconstruction();
  }

  const pendingReview = allRows.filter(r => r.status === "REVIEW" && !resolutions[r.id]);

  return (
    <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid rgba(224,184,106,0.20)" }}>
      <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:10 }}>
        {STAGES.map((s,i) => {
          const active = i === stage;
          const done = i < stage;
          return (
            <div key={s} style={{ display:"flex", alignItems:"center", gap:4, padding:"3px 8px", borderRadius:14,
              fontSize:9.5, fontFamily:"'IBM Plex Mono',monospace", fontWeight:active?700:500,
              background: active ? "rgba(224,184,106,0.16)" : (done ? "rgba(224,184,106,0.07)" : "rgba(255,255,255,0.03)"),
              border:`1px solid ${active?"rgba(224,184,106,0.55)":"rgba(224,184,106,0.18)"}`,
              color: active ? "#E0B86A" : (done ? "#C9A35E" : "#6B5A38") }}>
              <span style={{ opacity:0.6 }}>{done?"✓":i+1}</span> {s}
            </div>
          );
        })}
      </div>

      {decision === null && (
        <>
          <div style={{ fontSize:11.5, color:"#F3E3BD", lineHeight:1.5, marginBottom:8 }}>
            <strong>Next step:</strong> {plan.label}
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <button onClick={accept} style={{ background:"linear-gradient(135deg,#E0B86A,#996B0A)", border:"none",
              borderRadius:6, padding:"5px 12px", fontSize:11, fontWeight:600, color:"#1A1308", cursor:"pointer" }}>✓ Accept</button>
            <button onClick={reject} style={{ background:"none", border:"1px solid rgba(224,184,106,0.35)", color:"#E0B86A",
              borderRadius:6, padding:"5px 12px", fontSize:11, cursor:"pointer" }}>Not now</button>
            <button onClick={()=>setAltOpen(o=>!o)} style={{ background:"none", border:"1px solid rgba(224,184,106,0.35)", color:"#C9A35E",
              borderRadius:6, padding:"5px 12px", fontSize:11, cursor:"pointer" }}>{altOpen?"Hide alternatives":"Try a different approach"}</button>
          </div>
          {altOpen && (
            <div style={{ display:"grid", gap:6, marginTop:8 }}>
              {ALTERNATIVES.map((alt,i) => (
                <button key={i} onClick={()=>chooseAlternative(alt)} style={{ textAlign:"left", background:"rgba(255,255,255,0.03)",
                  border:"1px solid rgba(224,184,106,0.20)", borderRadius:6, padding:"6px 10px", fontSize:11, color:"#D8B978", cursor:"pointer" }}>
                  {alt.label}
                </button>
              ))}
            </div>
          )}
        </>
      )}

      {decision === "rejected" && (
        <div style={{ fontSize:11.5, color:"#D8B978" }}>{status}</div>
      )}

      {decision === "accepted" && richMode && (
        <div>
          {stage < 6 && (
            <>
              <div style={{ fontSize:11, color:"#D8B978", lineHeight:1.5, marginBottom:8 }}>{status || "Running…"}</div>
              <div style={{ display:"grid", gap:5, maxHeight:160, overflowY:"auto" }}>
                {runLog.map((s,i) => (
                  <div key={i} style={{ fontSize:10.5, color:"#C9A35E", lineHeight:1.45, display:"flex", gap:6 }}>
                    <span style={{ color:"#6B5A38", flexShrink:0, fontFamily:"'IBM Plex Mono',monospace", fontSize:9.5 }}>[{s.clientName}]</span>
                    <span>{s.label}</span>
                  </div>
                ))}
              </div>
            </>
          )}

          {stage === 6 && (
            <div>
              <div style={{ fontSize:11, color:"#F3E3BD", lineHeight:1.5, marginBottom:8 }}>
                Review the reconstructed parcels below.{" "}
                {pendingReview.length > 0
                  ? <><strong>{pendingReview.length}</strong> item{pendingReview.length===1?"":"s"} need{pendingReview.length===1?"s":""} your call before this can be committed.</>
                  : "Everything's resolved — ready to commit."}
              </div>
              <div style={{ display:"grid", gap:8, marginBottom:10 }}>
                {allRows.map(row => {
                  const client = newClients.find(c => c.id === row.clientId);
                  const resolvedKey = resolutions[row.id];
                  const isReview = row.status === "REVIEW" && !resolvedKey;
                  return (
                    <div key={row.id} style={{ background:"rgba(255,255,255,0.03)",
                      border:`1px solid ${isReview ? "rgba(214,138,60,0.45)" : "rgba(224,184,106,0.18)"}`,
                      borderRadius:8, padding:"8px 10px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", gap:8, marginBottom:3 }}>
                        <span style={{ fontSize:11, fontWeight:600, color:"#F3E3BD" }}>
                          {client ? client.name + " · " : ""}{row.label}
                        </span>
                        <span style={{ fontSize:9, fontFamily:"'IBM Plex Mono',monospace", flexShrink:0, padding:"1px 6px",
                          borderRadius:10, alignSelf:"flex-start",
                          background: isReview ? "rgba(214,138,60,0.18)" : "rgba(120,180,120,0.15)",
                          color: isReview ? "#E0A05A" : "#8FBF8F" }}>
                          {isReview ? "⚠ REVIEW" : (resolvedKey ? "✓ RESOLVED" : "✓ CONFIRMED")}
                        </span>
                      </div>
                      {row.source && <div style={{ fontSize:10, color:"#9C7F47", marginBottom:3 }}>{row.source}</div>}
                      <div style={{ fontSize:10.5, color:"#C9A35E", lineHeight:1.45 }}>{row.reason}</div>
                      {isReview && (
                        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:7 }}>
                          <button onClick={()=>resolveRow(row.id, row.optionA.key)} style={{ background:"rgba(224,184,106,0.14)",
                            border:"1px solid rgba(224,184,106,0.35)", color:"#E0B86A", borderRadius:6, padding:"3px 9px", fontSize:10.5, cursor:"pointer" }}>{row.optionA.label}</button>
                          <button onClick={()=>resolveRow(row.id, row.optionB.key)} style={{ background:"none",
                            border:"1px solid rgba(224,184,106,0.25)", color:"#C9A35E", borderRadius:6, padding:"3px 9px", fontSize:10.5, cursor:"pointer" }}>{row.optionB.label}</button>
                        </div>
                      )}
                      {resolvedKey && (
                        <div style={{ fontSize:10, color:"#6B9B6B", marginTop:5 }}>
                          ✓ Resolved — {resolvedKey === row.optionA.key ? row.optionA.label : row.optionB.label}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              <button onClick={continueToChain} disabled={pendingReview.length > 0} style={{
                background: pendingReview.length > 0 ? "rgba(224,184,106,0.10)" : "linear-gradient(135deg,#E0B86A,#996B0A)",
                border:"none", borderRadius:6, padding:"6px 14px", fontSize:11, fontWeight:600,
                color: pendingReview.length > 0 ? "#6B5A38" : "#1A1308",
                cursor: pendingReview.length > 0 ? "not-allowed" : "pointer" }}>
                {pendingReview.length > 0 ? "Resolve all items to continue" : "Continue to Chain →"}
              </button>
            </div>
          )}

          {stage === 7 && (
            <div>
              <div style={{ fontSize:11.5, color:"#9C7F47", lineHeight:1.5 }}>{status}</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:8 }}>
                {onViewClients && (
                  <button onClick={onViewClients} style={{ background:"none", border:"1px solid rgba(224,184,106,0.35)",
                    color:"#E0B86A", borderRadius:6, padding:"4px 10px", fontSize:10.5, cursor:"pointer" }}>View updated portfolios →</button>
                )}
                <button onClick={resetDemo} style={{ background:"none",
                  border:"1px solid rgba(224,184,106,0.30)", color:"#C9A35E", borderRadius:6, padding:"4px 10px", fontSize:10.5, cursor:"pointer" }}>↺ Reset demo</button>
              </div>
            </div>
          )}
        </div>
      )}

      {decision === "accepted" && !richMode && (
        <div>
          <div style={{ fontSize:11.5, color: stage===7 ? "#9C7F47" : "#F3E3BD", lineHeight:1.5 }}>{status}</div>
          {stage===7 && (
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:8 }}>
              {onViewClients && (
                <button onClick={onViewClients} style={{ background:"none", border:"1px solid rgba(224,184,106,0.35)",
                  color:"#E0B86A", borderRadius:6, padding:"4px 10px", fontSize:10.5, cursor:"pointer" }}>View updated portfolios →</button>
              )}
              <button onClick={resetDemo} style={{ background:"none",
                border:"1px solid rgba(224,184,106,0.30)", color:"#C9A35E", borderRadius:6, padding:"4px 10px", fontSize:10.5, cursor:"pointer" }}>↺ Reset demo</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Standard "Build cost base" flow (5 Jul) ─────────────────────────────────────
// The renamed onboarding action. Clients already auto-sync from Xero Practice Manager
// (that's included in Standard), so the job with real value is reconstructing the cost
// base — not "adding a client". Two entry points feed this one component:
//   • list mode   — top-bar "Build cost base history" worklist of synced-but-unbuilt
//                   clients (holdingIds empty AND a reconstruction seed exists), cleared
//                   one at a time.
//   • client mode — a single client's build (per-row button in the Portfolio cell).
// Uses each client's OWN AUTOPILOT_RECON_SEEDS data — deliberately NOT the Okafor
// flagship AIOnboardingAgent, whose own seed comment warns that reusing it for these
// clients would misrepresent them. Commits via the no-push path (onCommit →
// handleCommitReconstruction(id, holds, false)): Standard STOPS at a built + reviewed
// cost base + export. The push into the return is a Premium action (see cgt-pricing.html).
function BuildCostBaseFlow({ flow, setFlow, clients, onCommit, onSeeSample }) {
  const unbuilt = clients.filter(c => (c.holdingIds||[]).length===0 && AUTOPILOT_RECON_SEEDS[c.id]);
  const close = () => setFlow(null);
  const wrap = (children, wide) => (
    <div style={{ position:"fixed", inset:0, background:"rgba(8,6,20,0.88)", zIndex:610,
      display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12,
        width: wide?"min(720px,96vw)":"min(560px,96vw)", maxHeight:"92vh",
        display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {children}
      </div>
    </div>
  );
  const header = (title, sub) => (
    <div style={{ padding:"16px 22px", borderBottom:`1px solid ${C.border}`,
      display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12 }}>
      <div style={{ display:"flex", alignItems:"center", gap:11 }}>
        <div style={{ width:34, height:34, borderRadius:9, background:"linear-gradient(135deg,#7F77DD,#AFA9EC)",
          display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, color:"#fff" }}>⚡</div>
        <div>
          <div style={{ fontSize:15, fontWeight:600, color:C.text, display:"flex", alignItems:"center", gap:7 }}>{title}
            <span style={{ fontSize:9, padding:"1px 7px", borderRadius:3, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700,
              background:`${C.teal}16`, color:C.teal, border:`1px solid ${C.teal}35` }}>STANDARD</span></div>
          <div style={{ fontSize:11, color:C.muted, marginTop:3, lineHeight:1.5, maxWidth:560 }}>{sub}</div>
        </div>
      </div>
      <button onClick={close} style={{ background:"none", border:`1px solid ${C.border}`, color:C.dim,
        fontSize:16, cursor:"pointer", borderRadius:6, width:30, height:30, flexShrink:0 }}>✕</button>
    </div>
  );

  if (flow.mode === "list") {
    return wrap(
      <React.Fragment>
        {header("Build cost base history", "Clients sync from Xero Practice Manager automatically — these ones just don't have a reconstructed cost base yet. Clear them one at a time.")}
        <div style={{ flex:1, overflowY:"auto", padding:"16px 20px" }}>
          {unbuilt.length===0 ? (
            <div style={{ fontSize:12, color:C.dim, textAlign:"center", padding:"28px 10px" }}>
              ✓ Every synced client has a cost base built. Nothing in the queue.
            </div>
          ) : unbuilt.map(c => {
            const seed = AUTOPILOT_RECON_SEEDS[c.id];
            const n = seed.rows.length;
            return (
              <div key={c.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", marginBottom:9,
                borderRadius:8, border:`1px solid ${C.border}`, background:C.surface2 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{c.name}</div>
                  <div style={{ fontSize:10.5, color:C.dim, marginTop:2 }}>{c.entityType} · synced from XPM · {n} holding{n===1?"":"s"} to reconstruct · no cost base yet</div>
                </div>
                <button onClick={()=>setFlow({mode:"client", clientId:c.id})} style={{ ...S.btn("teal"), padding:"7px 13px", fontSize:11.5 }}>⚡ Build cost base history</button>
              </div>
            );
          })}
          <div style={{ ...S.callout("127,119,221"), marginTop:6 }}>
            Standard reconstructs one client at a time. <strong style={{color:C.text}}>Premium Autopilot</strong> builds your whole list at once and pushes each reconciled figure into the return — with review gates.
          </div>
          <div style={{ marginTop:12, textAlign:"center" }}>
            <button onClick={onSeeSample} style={{ background:"none", border:"none", color:C.purple, fontSize:11.5, cursor:"pointer", fontFamily:"'IBM Plex Mono',monospace" }}>▶ See a sample reconstruction (walkthrough)</button>
          </div>
        </div>
      </React.Fragment>
    );
  }

  const client = clients.find(c => c.id === flow.clientId);
  const seed = client && AUTOPILOT_RECON_SEEDS[client.id];
  if (!client || !seed) { close(); return null; }
  const commit = () => {
    onCommit(client.id, seed.buildHoldings());
    const remaining = unbuilt.filter(c => c.id !== client.id);
    setFlow(remaining.length ? {mode:"list"} : null);
  };
  return wrap(
    <React.Fragment>
      {header(`Build cost base — ${client.name}`, `${client.entityType} · reconstructed from connected sources. Review, then commit. Standard stops here — the push to the return is Premium.`)}
      <div style={{ flex:1, overflowY:"auto", padding:"18px 22px" }}>
        <div style={{ fontSize:10.5, color:C.muted, fontFamily:"'IBM Plex Mono',monospace", marginBottom:10, letterSpacing:"0.04em" }}>RECONSTRUCTED PARCELS · document-first (broker statements, workpapers, registry)</div>
        {seed.rows.map(r => (
          <div key={r.id} style={{ padding:"11px 13px", marginBottom:8, borderRadius:7, border:`1px solid ${C.border}`, background:C.surface2 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:9, padding:"2px 7px", borderRadius:3, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700,
                background: r.status==="CONFIRMED" ? "rgba(52,211,153,0.12)" : "rgba(251,191,36,0.12)",
                color: r.status==="CONFIRMED" ? "#34d399" : "#fbbf24",
                border:`1px solid ${r.status==="CONFIRMED" ? "rgba(52,211,153,0.3)" : "rgba(251,191,36,0.3)"}` }}>{r.status}</span>
              <span style={{ fontSize:12.5, fontWeight:600, color:C.text, flex:1 }}>{r.label}</span>
              <span style={{ fontSize:9, padding:"2px 7px", borderRadius:3, fontFamily:"'IBM Plex Mono',monospace",
                background:"rgba(79,158,255,0.1)", color:C.blue, border:"1px solid rgba(79,158,255,0.25)" }}>{r.source}</span>
            </div>
            {r.reason && <div style={{ fontSize:10.5, color:C.dim, marginTop:5, lineHeight:1.5 }}>{r.reason}</div>}
          </div>
        ))}
        <div style={{ ...S.callout("52,211,153"), marginTop:6 }}>
          <strong style={{color:C.text}}>HITL review:</strong> you're signing off the reconstructed cost base before it commits. On commit, the reviewed CGT figure + audit trail are ready to <strong style={{color:C.text}}>export</strong>. Pushing it into the Xero Tax return &amp; CGT schedule is a <strong style={{color:C.text}}>Premium</strong> action.
        </div>
      </div>
      <div style={{ padding:"14px 22px", borderTop:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", gap:12 }}>
        <button onClick={()=> setFlow(unbuilt.length>1 ? {mode:"list"} : null)} style={{ background:"none", border:`1px solid ${C.border}`, color:C.dim, fontSize:12, cursor:"pointer", borderRadius:6, padding:"8px 14px" }}>← Back</button>
        <button onClick={commit} style={{ ...S.btn("teal"), padding:"9px 18px", fontSize:12.5 }}>✓ Commit reviewed cost base</button>
      </div>
    </React.Fragment>
  );
}

function ClientListView({ clients, holdings, pm, onPushCGT, onSelectClient, onOpenReport, onAddWithAI, onBuildWorklist, onBuildClient, autopilot, onCommitReconstruction, autopilotAcceptedIds, filterIds, setFilterIds, activeTab, onTabChange }) {
  // activeTab/onTabChange are controlled by App() via the #/clients(/obligations)
  // route (29 Jun fix) — this used to be local useState, which meant switching
  // tabs never touched the URL and browser Back skipped over it.
  const [search, setSearch] = useState("");
  const [filterET, setFilterET] = useState("ALL");
  const [filterAcc, setFilterAcc] = useState("ALL");
  const [filterPartner, setFilterPartner] = useState("ALL");
  // filterIds/setFilterIds and autopilotAcceptedIds are lifted to App level (29 Jun)
  // — the Autopilot Compliance panel that used to live here now renders at the App
  // root instead, so it persists across Client Portfolios/Tax Obligations/Tracker/
  // CGT Report navigation rather than unmounting along with this view. See App()
  // for the panel itself, showComplianceAutopilot, and handleAutopilotAccept.
  const [sortKey, setSortKey] = useState("name");
  // Direction companion to sortKey — lets a column header itself act as a sort
  // control (click = activate ascending, click again = toggle) in addition to the
  // "Sort:" dropdown below, both reading/writing this same state.
  const [sortDir, setSortDir] = useState("asc");
  function toggleSort(key) {
    if (sortKey === key) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortKey(key); setSortDir("asc"); }
  }
  // Which linked job (client.id+":"+job.id), if any, the Tax Obligations tab should
  // be filtered to — set when a job is clicked in the Linked Jobs column below,
  // cleared on explicit "Clear filter" or on manually switching tabs.
  const [focusJobKey, setFocusJobKey] = useState(null);

  const accountants = [...new Set(clients.map(c => c.assignedAccountant))];
  const partners = [...new Set(PARTNER_GROUPS.map(g => g.partner))];
  const partnerOf = {}; PARTNER_GROUPS.forEach(g => g.entityIds.forEach(id => { partnerOf[id] = g.partner; }));

  // Attention Engine v1 — "no transactions yet" detection (plan doc §6/§9 phase 3).
  const newClients = detectFreshNoTxnClients(clients, pm);
  const newClientIds = new Set(newClients.map(c => c.id));

  const filtered = clients
    .filter(c => {
      const q = search.toLowerCase();
      const matchSearch = !q ||
        c.name.toLowerCase().includes(q) ||
        c.email.toLowerCase().includes(q) ||
        c.tfn.includes(q) ||
        c.assignedAccountant.toLowerCase().includes(q) ||
        (partnerOf[c.id]||"").toLowerCase().includes(q);
      const matchET = filterET === "ALL" || c.entityType === filterET;
      const matchAcc = filterAcc === "ALL" || c.assignedAccountant === filterAcc;
      const matchPartner = filterPartner === "ALL" || partnerOf[c.id] === filterPartner;
      const matchFilterIds = !filterIds || filterIds.includes(c.id);
      return matchSearch && matchET && matchAcc && matchPartner && matchFilterIds;
    })
    .sort((a, b) => {
      const dir = sortDir === "desc" ? -1 : 1;
      if (sortKey === "name") return dir * a.name.localeCompare(b.name);
      if (sortKey === "entity") return dir * a.entityType.localeCompare(b.entityType);
      if (sortKey === "accountant") return dir * a.assignedAccountant.localeCompare(b.assignedAccountant);
      if (sortKey === "holdings") return dir * ((a.holdingIds?.length||0) - (b.holdingIds?.length||0));
      if (sortKey === "reconciled") {
        const ah = pm.entities[a.id]?.lastSyncHrs ?? Number.MAX_SAFE_INTEGER;
        const bh = pm.entities[b.id]?.lastSyncHrs ?? Number.MAX_SAFE_INTEGER;
        return dir * (ah - bh);
      }
      return 0;
    });

  function clientStats(client) {
    const cHoldings = (client.holdingIds || []).map(id => holdings[id]).filter(Boolean);
    const activeParcels = cHoldings.flatMap(h => h.parcels.filter(p => p.status === "active"));
    const totalCB = cHoldings.reduce((s, h) =>
      s + h.parcels.filter(p => p.status === "active").reduce((ss, p) => ss + getEffectiveCostBase(p, h.adjustments), 0), 0);
    return { totalCB, holdingCount: cHoldings.length, parcelCount: activeParcels.length,
      assetTypes: [...new Set(cHoldings.map(h => h.type))] };
  }

  const statusBadge = (status) => {
    const map = {
      active: { label:"Active", bg:"rgba(52,211,153,0.12)", color:"#34d399", border:"rgba(52,211,153,0.3)" },
      review: { label:"Needs Review", bg:"rgba(251,191,36,0.12)", color:"#fbbf24", border:"rgba(251,191,36,0.3)" },
      inactive:{ label:"Inactive", bg:"rgba(148,163,184,0.1)", color:"#94a3b8", border:"rgba(148,163,184,0.25)" },
    };
    const s = map[status] || map.inactive;
    return (
      <span style={{ display:"inline-flex", padding:"2px 8px", borderRadius:3, fontSize:9,
        fontFamily:"'IBM Plex Mono',monospace", fontWeight:700, letterSpacing:"0.08em",
        background:s.bg, color:s.color, border:`1px solid ${s.border}` }}>
        {s.label}
      </span>
    );
  };

  return (
    <div style={{ flex:1, minHeight:0, background:C.bg, display:"flex", flexDirection:"column" }}>
      <div style={{ background:"#FFFFFF", borderBottom:`1px solid ${C.border}`,
        padding:"15px 28px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
        <div style={{ flex:1, minWidth:280 }}>
          <div style={{ fontSize:18, fontWeight:700, letterSpacing:"-0.02em", color:C.text, fontFamily:"'IBM Plex Mono',monospace", marginBottom:6 }}>Compliance</div>
          <ComplianceMiniDashboard clients={clients} pm={pm} />
        </div>
        <button onClick={onBuildWorklist}
          title="Clients auto-sync from Xero Practice Manager. This reconstructs the cost base for any synced client that doesn't have one yet — one at a time (Standard). Premium Autopilot does the whole list."

          ⚡ Build cost base history
        </button>
      </div>

      <div style={{ display:"flex", borderBottom:`1px solid ${C.border}`, background:"#F7F4FF", flexShrink:0 }}>
        {[["clients","👥 Client Portfolios"],["obligations","📋 Tax Obligations"]].map(([id,label])=>(
          <button key={id} onClick={()=>{ onTabChange(id); setFocusJobKey(null); }} style={{
            background:"none", border:"none",
            borderBottom:`2px solid ${activeTab===id?C.blue:"transparent"}`,
            color:activeTab===id?C.text:C.dim,
            padding:"12px 24px", fontSize:13, fontWeight:500, cursor:"pointer",
            fontFamily:"'IBM Plex Sans',sans-serif", marginBottom:-1, transition:"all 0.15s" }}>
            {label}
          </button>
        ))}
      </div>

      {activeTab==="obligations" ? (
        <TaxObligationDashboard clients={clients} holdings={holdings} pm={pm} onPushCGT={onPushCGT}
          onOpenReport={(client, fyObj) => onOpenReport(client, fyObj)}

          focusJobKey={focusJobKey} onClearFocus={()=>setFocusJobKey(null)}/>
      ) : (
      <div style={{ flex:1, minHeight:0, padding:"28px 32px", maxWidth:1200, margin:"0 auto", width:"100%",
        display:"flex", flexDirection:"column" }}>
        <div style={{ marginBottom:24, flexShrink:0 }}>
          <div style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.03em", color:"#1C1540",
            fontFamily:"'IBM Plex Mono',monospace", marginBottom:4 }}>Client Portfolio List</div>
          <div style={{ fontSize:12, color:C.dim }}>Select a client to open their portfolio tracker.</div>
        </div>

        <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap", alignItems:"center", flexShrink:0 }}>
          <div style={{ position:"relative", flex:"1 1 260px", minWidth:200 }}>
            <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)",
              fontSize:13, color:C.muted }}>🔍</span>
            <input
              placeholder="Search name, email, TFN, preparer, partner…"

              background:"rgba(153,107,10,0.10)", color:C.amber }}>

            </button>

          <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
            {["ALL",...ENTITY_TYPES].map(et => {
              const meta = ENTITY_META[et];
              return (
                <button key={et} onClick={() => setFilterET(et)} style={{

                  border:`1px solid ${filterET===et?(meta?.color||C.blue):C.border}`,

                  color: filterET===et?(meta?.color||C.blue):C.dim,

            <option value="ALL">All Partners</option>
            {partners.map(p=><option key={p}>{p}</option>)}
          </select>
          <select value={filterAcc} onChange={e=>setFilterAcc(e.target.value)}
            style={{ ...S.select, width:"auto", minWidth:140, fontSize:11 }}>
            <option value="ALL">All Preparers</option>
            {accountants.map(a=><option key={a}>{a}</option>)}
          </select>
          <select value={sortKey} onChange={e=>{ setSortKey(e.target.value); setSortDir("asc"); }}
            style={{ ...S.select, width:"auto", minWidth:130, fontSize:11 }}>
            <option value="name">Sort: Name</option>
            <option value="entity">Sort: Entity Type</option>
            <option value="accountant">Sort: Preparer</option>
            <option value="holdings">Sort: Holdings</option>
            <option value="reconciled">Sort: Last Reconciled</option>
          </select>
        </div>

        <div style={{ flexShrink:0 }}><SyncStatusPanel pm={pm}/></div>

        <div style={{ flex:1, minHeight:220, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, overflow:"auto" }}>
          <table style={{ width:"100%", minWidth:880, borderCollapse:"collapse", fontSize:12 }}>
            <thead>
              <tr style={{ background:C.surface2 }}>
                {/* Headers double as sort (click label, toggle on repeat click) and, where

                {[
                  { key:"name",       label:"Client" },
                  { key:"entity",     label:"Entity", filter:{ options:["ALL",...ENTITY_TYPES], value:filterET, onChange:setFilterET,
                      renderLabel:(o)=> o==="ALL" ? "All Types" : `${ENTITY_META[o]?.icon||""} ${o}` } },
                  { key:"holdings",   label:"Portfolio" },

                      {col.key

            </thead>
            <tbody>
              {buildGroupedRows(filtered).map((item, idx) => {
                if (item.__partner !== undefined)
                  return <PartnerHeaderRow key={"p-"+idx} partner={item.__partner} groups={item.__groups}/>;
                if (item.__hdr !== undefined)
                  return <GroupHeaderRow key={"h-"+(item.__hdr?item.__hdr.id:"ung")} group={item.__hdr} members={item.__members} pm={pm} clients={clients}/>;
                const client = item;
                const stats = clientStats(client);
                const em = ENTITY_META[client.entityType] || { icon:"👤", color:C.blue };
                const autopilotTag = autopilotAcceptedIds.has(client.id) ? "accepted" : newClientIds.has(client.id) ? "new" : null;
                return (
                  // Row itself is no longer a click target (was: onClick={() => onSelectClient(client)}

                    </td>
                    <td style={{ ...S.td, padding:"14px 16px" }}>
                      <span style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"3px 9px",
                        borderRadius:4, fontSize:10, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700,
                        background:`${em.color}16`, color:em.color, border:`1px solid ${em.color}35` }}>

                    </td>
                    <td style={{ ...S.td, padding:"14px 16px" }}>
                      {stats.holdingCount === 0 && AUTOPILOT_RECON_SEEDS[client.id] ? (

                        <div>
                          <button onClick={()=>onBuildClient(client.id)}
                            title="Reconstruct this client's cost base from connected sources (Standard — one client at a time)."

                          <div style={{ fontSize:9, color:C.muted, fontFamily:"'IBM Plex Mono',monospace", marginTop:5 }}>synced · no cost base yet</div>
                        </div>
                      ) : (
                      <React.Fragment>
                      <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:13, fontWeight:700, color:C.blue }}>
                        ${stats.totalCB >= 1000000
                          ? (stats.totalCB/1000000).toFixed(2)+"M"
                          : stats.totalCB >= 1000
                            ? (stats.totalCB/1000).toFixed(1)+"k"
                            : stats.totalCB.toFixed(0)}
                        <span style={{ fontSize:9, color:C.muted, fontWeight:400, marginLeft:6 }}>cost base</span>
                      </div>
                      <div style={{ display:"flex", gap:4, marginTop:4, alignItems:"center", flexWrap:"wrap" }}>
                        {stats.assetTypes.map(t => {
                          const tm = HOLDING_TYPE_META[t] || { color:C.dim, icon:"?" };
                          return (
                            <span key={t} style={{ fontSize:9, padding:"2px 6px", borderRadius:3,
                              fontFamily:"'IBM Plex Mono',monospace", fontWeight:700,
                              background:`${tm.color}18`, color:tm.color, border:`1px solid ${tm.color}35` }}>
                              {tm.icon} {t}
                            </span>
                          );
                        })}
                        <span style={{ fontSize:9.5, color:C.muted, fontFamily:"'IBM Plex Mono',monospace", marginLeft:2 }}>
                          {stats.holdingCount} holdings · {stats.parcelCount} parcels
                        </span>
                      </div>
                      </React.Fragment>
                      )}
                    </td>
                    <td style={{ ...S.td, padding:"14px 16px" }}>
                      <div style={{ marginBottom:2 }}>
                        <span style={{ fontSize:11, color:C.dim }}>{client.assignedAccountant}</span>
                      </div>
                      {(() => {
                        // Brand-new synced client with no cost base built yet: it has never
                        // been reconciled, so don't show a "Reconciled {date}" — that date is
                        // the XPM sync stamp and reads as a false reconciliation claim.
                        if (stats.holdingCount === 0 && AUTOPILOT_RECON_SEEDS[client.id])
                          return <span style={{ fontSize:10, color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>Not reconciled yet</span>;
                        const ps = pm.entities[client.id];
                        if (!ps) return <span style={{ fontSize:10, color:C.muted }}>—</span>;
                        const hrs = ps.lastSyncHrs;
                        const d = new Date(PM_NOW.getTime() - hrs*3600000);
                        const ds = `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
                        const fcol = pmFreshColor(hrs);
                        return (
                          <span style={{ display:"inline-flex", alignItems:"center", gap:5, fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:fcol }}>
                            <span style={{ width:6, height:6, borderRadius:"50%", background:fcol }}/>Reconciled {ds}
                          </span>
                        );
                      })()}
                    </td>
                    <td style={{ ...S.td, padding:"14px 16px", verticalAlign:"top" }}>
                      {(() => {
                        const ps = pm.entities[client.id];
                        if (!ps) return <span style={{ fontSize:11, color:C.muted }}>—</span>;
                        const outstanding = ps.jobs.filter(j => j.type === "tax-return" && j.status !== "Complete");
                        if (!outstanding.length) return <span style={{ fontSize:10, color:C.teal, fontFamily:"'IBM Plex Mono',monospace" }}>✓ none outstanding</span>;

                    </td>
                    <td style={{ ...S.td, padding:"14px 16px", verticalAlign:"top" }}>
                      {(() => {
                        const ps = pm.entities[client.id];
                        const trJobs = ps ? ps.jobs.filter(j => j.type === "tax-return") : [];
                        if (!trJobs.length) return <span style={{ fontSize:11, color:C.muted }}>—</span>;
                        return (
                          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                            {trJobs.map(j => {
                              // Read-only — derived live from the same deriveCGTStatus() the Tax
                              // Obligations tab uses, so the two views can never disagree.
                              const jobFy = j.fy || ps.ret.year;
                              const v = deriveCGTStatus(client, ps, jobFy);
                              const meta = JOB_WORKFLOW[v] || JOB_WORKFLOW["Reconciling"];
                              return (
                                <div key={j.id} style={{ display:"flex", alignItems:"center", minHeight:22 }}>
                                  <span style={{ display:"inline-flex", alignItems:"center", padding:"3px 9px", borderRadius:4,
                                    fontSize:10, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace",
                                    background:meta.bg, color:meta.color, border:`1px solid ${meta.color}40` }}>{v}</span>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}
                    </td>
                    <td style={{ ...S.td, padding:"14px 16px", verticalAlign:"top" }}>
                      {(() => {
                        const ps = pm.entities[client.id];
                        const trJobs = ps ? ps.jobs.filter(j => j.type === "tax-return") : [];
                        if (!trJobs.length) return <span style={{ fontSize:11, color:C.muted }}>—</span>;
                        return (
                          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                            {trJobs.map(j => {
                              // Same buildCGTSchedule() math the CGT Report and Tax
                              // Obligations' CGT result column both run (cgtOutcomeForFY),
                              // status-gated so a not-yet-reconciled job reads "In progress"
                              // rather than a false "No CGT event". Clicking opens the
                              // report once there's one to see; pre-reconciliation it jumps
                              // to the client instead (mirrors "Continue reconciling").
                              const jobFy = j.fy || ps.ret.year;
                              const fyObj = FY_OPTIONS.find(f => f.label === jobFy);
                              const jobStatus = deriveCGTStatus(client, ps, jobFy);
                              // Brand-new synced client with no cost base built yet reads
                              // "Not started" — reconciliation hasn't begun, so "In progress"
                              // (the Reconciling-status default) would overstate it.
                              const unbuilt = (client.holdingIds||[]).length === 0 && AUTOPILOT_RECON_SEEDS[client.id];
                              const outcome = unbuilt
                                ? { kind:"not_started", label:"Not started", color:C.muted }
                                : cgtOutcomeForFY(client, holdings, fyObj, jobStatus);
                              const inProgress = outcome.kind === "in_progress";
                              const notStarted = outcome.kind === "not_started";
                              return (
                                <div key={j.id} style={{ display:"flex", alignItems:"center", minHeight:22 }}>
                                  <span onClick={e=>{ e.stopPropagation(); if (notStarted) return; inProgress ? onSelectClient(client) : onOpenReport(client, fyObj); }}
                                    title={notStarted ? "Cost base not built yet — use Build cost base history" : inProgress ? "Continue reconciling" : "Open CGT report"}
                                    style={{ fontSize:10.5, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace",
                                      fontStyle: inProgress ? "italic" : "normal",
                                      color:outcome.color, cursor: notStarted ? "default" : "pointer",
                                      textDecoration: notStarted ? "none" : "underline",
                                      textDecorationColor:`${outcome.color}55`, textUnderlineOffset:2 }}>
                                    {outcome.label}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}
                    </td>
                  </tr>
                );
              })}
              {filtered.length === 0 && (
                <tr><td colSpan={7} style={{ ...S.td, padding:"32px", textAlign:"center", color:C.muted, fontSize:13 }}>
                  No clients match your search or filters.
                </td></tr>
              )}
            </tbody>
          </table>
        </div>

        <div style={{ marginTop:12, paddingTop:4, flexShrink:0, fontSize:10, color:C.muted, fontFamily:"'IBM Plex Mono',monospace", lineHeight:1.6 }}>
          Cost base figures are effective cost base across active parcels only. TFN displayed for authorised practice staff only. General guidance — not tax advice.
        </div>
      </div>
      )}
    </div>
  );
}

// Wizard-of-Oz: the toggle is real state, but nothing behind it calls a live model —
// every briefing is scripted from data already on the page.
//
// Slider-switch redesign (28 Jun, review feedback): re-skinned as a sliding-thumb
// track rather than a two-segment pill, so it reads as a toggle at a glance. Keeps
// the two <button> click targets (not a single onChange) — each segment still needs
// its own distinct side effect (Assistant opens the chat panel; Autopilot opens the
// Autopilot panel and closes chat), and collapsing that into one handler would have
// meant re-deriving which side was clicked from the next state instead of just
// keeping two handlers. The thumb is a plain absolutely-positioned span behind both
// buttons (zIndex:0 vs the buttons' zIndex:1) that slides via transform — width is
// computed off the track's own padding box so it stays exact at any track width.
//
// Reopen-bug fix (28 Jun): the Autopilot segment now calls onOpenAutopilot (App.

function AssistantAutopilotSwitch({ autopilot, onSetAutopilot, onAI, onCloseAI, onOpenAutopilot }) {
  const [show, setShow] = useState(false);
  const seg = (active) => ({
    flex:"1 1 50%", position:"relative", zIndex:1, display:"inline-flex", alignItems:"center",
    justifyContent:"center", gap:5, border:"none", background:"none", whiteSpace:"nowrap",
    padding:"6px 8px", fontSize:11.5, fontWeight:600, cursor:"pointer",

  const thumbBg = autopilot ? "linear-gradient(135deg,#E0B86A,#996B0A)" : "linear-gradient(135deg,#9A93EA,#6B62D6)";
  // Only one AI surface on screen at a time — switching modes closes the other.
  const ASSISTANT_POINTS = [
    "On demand — you ask, it answers",
    "Reactive — waits for a question, takes no action on its own",
    "Context-aware — scoped to the page or client you're currently viewing",
    "Q&A only — no proposals, no automated next steps",
  ];
  const AUTOPILOT_POINTS = [
    "Proactive — surfaces what's outstanding without being asked",
    "Tracks progress — picks up where you left off across visits",
    "Suggests next steps — flags opportunities, risks, and proposed actions",
    "Asks permission — pauses for your go-ahead before running anything end-to-end",

  return (
    <span style={{ position:"relative", display:"inline-flex" }}
      onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      <span style={{ position:"relative", display:"inline-flex", width:196, boxSizing:"border-box",
        border:`1px solid rgba(${tint},0.40)`, borderRadius:8, background:`rgba(${tint},0.08)`, padding:2 }}>
        <span aria-hidden="true" style={{ position:"absolute", left:2, top:2, bottom:2, width:"calc(50% - 2px)",
          borderRadius:6, background:thumbBg, boxShadow:"0 1px 3px rgba(0,0,0,0.28)", zIndex:0,
          transform: autopilot ? "translateX(100%)" : "translateX(0)",
          transition:"transform 0.22s cubic-bezier(.4,0,.2,1)" }}/>
        <button onClick={()=>{ onSetAutopilot(false); onAI(); }} title="Assistant — ask on demand, context-aware help across the app"
          style={seg(!autopilot)}>✦ Assistant</button>
        <button onClick={()=>{ onOpenAutopilot ? onOpenAutopilot() : onSetAutopilot(true); onCloseAI && onCloseAI(); }}
          title="Autopilot (Premium) — AI briefs you proactively across the app. Click any time to bring the panel back if you've closed it."
          style={seg(autopilot)}>⚡ Autopilot</button>
      </span>
      {show && (
        <span style={{ position:"absolute", top:"calc(100% + 6px)", right:0, zIndex:60, width:300, boxSizing:"border-box",
          whiteSpace:"normal", wordBreak:"break-word", textAlign:"left",
          background:"#0F0E17", border:"1px solid #2D2845", borderRadius:8, padding:"10px 12px", boxShadow:"0 12px 32px rgba(0,0,0,0.45)" }}>
          <span style={{ display:"block", fontSize:9, letterSpacing:"0.1em", textTransform:"uppercase", color: autopilot?"#E0B86A":"#9088C0", fontFamily:"'IBM Plex Mono',monospace", marginBottom:6 }}>
            {autopilot ? "Autopilot mode" : "Assistant mode"}

              </span>
            ))}
          </span>
        </span>

  );
