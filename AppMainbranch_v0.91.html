// SECTION C — RIGHTS REGISTER
// ═══════════════════════════════════════════════════════════════════════════════
function RightsRegister({rights, holdings, onAddRights}) {
  const [filter,setFilter] = useState("ALL");
  const tabs = ["ALL","PENDING","EXERCISED","SOLD","LAPSED","PARTIAL"];
  const filtered = filter==="ALL" ? rights : rights.filter(r=>r.outcome===filter);

  const outcomePill = (outcome) => {
    const map={PENDING:{c:C.gold,bg:"rgba(201,168,76,0.12)",b:"rgba(201,168,76,0.28)"},
      EXERCISED:{c:C.teal,bg:"rgba(52,211,153,0.12)",b:"rgba(52,211,153,0.28)"},
      SOLD:{c:C.amber,bg:"rgba(251,191,36,0.12)",b:"rgba(251,191,36,0.28)"},
      LAPSED:{c:C.slate,bg:"rgba(148,163,184,0.12)",b:"rgba(148,163,184,0.28)"},
      PARTIAL:{c:C.purple,bg:"rgba(167,139,250,0.12)",b:"rgba(167,139,250,0.28)"}};
    const s=map[outcome]||{c:C.dim,bg:"rgba(255,255,255,0.05)",b:C.border};
    return <span style={{display:"inline-flex",padding:"2px 8px",borderRadius:3,fontSize:10,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,background:s.bg,color:s.c,border:`1px solid ${s.b}`}}>{outcome}</span>;
  };

  const rtsPill = (t) => {
    const isRen=t==="RENOUNCEABLE";
    return <span style={{display:"inline-flex",padding:"2px 8px",borderRadius:3,fontSize:10,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,
      background:isRen?"rgba(192,132,252,0.12)":"rgba(96,165,250,0.12)",
      color:isRen?"#c084fc":"#60a5fa",
      border:`1px solid ${isRen?"rgba(192,132,252,0.28)":"rgba(96,165,250,0.28)"}`}}>
      {isRen?"RENOUN":"NON-REN"}
    </span>;
  };

  return (
    <div>
      <div style={S.pageTitle}>📜 Rights Register</div>
      <div style={S.pageSub}>Rights lifecycle tracker. Exercised outcomes create acquisition parcels. Sold or lapsed rights generate CGT event records.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
        <div style={{padding:"10px 14px",borderRadius:6,background:"rgba(192,132,252,0.06)",border:"1px solid rgba(192,132,252,0.22)",fontSize:12,lineHeight:1.65}}>
          <span style={{color:"#c084fc",fontWeight:600}}>Renounceable</span> <span style={{color:C.dim}}>— IS a CGT asset. 3 outcome paths: Exercise / Sell / Lapse. Sold rights: CGT event A1 (proceeds − $0). Lapsed: CGT event C1 (nil loss).</span>
        </div>
        <div style={{padding:"10px 14px",borderRadius:6,background:"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.22)",fontSize:12,lineHeight:1.65}}>
          <span style={{color:"#60a5fa",fontWeight:600}}>Non-Renounceable</span> <span style={{color:C.dim}}>— NOT a CGT asset. 2 outcome paths: Exercise / Lapse only. Lapsed: no CGT event, no loss claimable. Cannot be sold.</span>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {tabs.map(t=>(
            <button key={t} onClick={()=>setFilter(t)} style={{padding:"5px 11px",borderRadius:4,fontSize:11,fontFamily:"'IBM Plex Mono',monospace",cursor:"pointer",
              border:`1px solid ${filter===t?"#c084fc":C.border}`,
              background:filter===t?"rgba(192,132,252,0.12)":"rgba(255,255,255,0.03)",
              color:filter===t?"#c084fc":C.dim}}>
              {t} ({t==="ALL"?rights.length:rights.filter(r=>r.outcome===t).length})
            </button>
          ))}
        </div>
        <button style={S.btn("purple")} onClick={onAddRights}>+ New Rights Issue</button>
      </div>
      {filtered.length===0 && <div style={S.panel}><EmptyState icon="📜"
        title={filter==="ALL"?"No rights issues recorded":`No ${filter.toLowerCase()} rights`}
        hint={filter==="ALL"?"Renounceable and non-renounceable rights are tracked here through exercise, sale or lapse. Add one with “+ New Rights Issue”.":"Switch the filter to ALL to see every rights record."}
        cta={filter==="ALL"?"+ New Rights Issue":null} onCta={onAddRights}/></div>}
      {filtered.map(r=><RightsCard key={r.id} record={r} holdings={holdings} outcomePill={outcomePill} rtsPill={rtsPill}/>)}
    </div>
  );
}

function RightsCard({record, holdings, outcomePill, rtsPill}) {
  const [open,setOpen] = useState(record.outcome==="PENDING");
  const isPending = record.outcome==="PENDING";
  const isRen = record.rightsType==="RENOUNCEABLE";
  const daysToExpiry = Math.floor((new Date(record.expiryDate)-Date.now())/86400000);
  const createdParcel = record.createdParcelId
    ? Object.values(holdings).flatMap(h=>h.parcels).find(p=>p.id===record.createdParcelId)
    : null;

  return (
    <div style={{...S.panel, borderColor:isPending&&daysToExpiry<=5?"rgba(248,113,113,0.5)":undefined}}>
      <div style={S.panelHead} onClick={()=>setOpen(o=>!o)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {rtsPill(record.rightsType)}
          <span style={{...S.mono,fontSize:13,fontWeight:700,color:C.blue}}>{record.ticker}</span>
          <span style={{fontSize:12,color:C.dim}}>Issue: {fmtDate(record.issueDate)}</span>
          <span style={{fontSize:12,color:isPending&&daysToExpiry<=5?C.red:C.dim}}>Expiry: {fmtDate(record.expiryDate)}{isPending&&daysToExpiry<=5?` ⚠ ${daysToExpiry}d left`:""}</span>
          {outcomePill(record.outcome)}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{...S.mono,fontSize:11,color:C.dim}}>{record.rightsQty} rights</span>
          <span style={{color:C.muted,fontSize:14}}>{open?"▾":"▸"}</span>
        </div>
      </div>
      {open&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginBottom:16}}>
            {[["Rights Type",rtsPill(record.rightsType)],["Ratio",<Mono>{record.ratio}</Mono>],
              ["Rights Qty",<Mono>{record.rightsQty}</Mono>],["Issue Price",<Mono>${fmt(record.issuePrice)}</Mono>],
              ["Issue Date",<Mono>{fmtDate(record.issueDate)}</Mono>],["Expiry",<Mono>{fmtDate(record.expiryDate)}</Mono>],
              ["Rights Cost Base",<Mono color={isRen?C.dim:C.muted}>{isRen?"$0.00 (CGT asset)":"N/A — not CGT asset"}</Mono>],
            ].map(([k,v])=>(
              <div key={k} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:5,padding:"8px 12px"}}>
                <div style={{...S.label,marginBottom:4}}>{k}</div>
                <div style={{fontSize:12}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{...S.label,marginBottom:8}}>Outcome breakdown</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:14}}>
            {record.qtyExercised>0&&(
              <div style={{padding:"12px",background:"rgba(52,211,153,0.06)",border:"1px solid rgba(52,211,153,0.22)",borderRadius:6}}>
                <div style={{fontSize:11,fontWeight:600,color:C.teal,marginBottom:8}}>✓ Exercised</div>
                <div style={{fontSize:11,color:C.dim,lineHeight:1.7}}>
                  Qty: <Mono>{record.qtyExercised}</Mono><br/>
                  Date: <Mono>{fmtDate(record.exerciseDate)}</Mono><br/>
                  Total paid: <Mono>${fmt(record.exercisePriceTotal)}</Mono><br/>
                  No CGT event on exercise
                </div>
                {createdParcel&&(
                  <div style={{marginTop:8,padding:"6px 8px",background:"rgba(52,211,153,0.08)",borderRadius:4,fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:C.teal}}>
                    → Parcel created: {record.createdParcelId}<br/>
                    Acq: {fmtDate(createdParcel.acquisitionDate)} · {fmt(createdParcel.qty,0)} units · ${fmt(createdParcel.totalCost)}
                  </div>
                )}
              </div>
            )}
            {record.qtySold>0&&(
              <div style={{padding:"12px",background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.22)",borderRadius:6}}>
                <div style={{fontSize:11,fontWeight:600,color:C.amber,marginBottom:8}}>$ Sold on-market</div>
                <div style={{fontSize:11,color:C.dim,lineHeight:1.7}}>
                  Qty sold: <Mono>{record.qtySold}</Mono><br/>
                  Date: <Mono>{fmtDate(record.saleDate)}</Mono><br/>
                  Proceeds: <Mono>${fmt(record.saleProceeds)}</Mono><br/>
                  Cost base: <Mono>$0.00</Mono>
                </div>
                <div style={{marginTop:8,padding:"6px 8px",background:"rgba(251,191,36,0.08)",borderRadius:4,fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:C.amber}}>
                  CGT event A1 — gain ${fmt(record.saleProceeds)}<br/>
                  Held &lt;12 mths → full gain assessable
                </div>
              </div>
            )}
            {record.outcome==="LAPSED"&&(
              <div style={{padding:"12px",background:"rgba(148,163,184,0.06)",border:"1px solid rgba(148,163,184,0.22)",borderRadius:6}}>
                <div style={{fontSize:11,fontWeight:600,color:C.slate,marginBottom:8}}>✗ Lapsed</div>
                <div style={{fontSize:11,color:C.dim,lineHeight:1.7}}>
                  {isRen?(
                    <>CGT event <Mono>C1</Mono> — capital loss $0.00<br/>Rights held &lt;12 months.<br/>No usable loss (cost was $0).</>
                  ):(
                    <>No CGT event — rights were NOT a CGT asset.<br/>No capital loss claimable.<br/>Audit record only.</>
                  )}
                </div>
              </div>
            )}
            {record.outcome==="PENDING"&&(
              <div style={{padding:"12px",background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.22)",borderRadius:6}}>
                <div style={{fontSize:11,fontWeight:600,color:C.gold,marginBottom:8}}>⚠ Pending — action required</div>
                <div style={{fontSize:11,color:C.dim,lineHeight:1.7}}>
                  Expiry: <Mono color={daysToExpiry<=5?C.red:C.dim}>{fmtDate(record.expiryDate)}</Mono><br/>
                  {isRen?"Options: Exercise / Sell on-market / Let lapse":"Options: Exercise / Let lapse"}<br/>
                  {isRen&&<span style={{color:"#c084fc"}}>Rights trade as CGT asset until expiry.</span>}
                  {!isRen&&<span style={{color:"#60a5fa"}}>Non-transferable — cannot be sold.</span>}
                </div>
              </div>
            )}
          </div>
          {record.notes&&<div style={{fontSize:11,color:C.dim,padding:"7px 10px",background:C.surface2,borderRadius:5,borderLeft:`2px solid ${C.border}`}}>{record.notes}</div>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ADD RIGHTS ISSUE MODAL — P0 fix: "+ New Rights Issue" was a no-op button
// ═══════════════════════════════════════════════════════════════════════════════
function AddRightsModal({holdings, onClose, onSave}) {
  const firstTicker = Object.keys(holdings)[0] || "";
  const [form,setForm] = useState({ ticker:firstTicker, rightsType:"RENOUNCEABLE",
    ratio:"", rightsQty:"", issuePrice:"", issueDate:"", expiryDate:"", notes:"" });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const valid = form.ticker && form.issueDate && form.expiryDate && (parseFloat(form.rightsQty)>0);

  function save() {
    if(!valid) return;
    const h = holdings[form.ticker];
    onSave({
      id:uid(), holdingId:h?.id||form.ticker, ticker:form.ticker,
      rightsType:form.rightsType, issueDate:form.issueDate, expiryDate:form.expiryDate,
      ratio:form.ratio||"—", rightsQty:parseFloat(form.rightsQty)||0,
      issuePrice:parseFloat(form.issuePrice)||0,
      outcome:"PENDING",
      exerciseDate:null, qtyExercised:0, exercisePriceTotal:0, createdParcelId:null,
      saleDate:null, qtySold:0, saleProceeds:0,
      notes:form.notes||"Manually added rights issue — pending outcome.",
    });
    onClose();
  }

  return (
    <div style={S.modal}>
      <div style={{...S.modalBox,width:"min(620px,98vw)"}}>
        <div style={S.modalHead}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:C.text}}>New Rights Issue</div>
            <div style={{fontSize:11,color:C.dim,marginTop:2}}>Records a pending rights entitlement. Outcome (exercise / sell / lapse) is recorded later.</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.dim,fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
        <div style={S.formGrid}>
          <div style={S.formGroup}><label style={S.label}>Security</label>

// CGT EVENTS VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function CGTEventsView({holdings, cgtEvents}) {
  const { sort, toggle, sorted } = useSort();
  const allEvents = [...cgtEvents, ...Object.values(holdings).flatMap(h=>h.cgtEvents||[])];
  const evAccessors = {
    type: e=>e.eventType, date: e=>e.eventDate,
    cb: e=>e.costBase||0, proceeds: e=>e.proceeds||0,
    gain: e=>e.capitalGain||0, loss: e=>e.capitalLoss||0, taxable: e=>e.discountedGain||0,
  };
  const totalGain = allEvents.reduce((s,e)=>s+(e.capitalGain||0),0);
  const totalLoss = allEvents.reduce((s,e)=>s+(e.capitalLoss||0),0);
  const totalDisc = allEvents.reduce((s,e)=>s+(e.discountedGain||0),0);

  const etBg = (t) => t==="A1"?"rgba(251,191,36,0.1)":t==="G1"?"rgba(248,113,113,0.1)":t==="C1"?"rgba(148,163,184,0.1)":t==="C2"?"rgba(248,113,113,0.1)":"rgba(255,255,255,0.05)";
  const etColor = (t) => t==="A1"?C.amber:t==="G1"?C.red:t==="C1"?C.slate:t==="C2"?C.red:C.dim;

  return (
    <div>
      <div style={S.pageTitle}>⚡ CGT Events</div>
      <div style={S.pageSub}>Auto-generated from corporate actions and rights outcomes. Manual disposal events recorded here on sale.</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12,marginBottom:20}}>
        {[["Total Events",allEvents.length,C.blue],["Total Gains",`$${fmt(totalGain)}`,C.amber],["Total Losses",`$${fmt(totalLoss)}`,C.red],["Discounted Gains",`$${fmt(totalDisc)}`,C.teal]].map(([l,v,c])=>(
          <div key={l} style={{...S.panel,padding:"14px 16px",marginBottom:0}}>
            <div style={{...S.summLabel,marginBottom:6}}>{l}</div>
            <div style={{...S.mono,fontSize:18,fontWeight:700,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      {allEvents.length===0?(
        <div style={S.panel}><EmptyState icon="🧾" title="No CGT events yet"
          hint="CGT events are generated automatically when a corporate action forces a disposal or a rights record is sold or lapses. Record a disposal from any parcel's What-If, or apply a corporate action."/></div>
      ):(
        <div style={S.panel}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>
              <SortTh label="Event" sortKey="type" sort={sort} toggle={toggle}/>
              <SortTh label="Date" sortKey="date" sort={sort} toggle={toggle}/>
              <th style={S.th}>Source</th>
              <SortTh label="Cost Base" sortKey="cb" sort={sort} toggle={toggle} align="right"/>
              <SortTh label="Proceeds" sortKey="proceeds" sort={sort} toggle={toggle} align="right"/>
              <SortTh label="Gain" sortKey="gain" sort={sort} toggle={toggle} align="right"/>
              <SortTh label="Loss" sortKey="loss" sort={sort} toggle={toggle} align="right"/>
              <th style={S.th}>Disc.</th>
              <SortTh label="Taxable Gain" sortKey="taxable" sort={sort} toggle={toggle} align="right"/>
              <th style={S.th}>Notes</th>
            </tr></thead>
            <tbody>
              {sorted(allEvents, evAccessors).map(e=>(
                <tr key={e.id}>
                  <td style={S.td}><span style={{display:"inline-flex",padding:"2px 8px",borderRadius:3,fontSize:10,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,background:etBg(e.eventType),color:etColor(e.eventType)}}>{e.eventType}</span></td>
                  <td style={{...S.td,...S.mono,fontSize:11,color:C.dim}}>{fmtDate(e.eventDate)}</td>
                  <td style={{...S.td,fontSize:11,color:C.dim}}>{e.rightsRecordId?"Rights disposal":e.actionId?"Corporate action":"Disposal"}</td>
                  <td style={{...S.td,...S.mono,textAlign:"right",fontSize:11}}>${fmt(e.costBase)}</td>
                  <td style={{...S.td,...S.mono,textAlign:"right",fontSize:11}}>${fmt(e.proceeds)}</td>
                  <td style={{...S.td,...S.mono,textAlign:"right",color:C.teal,fontSize:11}}>{e.capitalGain>0?`$${fmt(e.capitalGain)}`:"—"}</td>
                  <td style={{...S.td,...S.mono,textAlign:"right",color:C.red,fontSize:11}}>{e.capitalLoss>0?`$${fmt(e.capitalLoss)}`:"—"}</td>
                  <td style={S.td}><span style={S.discBadge(e.discountEligible)}>{e.discountEligible?"✓ 50%":"✗ Full"}</span></td>
                  <td style={{...S.td,...S.mono,textAlign:"right",color:C.amber,fontWeight:600}}>${fmt(e.discountedGain)}</td>
                  <td style={{...S.td,fontSize:10,color:C.dim,maxWidth:200}}>{e.notes}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function AddSectionAModal({ticker, holdings, onClose, onSave}) {
  const [form,setForm] = useState({ticker:ticker||"",origin:"PURCHASE",date:"",qty:"",costPerUnit:"",adjAmount:"",adjType:"increase",adjParentId:"",notes:""});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const isAMIT = form.origin==="AMIT";
  const total = isAMIT ? parseFloat(form.adjAmount)||0 : (parseFloat(form.qty)||0)*(parseFloat(form.costPerUnit)||0);
  const targetHolding = holdings[form.ticker];

  function save() {
    if(!form.ticker||!form.date||!form.origin) return;
    const parcel = { id:uid(), origin:form.origin, acquisitionDate:form.date,
      qty:isAMIT?0:parseFloat(form.qty)||0,
      costPerUnit:isAMIT?0:parseFloat(form.costPerUnit)||0,
      totalCost:parseFloat((isAMIT?parseFloat(form.adjAmount):total).toFixed(2)),
      status:"active", sourceActionId:null, sourceRightsId:null, replacesParcelId:null, notes:form.notes };
    const adj = isAMIT ? { id:uid(), parcelId:form.adjParentId, sourceActionId:null,
      type:form.adjType, amount:Math.abs(parseFloat(form.adjAmount)||0),
      amountPerUnit:0, effectiveDate:form.date, origin:"AMIT", notes:form.notes } : null;
    onSave(form.ticker, parcel, adj);
    onClose();
  }

  return (
    <div style={S.modal}>
      <div style={S.modalBox}>
        <div style={S.modalHead}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:C.text}}>Add Acquisition Parcel</div>
            <div style={{fontSize:11,color:C.dim,marginTop:2}}>Investor-initiated acquisition or ETF AMIT cost base adjustment</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.dim,fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
        <div style={S.formGrid}>
          <div style={S.formGroup}>
            <label style={S.label}>Security</label>
            <select style={S.select} value={form.ticker} onChange={e=>set("ticker",e.target.value)}>
              <option value="">Select…</option>
              {Object.keys(holdings).map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div style={{...S.formGroup,gridColumn:"span 2"}}>
            <label style={S.label}>Acquisition origin</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {SECTION_A_ORIGINS.map(o=>(
                <button key={o} onClick={()=>set("origin",o)} style={{...S.pill(o),cursor:"pointer",opacity:form.origin===o?1:0.4,outline:form.origin===o?`2px solid ${ORIGINS[o].color}`:"none",outlineOffset:2}}>
                  {ORIGINS[o].icon} {ORIGINS[o].short}
                </button>
              ))}
            </div>
          </div>
          <div style={S.formGroup}><label style={S.label}>Date</label><input type="date" style={S.input} value={form.date} onChange={e=>set("date",e.target.value)}/></div>
          {!isAMIT&&<><div style={S.formGroup}><label style={S.label}>Units</label><input type="number" style={S.input} value={form.qty} onChange={e=>set("qty",e.target.value)}/></div>
          <div style={S.formGroup}><label style={S.label}>Cost/Unit ($)</label><input type="number" style={S.input} value={form.costPerUnit} onChange={e=>set("costPerUnit",e.target.value)}/></div>
          <div style={S.formGroup}><label style={S.label}>Total Cost (auto)</label><div style={{...S.input,color:C.blue}}>${fmt(total)}</div></div></>}
          {isAMIT&&<>
            <div style={S.formGroup}><label style={S.label}>Adjustment Type</label>
              <select style={S.select} value={form.adjType} onChange={e=>set("adjType",e.target.value)}>
                <option value="increase">Increase (positive AMMA)</option><option value="decrease">Decrease (negative AMMA)</option>
              </select>
            </div>
            <div style={S.formGroup}><label style={S.label}>Total Adjustment ($)</label><input type="number" style={S.input} value={form.adjAmount} onChange={e=>set("adjAmount",e.target.value)}/></div>
            <div style={S.formGroup}><label style={S.label}>Linked Parcel</label>
              <select style={S.select} value={form.adjParentId} onChange={e=>set("adjParentId",e.target.value)}>
                <option value="">Select parent parcel…</option>
                {targetHolding?.parcels.filter(p=>p.status==="active").map(p=><option key={p.id} value={p.id}>{p.id} — {fmtDate(p.acquisitionDate)} — {p.qty}u — ${fmt(p.totalCost)}</option>)}
              </select>
            </div>
          </>}
          <div style={{...S.formGroup,gridColumn:"1/-1"}}><label style={S.label}>Notes</label><input type="text" style={S.input} value={form.notes} onChange={e=>set("notes",e.target.value)}/></div>
        </div>
        {form.origin==="BONUS"&&<div style={{...S.callout("167,139,250"),margin:"0 18px 14px"}}>Bonus shares from share capital → cost base $0. From profits → cost base = dividend (also assessable income).</div>}
        {form.origin==="BSP"&&<div style={{...S.callout("240,171,252"),margin:"0 18px 14px"}}>Bonus Share Plan (s.6BA): acquisition date <strong>relates back</strong> to the original parcel — enter the ORIGINAL holding's acquisition date so the 12-month discount clock is correct. Cost base = the dividend forgone.</div>}
        {isAMIT&&<div style={{...S.callout("45,212,191"),margin:"0 18px 14px"}}>AMIT: no new parcel created. Records a ParcelAdjustment against the linked parcel. Process every FY from AMMA statement.</div>}
        <div style={{padding:"14px 18px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={S.btn("secondary")} onClick={onClose}>Cancel</button>
          <button style={S.btn()} onClick={save}>Save</button>
        </div>
      </div>
    </div>
  );
}

function ApplyActionModal({ticker, holdings, onClose, onApply}) {
  const todayISO = new Date().toISOString().slice(0,10);
  // Sensible default dates so record/effective/payment fields are never blank
  // (previously undefined until the user picked, which silently dropped events).
  const defaultDatesFor = (t) => {
    const d = { recordDate: todayISO };
    if (t==="CONSOLIDATION"||t==="DEMERGER"||t==="TAKEOVER") d.effectiveDate = todayISO;
    if (t==="CAPITAL_RETURN") d.paymentDate = todayISO;
    return d;
  };
  const [actionType,setActionType] = useState("CAPITAL_RETURN");
  const [params,setParams] = useState(()=>defaultDatesFor("CAPITAL_RETURN"));
  // P0 fix: the header-triggered flow previously defaulted to the first holding
  // by object-key order with no visible selector — silently acting on the wrong
  // ticker. Security is now an explicit, always-visible choice.
  const [tk,setTk] = useState(ticker || Object.keys(holdings)[0] || "");
  const sp = (k,v) => setParams(p=>({...p,[k]:v}));
  const pickType = (t) => { setActionType(t); setParams(defaultDatesFor(t)); };
  const dim = CA_DIMENSIONS[actionType]||{};

  function doApply() {
    if(!tk) return;
    onApply(tk, actionType, params);
    onClose();
  }

  const renderParams = () => {
    switch(actionType) {
      case "SPLIT": return (<>
        <div style={S.formGroup}><label style={S.label}>Split Ratio (e.g. 2 for 2:1)</label><input type="number" style={S.input} placeholder="2" onChange={e=>sp("splitRatio",parseFloat(e.target.value))}/></div>
        <div style={S.formGroup}><label style={S.label}>Record Date</label><input type="date" style={S.input} value={params.recordDate||""} onChange={e=>sp("recordDate",e.target.value)}/></div>
      </>);
      case "CONSOLIDATION": return (<>
        <div style={S.formGroup}><label style={S.label}>Consolidation Ratio (e.g. 5 for 5:1)</label><input type="number" style={S.input} onChange={e=>sp("consolidationRatio",parseFloat(e.target.value))}/></div>
        <div style={S.formGroup}><label style={S.label}>Record Date</label><input type="date" style={S.input} value={params.recordDate||""} onChange={e=>sp("recordDate",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Effective Date</label><input type="date" style={S.input} value={params.effectiveDate||""} onChange={e=>sp("effectiveDate",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Class Ruling Ref</label><input type="text" style={S.input} placeholder="CR 20XX/XX" onChange={e=>sp("classRulingRef",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Rollover Available?</label>
          <select style={S.select} onChange={e=>sp("rolloverAvailable",e.target.value==="yes")}>
            <option value="yes">Yes — rollover per class ruling</option><option value="no">No — CGT C2/B1 applies</option>
          </select>
        </div>
      </>);
      case "CAPITAL_RETURN": return (<>
        <div style={S.formGroup}><label style={S.label}>Return Per Share ($)</label><input type="number" style={S.input} placeholder="3.50" onChange={e=>sp("returnPerShare",parseFloat(e.target.value))}/></div>
        <div style={S.formGroup}><label style={S.label}>Record Date</label><input type="date" style={S.input} value={params.recordDate||""} onChange={e=>sp("recordDate",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Payment Date</label><input type="date" style={S.input} value={params.paymentDate||""} onChange={e=>sp("paymentDate",e.target.value)}/></div>
      </>);
      case "DEMERGER": return (<>
        <div style={S.formGroup}><label style={S.label}>Demerged Ticker</label><input type="text" style={S.input} placeholder="e.g. S32" onChange={e=>sp("demergedTicker",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Demerged Entity Name</label><input type="text" style={S.input} onChange={e=>sp("demergedEntityName",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Apportionment % (to demerged)</label><input type="number" style={S.input} placeholder="0.30" onChange={e=>sp("apportionmentPct",parseFloat(e.target.value))}/></div>

        <div style={S.formGroup}><label style={S.label}>Record Date</label><input type="date" style={S.input} value={params.recordDate||""} onChange={e=>sp("recordDate",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Effective Date</label><input type="date" style={S.input} value={params.effectiveDate||""} onChange={e=>sp("effectiveDate",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Class Ruling Ref</label><input type="text" style={S.input} placeholder="CR 20XX/XX" onChange={e=>sp("classRulingRef",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Div 125 Rollover?</label>
          <select style={S.select} value={params.rolloverElected===false?"no":"yes"} onChange={e=>sp("rolloverElected",e.target.value==="yes")}>
            <option value="yes">Yes — rollover elected</option><option value="no">No — CGT A1 on disposal</option>
          </select>
        </div>
        {params.rolloverElected===false && (
          <div style={S.formGroup}><label style={S.label}>Demerged MV ($/share)</label><input type="number" style={S.input} placeholder="from class ruling" value={params.demergedMVPerShare||""} onChange={e=>sp("demergedMVPerShare",parseFloat(e.target.value)||0)}/>
            <span style={{fontSize:9,color:C.muted,marginTop:3}}>A1 proceeds = MV × shares received (s.116-20). Leave blank only if MV unknown.</span>
          </div>
        )}
      </>);
      case "TAKEOVER": return (<>
        <div style={S.formGroup}><label style={S.label}>Acquirer Ticker</label><input type="text" style={S.input} onChange={e=>sp("acquirerTicker",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Acquirer Entity Name</label><input type="text" style={S.input} onChange={e=>sp("acquirerEntityName",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Exchange Ratio (acquirer per target)</label><input type="number" style={S.input} placeholder="0.67" onChange={e=>sp("exchangeRatio",parseFloat(e.target.value))}/></div>

        <div style={S.formGroup}><label style={S.label}>Acquirer Share Price at Exchange</label><input type="number" style={S.input} onChange={e=>sp("acquirerSharePrice",parseFloat(e.target.value))}/></div>
        <div style={S.formGroup}><label style={S.label}>Record Date</label><input type="date" style={S.input} value={params.recordDate||""} onChange={e=>sp("recordDate",e.target.value)}/></div>
        <div style={S.formGroup}><label style={S.label}>Effective Date</label><input type="date" style={S.input} value={params.effectiveDate||""} onChange={e=>sp("effectiveDate",e.target.value)}/></div>
        <div style={{...S.formGroup,gridColumn:"1/-1"}}>
          <label style={S.label}>Per-Parcel Rollover Elections (Dim ④ — user designates)</label>
          <div style={{padding:"8px 12px",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:5,fontSize:11,color:C.dim}}>
            {holdings[tk]?.parcels.filter(p=>p.status==="active").map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:`1px solid ${C.border2}`}}>
                <input type="checkbox" defaultChecked onChange={e=>sp("parcelRolloverElections",{...(params.parcelRolloverElections||{}), [p.id]:e.target.checked})}/>

                <Pill origin={p.origin}/> <span>{fmtDate(p.acquisitionDate)}</span> <span>{fmt(p.qty,0)}u</span>

              </div>
            ))}
          </div>
        </div>
      </>);
      default: return null;
    }
  };

  return (
    <div style={S.modal}>
      <div style={{...S.modalBox,width:"min(780px,98vw)"}}>
        <div style={S.modalHead}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:C.text}}>Apply Corporate Action — {tk||"select security"}</div>
            <div style={{fontSize:11,color:C.dim,marginTop:2}}>Company-initiated transformation. All 7 CGT dimensions applied.</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.dim,fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{...S.label,marginBottom:8}}>Security</div>
          <select value={tk} onChange={e=>setTk(e.target.value)} style={{...S.select,maxWidth:320}}>
            {Object.values(holdings).map(h=>(
              <option key={h.ticker} value={h.ticker}>{h.ticker} — {h.name} ({h.parcels.filter(p=>p.status==="active").length} active parcels)</option>

          </select>
          {!ticker && <div style={{fontSize:10,color:C.amber,marginTop:6,fontFamily:"'IBM Plex Mono',monospace"}}>⚠ Confirm the target security before applying — this action rewrites its parcels.</div>}

        <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{...S.label,marginBottom:8}}>Action type</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {SECTION_B_ORIGINS.map(o=>(
              <button key={o} onClick={()=>pickType(o)} style={{...S.pill(o),cursor:"pointer",opacity:actionType===o?1:0.4,outline:actionType===o?`2px solid ${ORIGINS[o].color}`:"none",outlineOffset:2}}>

          </div>
        </div>
        <div style={{padding:"10px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:8,flexWrap:"wrap"}}>
          {[["① New Parcel",dim.createsParcel],["② Qty",dim.changesQty],["③ CB",dim.reapportionsCB],["④ User Sel.",dim.userDesignates],["⑤ All",dim.allParcels],["⑥ Disposal",dim.forcesDisposal],["⑦ Exchange",dim.exchanges]].map(([l,v])=>(
            <div key={l} style={{fontSize:10,padding:"3px 8px",borderRadius:3,background:C.surface2,border:`1px solid ${C.border}`,display:"flex",gap:4,alignItems:"center"}}>
              <span>{v===true?"🟢":v===false?"⚫":"🟡"}</span><span style={{color:C.dim,fontFamily:"'IBM Plex Mono',monospace"}}>{l}</span>
            </div>
          ))}
        </div>
        {actionType==="CAPITAL_RETURN"&&<div style={{...S.callout("248,113,113"),margin:"14px 18px 0"}}>Applied to ALL parcels at record date automatically. No parcel selection (Dim ④ = No). If effective cost base &lt; $0 → CGT event G1 triggered.</div>}
        {actionType==="DEMERGER"&&<div style={{...S.callout("232,121,249"),margin:"14px 18px 0"}}>Apportionment % must come from ATO Class Ruling. New parcels created in demerged entity. Original parcel cost base reduced. Acquisition date inherited if rollover elected.</div>}
        {actionType==="TAKEOVER"&&<div style={{...S.callout("148,163,184"),margin:"14px 18px 0"}}>Only action where user designates per parcel (Dim ④ = Yes). Cash component cannot be rolled — always triggers A1. Rollover parcels inherit original acquisition date and cost base.</div>}
        {actionType==="SPLIT"&&<div style={{...S.callout("56,189,248"),margin:"14px 18px 0"}}>No new parcels created. All existing parcels modified in place. Acquisition dates and discount eligibility preserved (no CGT event).</div>}
        {actionType==="CONSOLIDATION"&&<div style={{...S.callout("251,146,60"),margin:"14px 18px 0"}}>All parcels cancelled (C2) and replaced by one new parcel (B1). Check Class Ruling for rollover relief. Without rollover, gains/losses crystallise on each cancelled parcel.</div>}
        <div style={S.formGrid}>{renderParams()}</div>
        <div style={{padding:"14px 18px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={S.btn("secondary")} onClick={onClose}>Cancel</button>
          <button style={S.btn("orange")} onClick={doApply}>Apply Action</button>
        </div>
      </div>
    </div>
  );
}

const DISPOSAL_METHODS = [
  { id:"FIFO",   label:"FIFO",    hint:"Oldest parcels first" },
  { id:"LIFO",   label:"LIFO",    hint:"Newest parcels first" },
  { id:"MAXCGT", label:"Max CGT", hint:"Lowest cost-base parcels first — largest taxable gain" },
  { id:"MINCGT", label:"Min CGT", hint:"Highest cost-base parcels first — smallest taxable gain" },
  { id:"MANUAL", label:"Manual",  hint:"Tick parcels yourself" },
];

function AddSellModal({ticker, holdings, onClose, onSell}) {
  const [tk, setTk] = useState(ticker || Object.keys(holdings)[0] || "");
  const [method, setMethod] = useState("FIFO");
  const [sellDate, setSellDate] = useState(new Date().toISOString().slice(0,10));
  const [price, setPrice] = useState("");
  const [targetQty, setTargetQty] = useState("");
  const [ticked, setTicked] = useState({});

  const holding = holdings[tk];
  const adjustments = holding?.adjustments || [];
  const activeParcels = (holding?.parcels||[]).filter(p=>p.status==="active")
    .map(p=>({...p, effCB:getEffectiveCostBase(p,adjustments)}));

  const ordered = useMemo(() => {
    const arr = [...activeParcels];
    if (method==="FIFO")   arr.sort((a,b)=>new Date(a.acquisitionDate)-new Date(b.acquisitionDate));
    if (method==="LIFO")   arr.sort((a,b)=>new Date(b.acquisitionDate)-new Date(a.acquisitionDate));
    if (method==="MAXCGT") arr.sort((a,b)=>a.effCB-b.effCB);
    if (method==="MINCGT") arr.sort((a,b)=>b.effCB-a.effCB);
    return arr;
  }, [tk, method, holding]);

  // Auto pre-tick parcels in method order to roughly cover the target quantity.
  // Whole-parcel granularity (no partial-parcel splitting) — matches how disposals
  // are modelled everywhere else in this register. Always overridable by hand.
  useEffect(() => {
    if (method==="MANUAL") return;
    const target = parseFloat(targetQty)||0;
    let running = 0; const next = {};
    for (const p of ordered) {
      if (target>0 && running>=target) break;
      next[p.id]=true; running+=p.qty;
    }
    setTicked(next);
  }, [method, targetQty, tk]);

  const toggle = (id) => setTicked(t=>({...t,[id]:!t[id]}));
  const selectedParcels = ordered.filter(p=>ticked[p.id]);
  const selectedQty = selectedParcels.reduce((s,p)=>s+p.qty,0);
  const pricePerUnit = parseFloat(price)||0;

  function doSell() {
    if (!tk || selectedParcels.length===0 || !sellDate) return;
    onSell(tk, selectedParcels.map(p=>p.id), { sellDate, pricePerUnit, method });
    onClose();
  }

  return (
    <div style={S.modal}>
      <div style={{...S.modalBox,width:"min(720px,98vw)"}}>
        <div style={S.modalHead}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:C.text}}>Record a Sale — {tk||"select security"}</div>
            <div style={{fontSize:11,color:C.dim,marginTop:2}}>Manual disposal entry. Mocked allocation — demonstrates ordering only, not wired to the cost-base engine.</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.dim,fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{...S.label,marginBottom:8}}>Security</div>
          <select value={tk} onChange={e=>setTk(e.target.value)} style={{...S.select,maxWidth:320}}>
            <option value="">Select…</option>
            {Object.values(holdings).map(h=>(
              <option key={h.ticker} value={h.ticker}>{h.ticker} — {h.name} ({h.parcels.filter(p=>p.status==="active").length} active parcels)</option>
            ))}
          </select>
        </div>
        <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{...S.label,marginBottom:8}}>Disposal method</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {DISPOSAL_METHODS.map(m=>(
              <button key={m.id} onClick={()=>setMethod(m.id)} title={m.hint}
                style={{...S.btn("teal"),cursor:"pointer",opacity:method===m.id?1:0.4,outline:method===m.id?`2px solid ${C.teal}`:"none",outlineOffset:2}}>
                {m.label}
              </button>
            ))}
          </div>
          <div style={{fontSize:10,color:C.muted,marginTop:6}}>{DISPOSAL_METHODS.find(m=>m.id===method)?.hint}</div>
        </div>
        <div style={S.formGrid}>
          <div style={S.formGroup}><label style={S.label}>Sell Date</label><input type="date" style={S.input} value={sellDate} onChange={e=>setSellDate(e.target.value)}/></div>
          <div style={S.formGroup}><label style={S.label}>Sell Price / Unit ($)</label><input type="number" style={S.input} value={price} onChange={e=>setPrice(e.target.value)}/></div>
          <div style={S.formGroup}><label style={S.label}>Target Quantity</label><input type="number" style={S.input} value={targetQty} placeholder="guide only" disabled={method==="MANUAL"} onChange={e=>setTargetQty(e.target.value)}/></div>
        </div>
        <div style={{padding:"0 18px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6,flexWrap:"wrap",gap:6}}>
            <label style={S.label}>Parcels to dispose ({method==="MANUAL"?"tick manually":`auto-ticked · ${DISPOSAL_METHODS.find(m=>m.id===method)?.label}`})</label>
            <span style={{...S.mono,fontSize:11,color:(targetQty&&selectedQty<parseFloat(targetQty))?C.amber:C.teal}}>Selected: {fmt(selectedQty,0)}{targetQty?` / ${targetQty}`:""} units</span>
          </div>
          <div style={{padding:"4px 12px",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:5,fontSize:11,color:C.dim,maxHeight:220,overflowY:"auto"}}>
            {ordered.length===0 ? <div style={{padding:"10px 0",color:C.muted}}>No active parcels for this security.</div> :
            ordered.map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:`1px solid ${C.border2}`}}>
                <input type="checkbox" checked={!!ticked[p.id]} onChange={()=>toggle(p.id)}/>
                <span style={{...S.mono,fontSize:10}}>{p.id}</span>
                <Pill origin={p.origin}/> <span>{fmtDate(p.acquisitionDate)}</span> <span>{fmt(p.qty,0)}u</span>
                <span style={{color:C.blue}}>eff. CB ${fmt(p.effCB)}</span>
                <span style={{...S.discBadge(discountEligible(p.acquisitionDate)),fontSize:9}}>{discountEligible(p.acquisitionDate)?"✓ disc":"✗ full"}</span>
                {pricePerUnit>0 && <span style={{marginLeft:"auto",color:(pricePerUnit*p.qty-p.effCB)>=0?C.teal:C.red}}>
                  {(pricePerUnit*p.qty-p.effCB)>=0?"+":"−"}${fmt(Math.abs(pricePerUnit*p.qty-p.effCB))}
                </span>}
              </div>
            ))}
          </div>
        </div>
        <div style={{padding:"14px 18px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={S.btn("secondary")} onClick={onClose}>Cancel</button>
          <button style={{...S.btn("teal"),opacity:selectedParcels.length?1:0.5,cursor:selectedParcels.length?"pointer":"not-allowed"}} disabled={!selectedParcels.length} onClick={doSell}>− Record Sale ({selectedParcels.length} parcel{selectedParcels.length===1?"":"s"})</button>
        </div>
      </div>
    </div>
  );
}

function SummaryView({holdings, rights, cgtEvents, onOpenHolding, recon, onReconcile, reconciliationOpen, onStartReconcilingPeriod, onRollback, onOpenAPI, onOpenImportDoc, onOpenAddParcel, onOpenAddSell, onOpenApplyAction, onOpenAIReview, onOpenCGTReport}) {
  const { sort, toggle, sorted } = useSort();
  const [marker, setMarker]     = useState(recon?.marker || "");
  const [preparer, setPreparer] = useState(recon?.preparer || "");
  const markReconciled = () => {
    if (!preparer.trim()) return;
    onReconcile && onReconcile({ marker: marker.trim(), preparer: preparer.trim(), timestamp: new Date().toISOString() });
  };
  const allActiveParcels = Object.values(holdings).flatMap(h=>h.parcels.filter(p=>p.status==="active").map(p=>({...p,ticker:h.ticker,adjustments:h.adjustments})));
  const totalCB = allActiveParcels.reduce((s,p)=>s+getEffectiveCostBase(p,p.adjustments),0);
  const totalQty = allActiveParcels.reduce((s,p)=>s+p.qty,0);
  const discParcs = allActiveParcels.filter(p=>discountEligible(p.acquisitionDate)).length;
  const pendingRights = rights.filter(r=>r.outcome==="PENDING");
  const allCGT = [...cgtEvents,...Object.values(holdings).flatMap(h=>h.cgtEvents||[])];
  const totalGain = allCGT.reduce((s,e)=>s+(e.capitalGain||0),0);

  const originCounts = {};
  allActiveParcels.forEach(p=>{ originCounts[p.origin]=(originCounts[p.origin]||0)+1; });

  const WORKFLOW_STAGES = [
    { n:1, label:"Reconcile inputs" },
    { n:2, label:"Review parcels & corp. actions" },
    { n:3, label:"Resolve CGT events" },
    { n:4, label:"Generate report" },
    { n:5, label:"Mark reconciled" },
  ];
  const currentStage = reconciliationOpen ? 1 : (recon ? 5 : 1);

  return (
    <div>
      <div style={S.pageTitle}>📊 Portfolio Dashboard</div>
      <div style={S.pageSub}>Aggregate view across all sections — parcels, corporate actions, rights, CGT events</div>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:14,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {WORKFLOW_STAGES.map(s=>{
            const active = s.n===currentStage;
            return (
              <div key={s.n} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,
                fontSize:11,fontFamily:"'IBM Plex Mono',monospace",fontWeight:active?700:500,
                background:active?"rgba(52,211,153,0.12)":C.surface2,
                border:`1px solid ${active?C.teal:C.border}`,color:active?C.teal:C.muted}}>
                <span style={{opacity:0.6}}>{s.n}</span> {s.label}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
          <button style={S.btn("teal")} onClick={onOpenCGTReport}>📄 CGT Report</button>
          <span style={{fontSize:9.5,color:C.muted,fontFamily:"'IBM Plex Mono',monospace"}}>Output for tax return</span>
        </div>
      </div>

      <div data-tour="tour-reconciliation" style={{...S.panel,padding:"14px 18px",marginBottom:20,borderLeft:`3px solid ${recon?C.teal:C.amber}`,overflow:"visible"}}>
        <div style={{...S.summLabel,marginBottom:12}}>Reconciliation Workflow Central</div>

        {reconciliationOpen && (
          <div data-tour="tour-reconciliation-actions" style={{marginBottom:14,paddingBottom:14,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,color:C.blue,display:"inline-flex",alignItems:"center",gap:6}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:C.blue,display:"inline-block"}}/> Reconciling…
            </span>
            <DownloadTransactionsButton onAPI={onOpenAPI} onImportDoc={onOpenImportDoc}/>
            <ManualModeButton onAddParcel={onOpenAddParcel} onAddSell={onOpenAddSell} onApplyAction={onOpenApplyAction}/>
            <button style={{...S.btn("purple"),background:"rgba(167,139,250,0.12)"}} onClick={onOpenAIReview}>🤖 AI Review</button>
            <button style={{...S.btn(),color:C.red,borderColor:"rgba(248,113,113,0.4)"}} onClick={onRollback}>↺ Rollback</button>
          </div>
        )}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:16,flexWrap:"wrap"}}>
          <div style={{minWidth:220}}>
            {recon ? (
              <div style={{lineHeight:1.7}}>
                <div style={{fontSize:12}}>
                  <span style={{color:C.teal,fontWeight:700}}>✓ Last reconciled</span>
                  {recon.marker && <span style={{...S.mono,marginLeft:8,color:C.blue,fontWeight:600}}>{recon.marker}</span>}
                </div>
                <div style={{fontSize:11,color:C.dim,fontFamily:"'IBM Plex Mono',monospace",marginTop:3}}>
                  {new Date(recon.timestamp).toLocaleString()} · by {recon.preparer}
                </div>
                <div style={{fontSize:10,color:C.muted,marginTop:5}}>
                  ↺ Rollback position backup available — restores parcels, corporate actions, rights &amp; CGT events to this stamp
                </div>
              </div>
            ) : (
              <div style={{fontSize:12,color:C.muted}}>Not yet reconciled — enter a marker and preparer name, then stamp this summary.</div>
            )}
          </div>
          <div data-tour="tour-reconcile-complete" style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div>
              <div style={{...S.summLabel,marginBottom:4}}>Reconciled marker / ref</div>
              <input style={{...S.input,width:170}} value={marker} placeholder="e.g. WP-2026-Q2" onChange={e=>setMarker(e.target.value)}/>
            </div>
            <div>
              <div style={{...S.summLabel,marginBottom:4}}>Preparer name</div>
              <input style={{...S.input,width:150}} value={preparer} placeholder="Your name" onChange={e=>setPreparer(e.target.value)}/>
            </div>
            <button style={{...S.btn("teal"),opacity:preparer.trim()?1:0.5,cursor:preparer.trim()?"pointer":"not-allowed"}} disabled={!preparer.trim()} onClick={markReconciled}>✓ Mark reconciled</button>
            {!reconciliationOpen && <button style={S.btn()} onClick={onStartReconcilingPeriod}>+ Start new reconciling period</button>}
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:12,marginBottom:24}}>
        {[["Holdings",Object.keys(holdings).length,C.blue],["Active Parcels",allActiveParcels.length,C.purple],
          ["Eff. Cost Base",`$${fmt(totalCB)}`,C.teal],["Disc. Eligible",`${discParcs}/${allActiveParcels.length}`,C.green],
          ["Pending Rights",pendingRights.length,pendingRights.length>0?C.red:C.muted],
          ["CGT Events",allCGT.length,C.amber],["Total Gains",`$${fmt(totalGain)}`,C.gold]
        ].map(([l,v,c])=>(
          <div key={l} style={{...S.panel,padding:"14px 16px",marginBottom:0}}>
            <div style={{...S.summLabel,marginBottom:5}}>{l}</div>
            <div style={{...S.mono,fontSize:17,fontWeight:700,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:20}}>
        {[["A","Acquisition Parcels",SECTION_A_ORIGINS.filter(o=>originCounts[o]).map(o=>`${originCounts[o]}× ${ORIGINS[o].short}`).join(", ")||"—",C.blue],
          ["B","Corporate Action Parcels",SECTION_B_ORIGINS.filter(o=>originCounts[o]).map(o=>`${originCounts[o]}× ${ORIGINS[o].short}`).join(", ")||"—",C.orange],
          ["C","Rights-exercised Parcels",SECTION_C_ORIGINS.filter(o=>originCounts[o]).map(o=>`${originCounts[o]}× ${ORIGINS[o].short}`).join(", ")||"—","#c084fc"],
        ].map(([sec,label,detail,color])=>(
          <div key={sec} style={{...S.panel,padding:"14px 16px",marginBottom:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <SectionTag section={sec}/><span style={{fontSize:12,fontWeight:500}}>{label}</span>
            </div>
            <div style={{fontSize:11,color:C.dim,fontFamily:"'IBM Plex Mono',monospace"}}>{detail}</div>
          </div>
        ))}
      </div>
      <div style={S.panel}>
        <div style={{padding:"10px 18px",borderBottom:`1px solid ${C.border}`,fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.muted,fontFamily:"'IBM Plex Mono',monospace"}}>Per-Holding Breakdown{onOpenHolding&&<span style={{textTransform:"none",letterSpacing:0,marginLeft:8,color:C.muted,fontSize:9}}>· click a row to open its parcels</span>}</div>
        {Object.keys(holdings).length===0 ? (
          <EmptyState icon="📊" title="No holdings for this client yet"
            hint="Add a parcel or import a contract note to start building this client's cost-base history."/>
        ) : (
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr>
            <SortTh label="Ticker" sortKey="ticker" sort={sort} toggle={toggle}/>
            <SortTh label="Type" sortKey="type" sort={sort} toggle={toggle}/>
            <SortTh label="Active Units" sortKey="units" sort={sort} toggle={toggle} align="right"/>
            <SortTh label="Eff. Cost Base" sortKey="cb" sort={sort} toggle={toggle} align="right"/>
            <SortTh label="Avg $/Unit" sortKey="avg" sort={sort} toggle={toggle} align="right"/>
            <th style={S.th}>Parcels (active/total)</th>
            <th style={S.th}>Actions</th><th style={S.th}>Rights</th><th style={S.th}>Origins</th>
          </tr></thead>
          <tbody>
            {sorted(Object.values(holdings).map(h=>{
              const active=h.parcels.filter(p=>p.status==="active");
              const qty=active.reduce((s,p)=>s+p.qty,0);
              const cb=active.reduce((s,p)=>s+getEffectiveCostBase(p,h.adjustments),0);
              return {h, active, qty, cb, avg: qty>0?cb/qty:0,
                ticker:h.ticker, type:h.type, units:qty,
                origins:[...new Set(h.parcels.map(p=>p.origin))],
                hRights:rights.filter(r=>r.holdingId===h.id)};
            }), {ticker:r=>r.ticker,type:r=>r.type,units:r=>r.units,cb:r=>r.cb,avg:r=>r.avg}).map(r=>{
              const {h,active,qty,cb,origins,hRights}=r;
              return (
                <tr key={h.ticker} className={onOpenHolding?"client-row":undefined}
                  style={onOpenHolding?{cursor:"pointer"}:undefined}
                  onClick={onOpenHolding?()=>onOpenHolding(h.ticker):undefined}>
                  <td style={{...S.td,...S.mono,fontWeight:700,color:h.type==="ETF"?C.cyan:C.blue}}>{h.ticker}</td>
                  <td style={S.td}><span style={S.sectionTag("A")}>{h.type}</span></td>
                  <td style={{...S.td,...S.mono,textAlign:"right"}}>{fmt(qty,0)}</td>
                  <td style={{...S.td,...S.mono,textAlign:"right",color:C.blue,fontWeight:500}}>${fmt(cb)}</td>
                  <td style={{...S.td,...S.mono,textAlign:"right",fontSize:11}}>${qty>0?fmt(cb/qty):"—"}</td>
                  <td style={{...S.td,...S.mono,fontSize:11,color:C.dim}}>{active.length}/{h.parcels.length}</td>
                  <td style={{...S.td,...S.mono,fontSize:11,color:C.dim}}>{(h.actions||[]).length}</td>
                  <td style={{...S.td,...S.mono,fontSize:11,color:C.dim}}>{hRights.length}</td>
                  <td style={S.td}><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{origins.map(o=><Pill key={o} origin={o}/>)}</div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// CGT REPORT ENGINE (FY schedule builder — Phase 3 will add provenance chips)
// ═══════════════════════════════════════════════════════════════════════════════
const FY_OPTIONS = [
  { label:"2019-20", start:"2019-07-01", end:"2020-06-30" },
  { label:"2020-21", start:"2020-07-01", end:"2021-06-30" },
  { label:"2021-22", start:"2021-07-01", end:"2022-06-30" },
  { label:"2022-23", start:"2022-07-01", end:"2023-06-30" },
  { label:"2023-24", start:"2023-07-01", end:"2024-06-30" },
  { label:"2024-25", start:"2024-07-01", end:"2025-06-30" },
  { label:"2025-26", start:"2025-07-01", end:"2026-06-30" },
];

function defaultMTR(entityType) {
  if (entityType === "Company") return 0.30;
  if (entityType === "SMSF")    return 0.15;
  return 0.47;
}

function discountRate(entityType) {
  if (entityType === "Company") return 0;
  if (entityType === "SMSF")    return 1/3;
  return 0.5;
}

// Per-FY assessable-gain rollup for a client, from their committed holdings'
// disposed parcels + cgtEvents. Top-level (not nested in TaxObligationDashboard)
// so Phase 5's Autopilot push (App.handleCommitReconstruction) can call the exact
// same computation the Tax Obligations tab displays — one source of truth for
// "what does this client owe," not two parallel implementations that could drift.
function getClientObligations(client, holdings) {
  const clientHoldings = (client.holdingIds||[]).map(id=>holdings[id]).filter(Boolean);
  const obligations = [];

  FY_OPTIONS.forEach(fy => {
    const fyStart = new Date(fy.start);
    const fyEnd   = new Date(fy.end);
    let disposals=0, gains=0, losses=0, assessable=0;
    clientHoldings.forEach(h => {
      h.parcels.filter(p=>(p.status==="disposed"||p.status==="cancelled")&&p.disposalDate).forEach(p=>{
        const d=new Date(p.disposalDate);
        if(d>=fyStart&&d<=fyEnd) disposals++;
      });
      (h.cgtEvents||[]).forEach(ev=>{
        const d=new Date(ev.eventDate);
        if(d>=fyStart&&d<=fyEnd){
          gains   += ev.capitalGain  ||0;
          losses  += ev.capitalLoss  ||0;
        }
      });
    });

    const dr = discountRate(client.entityType);
    assessable = Math.max(0, (gains - losses)) * (1 - dr);

    if(disposals>0||gains>0||losses>0){
      obligations.push({
        fy: fy.label, fyObj:fy,
        disposals, grossGains:gains, grossLosses:losses, assessable,
        hasObligation: gains>0||losses>0,
        netPosition: gains-losses,
      });
    }
  });
  return obligations.sort((a,b)=>b.fy.localeCompare(a.fy));
}

function buildCGTSchedule(client, holdings, fyStart, fyEnd) {
  const fyStartD = new Date(fyStart);
  const fyEndD   = new Date(fyEnd);
  const rows = [];

  (client.holdingIds || []).forEach(hid => {
    const holding = holdings[hid];
    if (!holding) return;

    holding.parcels.forEach(parcel => {
      if (parcel.status !== "disposed" && parcel.status !== "cancelled") return;
      const cgtEvent = holding.cgtEvents?.find(e =>
        e.notes?.includes(parcel.id) || e.actionId === parcel.sourceActionId
      );
      const disposalDate = parcel.disposalDate || cgtEvent?.eventDate || fyEnd;
      const disposalD = new Date(disposalDate);
      if (disposalD < fyStartD || disposalD > fyEndD) return;

      const effCB     = getEffectiveCostBase(parcel, holding.adjustments);
      const proceeds  = cgtEvent ? cgtEvent.proceeds : effCB * 1.0;
      const rawGain   = proceeds - effCB;
      const heldDays  = Math.floor((disposalD - new Date(parcel.acquisitionDate)) / 86400000);
      const held12m   = heldDays >= 365;
      const disc      = discountRate(client.entityType);
      const method    = !held12m || disc === 0 ? "Other" : rawGain > 0 ? "Discount" : "Other";

      let grossGain = 0, grossLoss = 0, discountApplied = 0, assessableGain = 0;
      if (rawGain >= 0) {
        grossGain = rawGain;
        discountApplied = held12m && disc > 0 ? rawGain * disc : 0;
        assessableGain  = rawGain - discountApplied;
      } else {
        grossLoss = Math.abs(rawGain);
      }

      rows.push({
        parcelId: parcel.id, ticker: holding.ticker, assetName: holding.name,
        assetType: holding.type, origin: parcel.origin,
        acquisitionDate: parcel.acquisitionDate, disposalDate,
        qty: parcel.qty, costBase: effCB, proceeds, rawGain, heldDays, held12m, method,
        grossGain, grossLoss, discountApplied, assessableGain,
        cgtEventType: cgtEvent?.eventType || "A1",
        deferredLoss: cgtEvent?.deferredLoss || 0,
        quarantinedLoss: cgtEvent?.quarantinedLoss || 0,
      });
    });

    (holding.cgtEvents || []).forEach(ev => {
      const evD = new Date(ev.eventDate);
      if (evD < fyStartD || evD > fyEndD) return;
      if (rows.some(r => r.parcelId && ev.notes?.includes(r.parcelId))) return;

      const rawGain = (ev.capitalGain || 0) - (ev.capitalLoss || 0);
      const disc    = discountRate(client.entityType);
      const held12m = ev.discountEligible || false;
      let grossGain = 0, grossLoss = 0, discountApplied = 0, assessableGain = 0;
      if (rawGain >= 0) {
        grossGain = rawGain;
        discountApplied = held12m && disc > 0 ? rawGain * disc : 0;
        assessableGain  = rawGain - discountApplied;
      } else {
        grossLoss = Math.abs(rawGain);
      }

      rows.push({
        parcelId: null, ticker: holding.ticker, assetName: holding.name,
        assetType: holding.type, origin: ev.rolloverType || "CGT_EVENT",
        acquisitionDate: null, disposalDate: ev.eventDate, qty: null,
        costBase: ev.costBase || 0, proceeds: ev.proceeds || 0, rawGain,
        heldDays: null, held12m,
        method: held12m && disc > 0 && rawGain > 0 ? "Discount" : "Other",
        grossGain, grossLoss, discountApplied, assessableGain,
        cgtEventType: ev.eventType || "A1",
        deferredLoss: ev.deferredLoss || 0,
        quarantinedLoss: ev.quarantinedLoss || 0,
      });
    });
  });

  rows.sort((a,b) => new Date(a.disposalDate) - new Date(b.disposalDate));

  const totalGrossGains  = rows.reduce((s,r) => s + r.grossGain, 0);
  const totalGrossLosses = rows.reduce((s,r) => s + r.grossLoss, 0);
  const totalDiscount    = rows.reduce((s,r) => s + r.discountApplied, 0);
  const deferredLossTotal = rows.reduce((s,r) => s + (r.deferredLoss||0), 0);
  const quarantinedTotal  = rows.reduce((s,r) => s + (r.quarantinedLoss||0), 0);

  // Loss sequencing: losses offset gains BEFORE discount (s.102-5 ordering)
  const otherGains    = rows.filter(r => r.method === "Other"    && r.grossGain > 0).reduce((s,r)=>s+r.assessableGain,0);
  const discountGains = rows.filter(r => r.method === "Discount" && r.grossGain > 0).reduce((s,r)=>s+r.grossGain,0);
  let remainingLosses = totalGrossLosses;
  const netOtherAfterLoss    = Math.max(0, otherGains - remainingLosses);
  remainingLosses = Math.max(0, remainingLosses - otherGains);
  const netDiscountAfterLoss = Math.max(0, discountGains - remainingLosses);
  const netDiscountApplied   = netDiscountAfterLoss * discountRate(client.entityType);
  const netAssessableGain    = netOtherAfterLoss + (netDiscountAfterLoss - netDiscountApplied);
  const lossesCarriedForward = Math.max(0, totalGrossLosses - totalGrossGains);

  return { rows, totalGrossGains, totalGrossLosses, totalDiscount,
           netAssessableGain, lossesCarriedForward, otherGains, discountGains,
           deferredLossTotal, quarantinedTotal };
}

function buildClipboardText(client, fy, schedule) {
  const { rows, totalGrossGains, totalGrossLosses, totalDiscount, netAssessableGain, lossesCarriedForward } = schedule;
  const lines = [];
  lines.push(`CGT SCHEDULE — ${client.name} — FY ${fy}`);
  lines.push(`Entity Type: ${client.entityType}  |  TFN: ${client.tfn}  |  Generated: ${new Date().toLocaleDateString("en-AU")}`);
  lines.push('');
  lines.push(['Asset','Type','Event','Acq. Date','Disposal Date','Qty','Cost Base ($)','Proceeds ($)','Gross Gain ($)','Gross Loss ($)','Discount ($)','Assessable Gain ($)','Held','Method'].join('\t'));
  rows.forEach(r => {
    lines.push([
      r.ticker, r.assetType, r.cgtEventType,
      r.acquisitionDate ? fmtDate(r.acquisitionDate) : '—',
      fmtDate(r.disposalDate),
      r.qty != null ? r.qty : '—',
      r.costBase.toFixed(2), r.proceeds.toFixed(2),
      r.grossGain > 0 ? r.grossGain.toFixed(2) : '—',
      r.grossLoss > 0 ? r.grossLoss.toFixed(2) : '—',
      r.discountApplied > 0 ? r.discountApplied.toFixed(2) : '—',
      r.assessableGain > 0 ? r.assessableGain.toFixed(2) : '—',
      r.heldDays != null ? `${r.heldDays}d` : '—',
      r.method,
    ].join('\t'));
  });
  lines.push('');
  lines.push(['','','','','','','','TOTALS','','','','','',''].join('\t'));
  lines.push(['','','','','','','','Gross capital gains:',totalGrossGains.toFixed(2)].join('\t'));
  lines.push(['','','','','','','','Capital losses:',(-totalGrossLosses).toFixed(2)].join('\t'));
  lines.push(['','','','','','','','CGT discount applied:',(-totalDiscount).toFixed(2)].join('\t'));
  lines.push(['','','','','','','','Net assessable gain:',netAssessableGain.toFixed(2)].join('\t'));
  lines.push(['','','','','','','','Losses c/f to next FY:',(-lossesCarriedForward).toFixed(2)].join('\t'));
  lines.push('');
  lines.push('This schedule is produced by CGTrace for general guidance only. Not tax advice. Verify all figures before lodgement.');
  return lines.join('\n');
}

/* Audit-bundle CSV (Phase 3) — RFC-4180 CSV with a provenance/assumptions footer
   so the exported schedule carries its own audit trail (the dossier's
   "event-thinking-lite" claim, made portable). */
function buildAuditCSV(client, fy, schedule) {
  const { rows, totalGrossGains, totalGrossLosses, totalDiscount, netAssessableGain, lossesCarriedForward, deferredLossTotal, quarantinedTotal } = schedule;
  const q = (v) => { const s = v == null ? '' : String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const row = (arr) => arr.map(q).join(',');
  const L = [];
  L.push(row(['CGTrace — CGT audit bundle']));
  L.push(row(['Client', client.name, 'Entity', client.entityType, 'TFN', client.tfn, 'FY', fy, 'Generated', new Date().toISOString().slice(0,10)]));
  L.push(row(['Ruleset', 's.102-5 loss sequencing (current law)', 'Discount rate', Math.round(discountRate(client.entityType)*100)+'%']));
  L.push('');
  L.push(row(['Parcel/Event','Asset','Type','CGT Event','Acq. Date','Disposal Date','Qty','Cost Base','Proceeds','Gross Gain','Gross Loss','Discount','Assessable Gain','Held Days','Method','Provenance']));
  rows.forEach(r => {
    L.push(row([
      r.parcelId || '(aggregate event)', r.ticker, r.assetType, r.cgtEventType,
      r.acquisitionDate ? fmtDate(r.acquisitionDate) : '', fmtDate(r.disposalDate),
      r.qty != null ? r.qty : '',
      r.costBase.toFixed(2), r.proceeds.toFixed(2),
      r.grossGain > 0 ? r.grossGain.toFixed(2) : '',
      r.grossLoss > 0 ? r.grossLoss.toFixed(2) : '',
      r.discountApplied > 0 ? r.discountApplied.toFixed(2) : '',
      r.assessableGain > 0 ? r.assessableGain.toFixed(2) : '',
      r.heldDays != null ? r.heldDays : '',
      r.method,
      'eff. cost base = totalCost ± dated adjustments; gain = proceeds − cost base; discount & loss order per s.102-5',
    ]));
  });
  L.push('');
  L.push(row(['TOTALS','','','','','','','','', totalGrossGains.toFixed(2), totalGrossLosses.toFixed(2), totalDiscount.toFixed(2), netAssessableGain.toFixed(2)]));
  L.push(row(['Net capital losses carried forward','','','','','','','','','','','', lossesCarriedForward.toFixed(2)]));
  if (deferredLossTotal > 0) L.push(row(['Deferred loss crystallised (Bill 2026, Step 1)','','','','','','','','','','','', deferredLossTotal.toFixed(2)]));
  if (quarantinedTotal > 0)  L.push(row(['Quarantined residential loss (Bill 2026, Steps 3–4)','','','','','','','','','','','', quarantinedTotal.toFixed(2)]));
  L.push('');
  L.push(row(['AUDIT NOTES']));
  L.push(row(['1','Capital losses applied against gains BEFORE the CGT discount (s.102-5 Step 5 ordering).']));
  L.push(row(['2','Effective cost base = parcel total cost adjusted by all dated corporate-action/AMIT adjustments (getEffectiveCostBase).']));
  L.push(row(['3','Discount rate by entity: individual/trust 50%, SMSF 1/3, company 0%.']));
  L.push(row(['4','Estimated tax is indicative (entity default MTR) — excludes all other income, offsets and deductions.']));
  L.push(row(['5','Prior-year carried-forward losses not held in this system are NOT included.']));
  L.push(row(['6','Bill 2026 measures (deemed 1 Jul 2027 event, 30% min tax, CPI indexation) are PENDING and not applied to this realised-events schedule.']));
  L.push(row(['','General guidance only — not tax advice. Verify against source records before lodgement.']));
  return L.join('\n');
}

function downloadTextFile(filename, text, mime) {
  const blob = new Blob([text], { type: (mime || 'text/plain') + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function CGTReportView({ client, holdings, onClose, initialFY, pm }) {

  const [selectedFY, setSelectedFY] = useState(defaultFY);

  // Return-sync indicator — ps.ret is a single client-level slot keyed to one FY
  // (ps.ret.year), the same field pmPushCGT writes and the Tax Obligations tab
  // reads (deriveCGTStatus). Only claim "Synced" when the report's selected Tax
  // Year actually matches the FY that was pushed — otherwise switching the dropdown
  // to a different year would wrongly carry over another year's sync state.
  const ps = pm && pm.entities ? pm.entities[client.id] : null;
  const syncedThisFY = !!(ps && ps.ret.cgtPushed && ps.ret.year === selectedFY.label);
  const pushedAtStr = syncedThisFY ? fmtDateTime(ps.ret.pushedAt) : null;

  const schedule = useMemo(() =>
    buildCGTSchedule(client, holdings, selectedFY.start, selectedFY.end),
    [client, holdings, selectedFY]

          netAssessableGain, lossesCarriedForward,
          deferredLossTotal, quarantinedTotal } = schedule;

  const mtr  = defaultMTR(client.entityType);
  const estTax = netAssessableGain * mtr;

  function handleCopy() {
    const text = buildClipboardText(client, selectedFY.label, schedule);
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });

        display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12, flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <button onClick={onClose} style={{ background:"none", border:`1px solid ${C.border}`,
            color:CD.dim, fontSize:12, cursor:"pointer", borderRadius:6, padding:"6px 12px",

                : lossesCarriedForward > 0
                  ? `No net gain — $${fmt(lossesCarriedForward)} in capital losses carried forward`
                  : `No net capital gain for FY ${selectedFY.label}`;
          const detail = inProgress
            ? "This client's portfolio hasn't finished reconciling yet — the schedule below may be incomplete until reconciliation is done."
            : !hasActivity
              ? "No parcels were disposed of within this financial year for the selected client."
              : `${n} disposal event${n!==1?"s":""} · gross gains $${fmt(totalGrossGains)} · losses applied $${fmt(Math.min(totalGrossLosses,totalGrossGains))} · CGT discount $${fmt(totalDiscount)} (s.102-5 ordering). Estimated tax is indicative only.`;
          return (
            <div style={{ display:"flex", alignItems:"flex-start", gap:14, padding:"16px 20px", borderRadius:9,
              background:`${verdictColor}0e`, border:`1px solid ${verdictColor}38`, borderLeft:`4px solid ${verdictColor}`, marginBottom:22 }}>
              <div style={{ fontSize:22, flexShrink:0, lineHeight:1.2 }}>{inProgress?"⏳":netAssessableGain>0?"⚖️":lossesCarriedForward>0?"📉":"✓"}</div>

                <div style={{ fontSize:9, letterSpacing:"0.16em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace", marginBottom:4 }}>

                </div>
                <div style={{ fontSize:16, fontWeight:700, color:verdictColor, fontFamily:"'IBM Plex Mono',monospace", marginBottom:5, lineHeight:1.35 }}>{headline}</div>
                <div style={{ fontSize:11.5, color:C.dim, lineHeight:1.6 }}>{detail}</div>
              </div>
            </div>
          );
        })()}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))", gap:12, marginBottom:24 }}>
          {[
            { label:"Gross Capital Gains",    value:`$${fmt(totalGrossGains)}`,    color:C.teal,   sub:"before losses & discount", prov:{input:"Σ disposed parcels' (proceeds − eff. cost base)", fn:"buildCGTSchedule → grossGain"} },
            { label:"Capital Losses",         value:`−$${fmt(totalGrossLosses)}`,  color:C.red,    sub:"applied against gains", prov:{input:"Σ parcels where proceeds < cost base", fn:"buildCGTSchedule → grossLoss"} },
            { label:"CGT Discount Applied",   value:`−$${fmt(totalDiscount)}`,     color:C.purple, sub:client.entityType==="SMSF"?"1/3 discount":client.entityType==="Company"?"no discount":"50% discount", prov:{input:`discount-method gains × ${Math.round(discountRate(client.entityType)*100)}% (post-loss)`, fn:"buildCGTSchedule → netDiscountApplied"} },
            { label:"Net Assessable Gain",    value:`$${fmt(netAssessableGain)}`,  color:C.amber,  sub:"to include in tax return", prov:{input:"gains − losses (pre-discount) − discount", fn:"buildCGTSchedule s.102-5 ordering"} },
            { label:"Est. Tax Liability",     value:`$${fmt(estTax)}`,             color:C.orange, sub:`@ ${(mtr*100).toFixed(0)}% MTR — indicative only`, prov:{input:`net assessable gain × ${(mtr*100).toFixed(0)}% MTR`, fn:"defaultMTR(entity) × net gain"} },
            { label:"Losses Carried Forward", value:`$${fmt(lossesCarriedForward)}`, color:C.blue, sub:"to FY "+ (parseInt(selectedFY.label.split("-")[0])+1)+"-"+(parseInt(selectedFY.label.split("-")[1])+1), prov:{input:"max(0, total losses − total gains)", fn:"buildCGTSchedule → lossesCarriedForward"} },
          ].map(item => (
            <div key={item.label} style={{ background:C.surface, border:`1px solid ${C.border}`,
              borderRadius:8, padding:"14px 16px", borderTop:`3px solid ${item.color}` }}>
              <div style={{ fontSize:9, color:C.muted, fontFamily:"'IBM Plex Mono',monospace",
                letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6 }}>{item.label}{item.prov && <ProvChip input={item.prov.input} fn={item.prov.fn} ruleset="s.102-5 (current law)" status="CONFIRMED"/>}</div>
              <div style={{ fontSize:20, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace",
                color:item.color, marginBottom:3 }}>{item.value}</div>
              <div style={{ fontSize:9, color:C.muted, lineHeight:1.4 }}>{item.sub}</div>
            </div>
          ))}
        </div>

        {totalGrossLosses > 0 && (
          <div style={{ padding:"10px 16px", borderRadius:7, marginBottom:18,
            background:"rgba(167,139,250,0.06)", border:"1px solid rgba(167,139,250,0.2)",
            fontSize:11, color:C.dim, lineHeight:1.7 }}>
            <span style={{ color:C.purple, fontWeight:700 }}>Loss sequencing (s.102-5): </span>
            Losses of ${fmt(totalGrossLosses)} applied against gains before discount — not after.
            Non-discount gains absorbed first, then discount-eligible gains.
            CGT discount applied only to remaining gain.
            {lossesCarriedForward > 0 && ` — $${fmt(lossesCarriedForward)} carried forward to ${parseInt(selectedFY.label.split("-")[0])+1}-${parseInt(selectedFY.label.split("-")[1])+1}.`}

                  padding:"5px 12px", borderRadius:5, fontSize:11, cursor:"pointer",

                </button>

        )}

        {visibleRows.length === 0 ? (
          <div style={{ ...S.panel, padding:"48px", textAlign:"center" }}>
            <div style={{ fontSize:32, marginBottom:12 }}>📭</div>

            <div style={{ fontSize:12, color:C.dim }}>No parcels were disposed of within this financial year for the selected client.</div>
          </div>
        ) : (
          <div style={{ ...S.panel, marginBottom:20 }}>
            <div style={{ padding:"10px 18px", borderBottom:`1px solid ${C.border}`,
              display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <span style={{ fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase",
                color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>
                CGT Schedule — {selectedFY.label} · {visibleRows.length} disposal event{visibleRows.length!==1?"s":""}
              </span>
              <span style={{ fontSize:9, color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>
                Losses applied pre-discount per s.102-5 ordering
              </span>
            </div>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead>
                  <tr>
                    {["Asset","Type","Event","Acq. Date","Disposal Date","Qty","Cost Base","Proceeds","Gross Gain","Gross Loss","Discount","Assessable Gain","Held","Method"].map(h => {
                      const COLPROV = {
                        "Cost Base":      { input:"parcel.totalCost ± dated adjustments", fn:"getEffectiveCostBase()" },
                        "Gross Gain":     { input:"proceeds − eff. cost base (if > 0)",   fn:"buildCGTSchedule" },
                        "Gross Loss":     { input:"eff. cost base − proceeds (if > 0)",   fn:"buildCGTSchedule" },
                        "Discount":       { input:"row gain × entity discount rate",       fn:"discountRate(entity)" },

                            {row.quarantinedLoss>0 && <span style={{ fontSize:8, padding:"1px 5px", borderRadius:3, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700, background:"rgba(167,139,250,0.12)", color:C.purple, border:"1px solid rgba(167,139,250,0.3)" }}>QUAR ${fmt(row.quarantinedLoss)}</span>}

                      <td style={{ ...S.td, padding:"11px 14px" }}>{eventBadge(row.cgtEventType)}</td>
                      <td style={{ ...S.td, padding:"11px 14px", fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:C.dim }}>

                      </td>
                      <td style={{ ...S.td, padding:"11px 14px", fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:C.dim }}>

                      <td style={{ ...S.td, padding:"11px 14px", fontFamily:"'IBM Plex Mono',monospace", fontSize:11, textAlign:"right" }}>

                      <td style={{ ...S.td, padding:"11px 14px" }}>{methodBadge(row.method)}</td>

                    <td colSpan={8} style={{ ...S.td, padding:"11px 14px", fontFamily:"'IBM Plex Mono',monospace", fontSize:11, fontWeight:700, color:C.text }}>

                    </td>

                    <td style={{ ...S.td, padding:"11px 14px", fontFamily:"'IBM Plex Mono',monospace", fontSize:12, textAlign:"right", color:C.purple, fontWeight:700 }}>
                      {totalDiscount > 0 ? `($${fmt(totalDiscount)})` : "—"}
                    </td>
                    <td style={{ ...S.td, padding:"11px 14px", fontFamily:"'IBM Plex Mono',monospace", fontSize:13, textAlign:"right", color:C.amber, fontWeight:700 }}>

                    <td colSpan={2} style={S.td}></td>

        {(deferredLossTotal > 0 || quarantinedTotal > 0) && (

              {deferredLossTotal > 0 && (
                <div>
                  <div style={{ fontSize:9, color:C.muted, fontFamily:"'IBM Plex Mono',monospace", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:4 }}>
