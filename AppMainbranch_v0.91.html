                  </div>
                  <div style={{ fontSize:18, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", color:C.purple }}>${fmt(quarantinedTotal)}</div>
                  <div style={{ fontSize:9, color:C.muted, marginTop:2 }}>applied to deferred-residential then residential — never non-residential</div>
                </div>
              )}
            </div>
            <div style={{ padding:"0 18px 12px", fontSize:10, color:C.muted, lineHeight:1.6 }}>
              These amounts arise only under the Bill 2026 deemed-disposal mechanics (from 1 Jul 2027). They are shown here because the schedule contains events carrying them; the realised-events totals above are unaffected.
            </div>
          </div>
        )}

        {rows.length > 0 && (
        <React.Fragment>
        {(() => {
          // ── Xero Tax ITR — Item 18 Capital gain (layout mirrors Xero's actual form) ──
          const Info = () => (
            <span style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", width:13, height:13,
              borderRadius:"50%", background:C.muted, color:C.surface, fontSize:9, fontWeight:700,
              fontStyle:"normal", marginLeft:6, flexShrink:0, fontFamily:"Georgia,serif" }}>i</span>
          );
          const Code = ({ l, c }) => (
            <span style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", width:24, height:24,
              borderRadius:"50%", border:`1px solid ${c||C.border}`, color:c||C.muted, fontSize:11, fontWeight:700,
              fontFamily:"'IBM Plex Mono',monospace", flexShrink:0 }}>{l}</span>
          );
          const rowS = { display:"flex", alignItems:"center", justifyContent:"space-between", gap:16,
            padding:"12px 18px", borderBottom:`1px solid ${C.border}` };
          const labelS = { fontSize:12.5, color:C.text, display:"flex", alignItems:"center" };
          const Box = ({ v, color }) => (
            <div style={{ minWidth:140, textAlign:"right", padding:"7px 11px", borderRadius:4,
              border:`1px solid ${C.border}`, background:C.surface2, fontFamily:"'IBM Plex Mono',monospace",

          const codeSlot = (node) => (
            <div style={{ width:28, display:"flex", justifyContent:"center", flexShrink:0 }}>{node || null}</div>

          const subhead = (t) => (
            <div style={{ padding:"11px 18px 7px", fontSize:12, fontWeight:700, color:C.dim,
              background:C.surface2, borderBottom:`1px solid ${C.border}` }}>{t}</div>
          );
          // Field row: label (left) · value box (right) · optional ATO code chip
          const FRow = ({ label, info, value, color, code, codeColor, indent, last }) => (
            <div style={{ ...rowS, ...(last ? { borderBottom:"none" } : {}) }}>
              <div style={{ ...labelS, paddingLeft: indent ? 14 : 0 }}>{label}{info && <Info/>}</div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <Box v={value} color={color} />
                {hasCodes && codeSlot(code ? <Code l={code} c={codeColor} /> : null)}
              </div>
            </div>
          );
          const cgtEventRow = ({ withCode=true, withInfo=false }={}) => (
            <div style={rowS} key="cgt">
              <div style={labelS}>Did you have a CGT event during the year?{withInfo && <Info/>}</div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ display:"flex", border:`1px solid ${C.border}`, borderRadius:5, overflow:"hidden",
                  fontFamily:"'IBM Plex Mono',monospace", fontSize:12, fontWeight:700 }}>
                  <span style={{ padding:"6px 16px", background: totalGrossGains>0?C.purple:C.surface,
                    color: totalGrossGains>0?C.surface:C.muted }}>Yes</span>
                  <span style={{ padding:"6px 16px", background: totalGrossGains>0?C.surface:C.text,
                    color: totalGrossGains>0?C.muted:C.surface }}>No</span>
                </div>
                {hasCodes && codeSlot(withCode ? <Code l="G" /> : null)}
              </div>
            </div>
          );
          const helper = (
            <div key="help" style={{ padding:"0 18px 12px", fontSize:11, color:C.muted, lineHeight:1.5,
              borderBottom:`1px solid ${C.border}` }}>
              To apply exemption, rollover or discount codes, create a CGT worksheet for each event.
            </div>
          );
          const isTrust = client.entityType === "Trust";
          const isCompany = client.entityType === "Company";
          const hasCodes = !isCompany;   // Xero's company (CTR) view shows no ATO label letters
          const formTitle = (isTrust || isCompany) ? "Capital gains" : "Capital gain";
          const formTag = isTrust ? "Xero Tax TRT mapping" : isCompany ? "Xero Tax CTR mapping" : "Xero Tax ITR mapping";
          return (
            <div style={{ ...S.panel, marginBottom:20 }}>
              <div style={{ padding:"11px 18px", borderBottom:`1px solid ${C.border}`,
                background:"rgba(19,181,234,0.08)", display:"flex", flexDirection:"column", gap:3 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ width:7, height:7, borderRadius:"50%", background:"#13B5EA", flexShrink:0 }}/>
                  <span style={{ fontSize:12, fontWeight:700, color:"#13B5EA", letterSpacing:"0.08em",
                    textTransform:"uppercase", fontFamily:"'IBM Plex Mono',monospace" }}>{formTag}</span>
                </div>
                <div style={{ fontSize:10.5, color:C.muted, lineHeight:1.4, paddingLeft:15 }}>
                  Direct push to Xero Tax return — via backend ATO SBR schema integration.
                </div>
              </div>
              <div style={{ padding:"10px 18px", borderBottom:`1px solid ${C.border}`, display:"flex",
                alignItems:"center", gap:10, fontFamily:"'IBM Plex Mono',monospace" }}>
                {!isTrust && !isCompany && <span style={{ fontSize:13, fontWeight:700, color:C.purple }}>18</span>}
                <span style={{ fontSize:11, fontWeight:700, color:C.text, letterSpacing:"0.02em" }}>{formTitle}</span>
                <Info/>
              </div>

              {isTrust ? (
                <React.Fragment>
                  {/* TRUST (TRT): prior-year losses → CGT event → net gain (A) → FRCGW credit (B) → losses c/f */}
                  {subhead("Prior year losses brought forward")}
                  <FRow label="Net Capital Losses from Collectables" value="$0.00" color={C.muted} indent />
                  <FRow label="Other Net Capital Losses" value="$0.00" color={C.muted} indent />
                  {cgtEventRow()}
                  {helper}
                  <FRow label="Net capital gain" value={`$${fmt(netAssessableGain)}`}
                    color={netAssessableGain>0?C.amber:C.muted} code="A" codeColor={C.amber} />
                  <FRow label="Credit for amounts withheld from foreign resident capital gains withholding"
                    value="$0.00" color={C.muted} code="B" codeColor={C.blue} />
                  {subhead("Losses carried forward")}
                  <FRow label="Net Capital Losses from Collectables" value="$0.00" color={C.muted} indent />
                  <FRow label="Other Net Capital Losses" value={`$${fmt(lossesCarriedForward)}`}
                    color={lossesCarriedForward>0?C.blue:C.muted} indent last />
                </React.Fragment>
              ) : isCompany ? (
                <React.Fragment>
                  {/* COMPANY (CTR): individual-style order, but Xero shows NO ATO code letters */}
                  {cgtEventRow({ withInfo:true })}
                  {helper}
                  {subhead("Prior year losses brought forward")}
                  <FRow label="Net Capital Losses from Collectables" value="$0.00" color={C.muted} indent />
                  <FRow label="Other Net Capital Losses" value="$0.00" color={C.muted} indent />
                  <FRow label="Net capital gain" info value={`$${fmt(netAssessableGain)}`}
                    color={netAssessableGain>0?C.amber:C.muted} />
                  {subhead("Losses carried forward")}
                  <FRow label="Net Capital Losses from Collectables" value="$0.00" color={C.muted} indent />
                  <FRow label="Other Net Capital Losses" value={`$${fmt(lossesCarriedForward)}`}
                    color={lossesCarriedForward>0?C.blue:C.muted} indent last />
                </React.Fragment>
              ) : (
                <React.Fragment>
                  {/* INDIVIDUAL (ITR Item 18) */}
                  {cgtEventRow()}
                  {helper}
                  {subhead("Prior year losses brought forward")}
                  <FRow label="Net Capital Losses from Collectables" value="$0.00" color={C.muted} indent />
                  <FRow label="Other Net Capital Losses" value="$0.00" color={C.muted} indent />

const AI_SYSTEM_PROMPT = `You are CGTrace AI, an expert Australian CGT and cost base assistant embedded in CGTrace — a professional CGT parcel tracking tool for accounting firms.

Your role is to help accountants and financial advisers:
1. Reconstruct cost base history for client portfolios (Australian shares, ETFs, property, crypto)
2. Identify missing corporate actions, DRP history, AMIT adjustments, capital returns
3. Apply correct ATO rules: s.130-20 (bonus shares), s.6BA (BSP), Div 125 (demerger rollover), s.110-45 (cost base reduction), s.102-5 (loss sequencing)
4. Source and validate cost base data from ASX announcements, ATO class rulings, Computershare/Link registry
5. Flag CGT risks: undisclosed capital returns, unprocessed AMMA statements, pre-CGT asset transition planning

Key rules you always apply:
- Losses applied BEFORE CGT discount (ATO s.102-5 Step 5)
- BSP shares inherit source parcel acquisition date (s.6BA), not allotment date
- Bonus issues: cost base reapportioned from source parcel, acquisition date inherited (s.130-20)
- Capital returns reduce cost base parcel-by-parcel; excess below $0 triggers CGT Event G1
- From 1 July 2027 (Bill 2026, PENDING): 50% CGT discount replaced by CPI indexation + 30% minimum tax
- Pre-CGT assets (pre-20 Sep 1985): full exemption until 1 Jul 2027; MV at that date becomes cost base

Always be precise about what is confirmed law vs ATO guidance vs unlegislated Bill measures.
Format numbers in Australian dollar format. Use Australian date format (DD/MM/YYYY).`;

// Analyse a client's portfolio and return a structured scan result.
// Data-completeness checks built on the domain layer's getEffectiveCostBase.
function runBackgroundScan(client, holdings) {
  const issues = [];
  const coverageItems = [];
  let totalParcels = 0;
  let completeParcels = 0;

  (client.holdingIds || []).forEach(hid => {
    const h = holdings[hid];
    if (!h) return;

    const active = h.parcels.filter(p => p.status === "active");
    totalParcels += active.length;

    active.forEach(p => {
      const effCB = getEffectiveCostBase(p, h.adjustments);
      let score = 100;

      if (effCB <= 0) {
        issues.push({ severity:"high", ticker:h.ticker, parcelId:p.id,
          title:"Zero or negative effective cost base",
          detail:`Parcel ${p.id} has an effective cost base of $${effCB.toFixed(2)}. Verify capital returns and AMMA adjustments.`,
          action:"Review ParcelAdjustments — a capital return may have over-reduced the cost base, triggering CGT Event G1." });
        score -= 40;
      }

      if (h.type === "ETF") {
        const heldYears = (Date.now() - new Date(p.acquisitionDate)) / (365.25*86400000);
        const ammaCount = h.adjustments.filter(a => a.parcelId === p.id && a.origin === "AMIT").length;
        const expectedAmma = Math.floor(heldYears);
        if (ammaCount < expectedAmma - 1) {
          issues.push({ severity:"medium", ticker:h.ticker, parcelId:p.id,
            title:`Missing AMMA statements (${ammaCount} of ~${expectedAmma} FYs)`,
            detail:`ETF parcel ${p.id} acquired ${fmtDate(p.acquisitionDate)} — expected ~${expectedAmma} annual AMMA adjustments, found ${ammaCount}.`,
            action:`Obtain AMMA statements from ${h.name} provider for FY${Math.round(new Date(p.acquisitionDate).getFullYear())+1} onwards. Process each year sequentially.` });
          score -= 20 * (expectedAmma - ammaCount - 1);
        }
      }

      if (new Date(p.acquisitionDate) < new Date("1999-09-21")) {
        issues.push({ severity:"info", ticker:h.ticker, parcelId:p.id,
          title:"Pre-September 1999 parcel — frozen indexation choice affected by Bill",
          detail:`Parcel ${p.id} acquired ${fmtDate(p.acquisitionDate)}. Under current law the s.110-36 frozen-indexation choice may be available; the Bill removes it (CONFIRMED in Bill text).`,
          action:"Run the Disposal What-If under both rulesets to compare treatment for this parcel." });
      }

      if (new Date(p.acquisitionDate) < new Date("1985-09-20")) {
        issues.push({ severity:"high", ticker:h.ticker, parcelId:p.id,
          title:"Pre-CGT asset — exemption ends 1 July 2027 under the Bill",
          detail:`Parcel ${p.id} acquired ${fmtDate(p.acquisitionDate)} — pre-CGT asset. Full CGT exemption applies until 1 Jul 2027 if the Bill passes. After that date, market value at 1 Jul 2027 becomes the cost base.`,
          action:"Commission a formal market valuation before 1 July 2027. Assess whether disposal before the transition date produces a better outcome." });
        score -= 0;
      }

      completeParcels += Math.max(0, Math.min(score, 100)) / 100;
      coverageItems.push({ ticker:h.ticker, parcelId:p.id, score:Math.max(0, score) });
    });

    if (h.actions.length > 0 && active.length === 0) {
      issues.push({ severity:"medium", ticker:h.ticker, parcelId:null,
        title:"Corporate actions recorded but no active parcels",
        detail:`${h.ticker} has ${h.actions.length} corporate action(s) but no active parcels. Verify disposal history.`,
        action:"Check if all parcels have been disposed of or if data import is incomplete." });
    }
  });

  const coverageScore = totalParcels > 0 ? Math.round((completeParcels / totalParcels) * 100) : 100;
  const highCount   = issues.filter(i => i.severity === "high").length;
  const medCount    = issues.filter(i => i.severity === "medium").length;
  const infoCount   = issues.filter(i => i.severity === "info").length;

  return { issues, coverageScore, totalParcels, highCount, medCount, infoCount,
    assessment: highCount > 0
      ? "Action required: high-severity data gaps detected. Review flagged items before preparing the CGT schedule."
      : medCount > 0
        ? "Review suggested: missing records identified. Obtain AMMA statements and verify corporate action history."
        : "Portfolio data appears complete. Proceed to CGT report." };
}

  const [loading, setLoading]         = useState(false);
  const [activeTab, setActiveTab]     = useState("scan");

  useEffect(() => {
    const t = setTimeout(() => {
      const result = runBackgroundScan(client, holdings);
      setScanResult(result);
      setScanning(false);
      setMessages([{
        role:"assistant",
        content:`Portfolio scan complete for **${client.name}** (${client.entityType}).\n\nI found **${result.totalParcels} active parcels** across ${(client.holdingIds||[]).length} holdings. Coverage score: **${result.coverageScore}%**.\n\n${result.highCount > 0 ? `⚠ **${result.highCount} high-severity issue${result.highCount>1?"s":""} require attention.** ` : ""}${result.assessment}\n\nAsk me anything about cost base reconstruction, corporate actions, or CGT calculations for this portfolio.`
      }]);
    }, 1800);
    return () => clearTimeout(t);
  }, []);

  async function sendMessage() {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(prev => [...prev, { role:"user", content:userMsg }]);
    setLoading(true);
    setActiveTab("chat");

    const portfolioContext = (client.holdingIds||[]).map(hid => {
      const h = holdings[hid];
      if (!h) return "";
      const active = h.parcels.filter(p=>p.status==="active");
      return `${h.ticker} (${h.type}): ${active.length} active parcels, total eff. cost base $${active.reduce((s,p)=>s+getEffectiveCostBase(p,h.adjustments),0).toFixed(2)}, ${h.actions.length} corporate actions recorded`;
    }).filter(Boolean).join("\n");

    const contextMessage = `Client: ${client.name} | Entity: ${client.entityType} | TFN: ${client.tfn} | FY: ${client.fy}
Portfolio:
${portfolioContext}
Scan result: coverage score ${scanResult?.coverageScore||"?"}%, ${scanResult?.highCount||0} high issues, ${scanResult?.medCount||0} medium issues.`;

    try {

        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system: AI_SYSTEM_PROMPT,
          messages:[
            { role:"user", content:contextMessage + "\n\n---\n\nUser question: " + userMsg }

        })

      const data = await response.json();
      const reply = data.content?.[0]?.text || "Sorry, I couldn't generate a response. Please try again.";

    "What AMMA statements do I need for the VAS ETF holding?":

    "Explain the pre-CGT asset rules for assets sold after 1 July 2027":
      "Pre-CGT assets (acquired before 20 Sep 1985) remain exempt, but the proposed 2026 changes affect the **discount/indexation treatment** of post-CGT assets sold after 1 Jul 2027. Use the Ruleset toggle (Bill 2026 vs Current law) to compare outcomes — the transitional methods (formula split and market-value at 1 Jul 2027) are modelled as PENDING until the law is final.",

  };

}

// ─────────────────────────────────────────────────────────────────────────────
// GLOBAL TOP-BAR AI CHAT — practice-wide assistant
// ─────────────────────────────────────────────────────────────────────────────
function GlobalAIChat({ clients, holdings, onSelectClient, onOpenReport, isOpen, onClose, onLaunchAgent }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [mcpRunning, setMcpRunning] = useState(null);
  const [pos, setPos]           = useState({ x: typeof window!=="undefined" ? Math.max(0,window.innerWidth-500) : 800, y:64 });
  const [chatSize, setChatSize] = useState({ w:480, h:640 });
  const [resizeHover, setResizeHover] = useState(false); // visual-only — corner handle was functional but too small/low-contrast to notice

  // Keep the panel on-screen AND sized to the window (5 Jul fixes): pos/size
  // are captured once at mount, so a window smaller than the defaults (or
  // resized smaller after load) left the panel off-view or its input row below
  // the fold. fitToViewport caps the size to the viewport (respecting the same
  // minimums as the manual resize grips) and clamps the position back in; runs
  // on open, after any size change, and on window resize.
  // Panel content zooms with the app (5 Jul, user request): the panel chrome
  // stays viewport-anchored, but the inner wrapper applies the same
  // calcFitScale() factor as #scale-root so text/content sizes track the rest
  // of the UI instead of towering over the scaled-down app.
  const [uiZoom, setUiZoom] = useState(calcFitScale);
  const fitToViewport = () => {
    setUiZoom(calcFitScale());
    const w = Math.max(300, Math.min(chatSize.w, window.innerWidth  - 16));
    const h = Math.max(320, Math.min(chatSize.h, window.innerHeight - 16));
    if (w !== chatSize.w || h !== chatSize.h) setChatSize({ w, h });
    setPos(p => ({
      x: Math.max(8, Math.min(p.x, window.innerWidth  - w - 8)),
      y: Math.max(8, Math.min(p.y, window.innerHeight - h - 8)),
    }));
  };
  useEffect(() => { if (isOpen) fitToViewport(); }, [isOpen, chatSize.w, chatSize.h]);
  useEffect(() => {
    const onR = () => fitToViewport();
    window.addEventListener("resize", onR);
    return () => window.removeEventListener("resize", onR);
  }, [isOpen, chatSize.w, chatSize.h]);

  const handleDragStart = (e) => {
    if (e.target.closest("button")) return;
    e.preventDefault();
    const startX = e.clientX - pos.x, startY = e.clientY - pos.y;
    const onMove = (ev) => setPos({
      x: Math.max(0, Math.min(window.innerWidth  - chatSize.w,  ev.clientX - startX)),
      y: Math.max(40, Math.min(window.innerHeight - 80,          ev.clientY - startY)),
    });
    const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup",   onUp);
  };

  const handleResizeStart = (e) => {
    e.preventDefault(); e.stopPropagation();
    const sx=e.clientX, sy=e.clientY, sw=chatSize.w, sh=chatSize.h;
    const onMove = (ev) => setChatSize({
      w: Math.max(300, Math.min(window.innerWidth  - pos.x - 10, sw + ev.clientX - sx)),
      h: Math.max(320, Math.min(window.innerHeight - pos.y - 10, sh + ev.clientY - sy)),
    });
    const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup",   onUp);
  };

  // Top-left resize grip (5 Jul, user request): the bottom-right grip is
  // unreachable when the panel sits at the bottom/right screen edge. This one
  // resizes from the opposite corner — the bottom-right corner stays anchored,
  // so position shifts as size changes.
  const handleResizeStartTL = (e) => {
    e.preventDefault(); e.stopPropagation();
    const sx=e.clientX, sy=e.clientY, sw=chatSize.w, sh=chatSize.h, spx=pos.x, spy=pos.y;
    const onMove = (ev) => {
      const w = Math.max(300, Math.min(spx + sw - 8, sw - (ev.clientX - sx)));
      const h = Math.max(320, Math.min(spy + sh - 8, sh - (ev.clientY - sy)));
      setChatSize({ w, h });
      setPos({ x: spx + (sw - w), y: spy + (sh - h) });
    };
    const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
    window.addEventListener("mousemove", onMove);

  const totalParcels = Object.values(holdings).reduce((s,h)=>s+h.parcels.filter(p=>p.status==="active").length,0);

  const systemPrompt = GLOBAL_AI_SYSTEM_PROMPT

  // ── Scripted responses ──────────────────────────────────────────────────────

  const CANNED = {

  const SUGGESTIONS = [

// Compact PM job pill — status + due-date alert. Used in the Tax Obligation cards.
function JobPill({ job, source }) {

// Folded CGT-result cell: headline est. assessable + a gain/loss/nil chip, with the
// full breakdown (disposals, gross gain/loss, net) on hover.
// Renders a cgtOutcomeForFY() result. Four kinds: "in_progress" (pre-reconciliation,
// plain text, no breakdown — there's nothing settled to show yet), "none" ("No CGT
// event", plain text), and "gain"/"loss" (the original $-figure + sub-badge + hover
// breakdown, now sourced from outcome.breakdown instead of a separate ob prop, so
// this is the exact same number Client Portfolios' CGT Outcome column shows).
function CGTResultCell({ outcome }) {
  const [show, setShow] = useState(false);
  if (outcome.kind === "in_progress" || outcome.kind === "none") {
    return <span style={{ fontSize:11, fontFamily:"'IBM Plex Mono',monospace", color:outcome.color,
      fontStyle: outcome.kind === "in_progress" ? "italic" : "normal" }}>{outcome.label}</span>;
  }
  const bd = outcome.breakdown;
  const amount = outcome.kind === "gain" ? bd.assessable : bd.lossesCarriedForward;
  const rows = [
    ["Disposals", String(bd.disposals), "#EEEDFE"],
    ["Gross gains", bd.grossGains>0?`$${fmt(bd.grossGains)}`:"—", "#3FB89A"],
    ["Gross losses", bd.grossLosses>0?`($${fmt(bd.grossLosses)})`:"—", "#E0857F"],
    ["Net position", bd.netPosition>0?`$${fmt(bd.netPosition)}`:bd.netPosition<0?`($${fmt(Math.abs(bd.netPosition))})`:"—", "#AFA9EC"],
    ["Est. assessable", bd.assessable>0?`$${fmt(bd.assessable)}`:"—", "#D8B45A"],
  ];
  return (
    <span style={{ position:"relative", display:"inline-flex", flexDirection:"column", alignItems:"flex-end" }}
      onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      <span style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:13, fontWeight:700, cursor:"help",
        color: outcome.color }}>${fmt(amount,0)}</span>
      <span style={{ fontSize:9, padding:"1px 6px", borderRadius:3, marginTop:3, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600,
        background: outcome.kind==="gain"?"rgba(251,191,36,0.12)":"rgba(52,211,153,0.12)",
        color: outcome.color }}>
        {outcome.kind==="gain"?"gain due":"loss c/f"}
      </span>
      {show && (
        <span style={{ position:"absolute", top:"calc(100% + 5px)", right:0, zIndex:50, width:215, textAlign:"left",
          background:"#0F0E17", border:"1px solid #2D2845", borderRadius:8, padding:"9px 11px", boxShadow:"0 12px 32px rgba(0,0,0,0.45)" }}>
          {rows.map(([k,v,col])=>(
            <span key={k} style={{ display:"flex", justifyContent:"space-between", gap:14, fontSize:10.5, fontFamily:"'IBM Plex Mono',monospace", marginBottom:3 }}>
              <span style={{ color:"#9088C0" }}>{k}</span><span style={{ color:col, fontWeight:700 }}>{v}</span>
            </span>
          ))}
        </span>
      )}
    </span>
  );
}

}

function TaxObligationDashboard({ clients, holdings, pm, onPushCGT, onOpenReport, onSelectClient, focusJobKey, onClearFocus }) {
  const [filterET, setFilterET]   = useState("ALL");
  const [search, setSearch]       = useState("");
  const [flash, setFlash]         = useState(null); // clientId just pushed, for the toast
  const [statusFilter, setStatusFilter] = useState(null); // tile filter
  const clearFocus = () => { if (onClearFocus) onClearFocus(); };

  // getClientObligations is now top-level (above buildCGTSchedule) — shared with
  // App.handleCommitReconstruction's Phase 5 push so both use one computation.

  const filteredClients = clients
    .filter(c => filterET==="ALL"||c.entityType===filterET)
    .filter(c => !search || c.name.toLowerCase().includes(search.toLowerCase()));

  const em = (entityType) => ENTITY_META[entityType]||{icon:"👤",color:C.blue};

  // jobKey mirrors ClientListView's per-job key (client.id + ":" + job.id) so a
  // client with 2+ open tax-return jobs (e.g. Apex's FY24-25 + FY25-26) gets an
  // independent status per job instead of collapsing onto one. NB: ps.ret is
  // still a single client-level field (one cgtPushed/cgtValue per client) — only
  // the job whose fy matches ps.ret.year can show as genuinely "pushed"; a 2nd
  // concurrent job reaching "Report ready" pushes into that same ps.ret slot,
  // which is a known limitation of the current data model, not new here.
  const makeRow = (client, ob, ps, isCurrent, trJob) => {
    const jobKey = trJob ? client.id + ":" + trJob.id : null;
    const jobFy = trJob ? (trJob.fy || ps.ret.year) : null;
    const pushed = !!(ps && isCurrent && ps.ret.cgtPushed && jobFy === ps.ret.year);
    const status = !ps ? "—" : !isCurrent ? "Synced" : deriveCGTStatus(client, ps, jobFy);
    // Canonical $ figure now comes from cgtOutcomeForFY (buildCGTSchedule) — see
    // its header comment. getClientObligations (ob) is kept only to index which
    // FYs have any obligation at all, no longer for the displayed/pushed dollar value.
    const outcome = cgtOutcomeForFY(client, holdings, ob.fyObj, status);
    const cgtVal = pushed ? ps.ret.cgtValue : Math.round(outcome.breakdown ? outcome.breakdown.assessable : 0);
    const dueStr = isCurrent && trJob ? trJob.due : null;
    const overdue = !!(dueStr && new Date(dueStr) < PM_NOW && status !== "Synced");
    return { client, ob, ps, isCurrent, status, pushed, cgtVal, outcome, dueStr, overdue, jobKey };
  };

  // One row per return: every entity's open tax-return job(s) (even if nil CGT) — so
  // the queue reconciles 1:1 with Compliance "Linked Jobs" — plus each prior-FY CGT
  // obligation (closed/lodged returns, which Linked Jobs omits) not already covered
  // by an open job.
  const rows = [];
  filteredClients.forEach(client => {
    const ps = pm.entities[client.id];
    const obligations = getClientObligations(client, holdings);
    const obByFy = {}; obligations.forEach(o => { obByFy[o.fy] = o; });
    const trJobs = ps ? ps.jobs.filter(j => j.type === "tax-return") : [];
    const jobFys = new Set();
    trJobs.forEach(j => {
      const jobFy = j.fy || ps.ret.year;
      jobFys.add(jobFy);
      const fyObj = FY_OPTIONS.find(f => f.label === jobFy) || null;
      const ob = obByFy[jobFy] || { fy:jobFy, fyObj, disposals:0, grossGains:0, grossLosses:0, assessable:0, netPosition:0, hasObligation:false };
      rows.push(makeRow(client, ob, ps, true, j));
    });
    obligations.forEach(ob => {
      if (jobFys.has(ob.fy)) return;
      rows.push(makeRow(client, ob, ps, false, null));
    });
  });
  rows.sort((a,b) =>
    a.isCurrent !== b.isCurrent ? (a.isCurrent ? -1 : 1)
    : a.isCurrent ? (a.dueStr||"").localeCompare(b.dueStr||"")
    : b.ob.fy.localeCompare(a.ob.fy));

  const cur = rows.filter(r => r.isCurrent);
  const readyRows = cur.filter(r => r.status === "Report ready");
  const tiles = [
    { key:"Report ready", label:"Ready to sync",   val:String(readyRows.length), sub:`$${Math.round(readyRows.reduce((s,r)=>s+r.cgtVal,0)).toLocaleString("en-AU")} to push`, color:C.amber },
    { key:"Reconciling",  label:"Reconciling",     val:String(cur.filter(r=>r.status==="Reconciling").length), sub:"CGT in progress", color:C.blue },
    { key:"Overdue",      label:"Overdue returns", val:String(cur.filter(r=>r.overdue).length), sub:"past due date", color:C.red },
    { key:"Synced",       label:"Synced this FY",  val:String(cur.filter(r=>r.status==="Synced").length), sub:"pushed to Xero", color:C.teal },
  ];
  const focusedRow = focusJobKey ? rows.find(r => r.jobKey === focusJobKey) : null;
  const visibleRows = focusedRow
    ? [focusedRow]
    : statusFilter
      ? rows.filter(r => statusFilter === "Overdue" ? r.overdue : r.status === statusFilter)
      : rows;

  return (
    <div style={{ flex:1, padding:"28px 32px", maxWidth:1200, margin:"0 auto", width:"100%" }}>
      <div style={{ marginBottom:18 }}>
        <div style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.03em", color:"#1C1540",
          fontFamily:"'IBM Plex Mono',monospace", marginBottom:4 }}>CGT Return Work Queue</div>
        <div style={{ fontSize:12, color:C.dim }}>
          One row per return obligation — what's due, where the CGT reconciliation stands, and the figure to push back to Xero when it's ready.
        </div>
      </div>

      {focusedRow && (
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16, padding:"9px 14px",
          background:`${C.blue}10`, border:`1px solid ${C.blue}40`, borderRadius:8 }}>
          <span style={{ fontSize:13 }}>🔎</span>
          <span style={{ fontSize:11.5, color:C.text, flex:1 }}>
            Filter applied — showing only <strong>{focusedRow.client.name}</strong>'s FY{focusedRow.ob.fy} return, opened from a linked job in Client Portfolios.
          </span>
          <button onClick={clearFocus} style={{ background:"none", border:`1px solid ${C.blue}55`, flexShrink:0,
            borderRadius:5, padding:"5px 11px", fontSize:11, cursor:"pointer", color:C.blue, fontFamily:"'IBM Plex Mono',monospace" }}>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))", gap:10, marginBottom:18 }}>
        {tiles.map(t => {

              textAlign:"left", cursor:"pointer", background: active?`${t.color}14`:C.surface,

              borderRadius:8, padding:"12px 14px" }}>
              <div style={{ fontSize:9, color:C.muted, fontFamily:"'IBM Plex Mono',monospace",

      <div style={{ display:"flex", gap:10, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>

          <span style={{ position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",

          <input placeholder="Search client…" value={search} onChange={e=>{ setSearch(e.target.value); clearFocus(); }}

                color:filterET===et?(meta?.color||C.blue):C.dim,

            <tbody>

// PART 5 — TRACKER VIEW, CLIENT LIST, TESTS, CASE STUDY, APP ROOT (hash-routed)
// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════
// AI DOCUMENT IMPORT (Phase 5) — the one contained AI feature, mock-first.
// Paste a contract note / DRP / SPP / AMMA statement → proposed parcel events,
// each graded CONFIRMED / ASSUMED / REVIEW with its source line as provenance.
// Preview-before-commit (Action Wizard pattern); commits via handleAddSectionA.
// Works fully offline via the built-in regex parser; an optional API key upgrades
// parsing and degrades gracefully back to the mock parser on any error.
// ═══════════════════════════════════════════════════════════════════════════════
const IMPORT_PARSE_SYSTEM = `You extract Australian share-registry events from pasted documents (contract notes, DRP/SPP advices, AMMA/AMIT statements). Return ONLY a JSON array. Each item: {"kind":"parcel"|"adj","origin":"PURCHASE"|"DRP"|"SPP"|"BONUS"|"AMIT","ticker":"ASX code","date":"YYYY-MM-DD","qty":number,"costPerUnit":number,"amount":number,"adjType":"increase"|"decrease"}. qty/costPerUnit for parcels; amount/adjType for AMIT adjustments. Omit fields you cannot find. No prose.`;

function normImportDate(s) {
  if (!s) return "";
  s = String(s).trim();
  let m;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if ((m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/))) { let y = m[3].length === 2 ? "20" + m[3] : m[3]; return `${y}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`; }
  const mo = { jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
  if ((m = s.match(/^(\d{1,2})\s+([A-Za-z]{3,9})\s+(\d{4})$/))) { const k = mo[m[2].slice(0,3).toLowerCase()]; if (k) return `${m[3]}-${String(k).padStart(2,"0")}-${m[1].padStart(2,"0")}`; }
  return "";
}
function findImportDate(line) {
  const m = line.match(/(\d{4}-\d{2}-\d{2})|(\d{1,2}\/\d{1,2}\/\d{2,4})|(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})/);
  return m ? normImportDate(m[0]) : "";
}
function gradeImportEvent(ev, holdings) {
  const known = new Set(Object.keys(holdings || {}));
  if (ev.kind === "parcel") {
    ev.qty = ev.qty != null ? Number(ev.qty) : null;
    ev.costPerUnit = ev.origin === "BONUS" ? 0 : (ev.costPerUnit != null ? Number(ev.costPerUnit) : null);
    ev.totalCost = +(((ev.qty || 0) * (ev.costPerUnit || 0))).toFixed(2);
  } else {
    ev.amount = ev.amount != null ? Number(ev.amount) : null;
    ev.adjType = ev.adjType || "increase";
  }
  const unknownTicker = !ev.ticker || !known.has(ev.ticker);
  const missing = ev.kind === "parcel"
    ? (!ev.date || !ev.qty || (ev.origin !== "BONUS" && !ev.costPerUnit))
    : (!ev.date || !ev.amount);
  // AMIT needs an active parent parcel to attach to
  const adjNoParent = ev.kind === "adj" && !(holdings[ev.ticker]?.parcels || []).some(p => p.status === "active");
  ev.status = (missing || unknownTicker || adjNoParent) ? "REVIEW" : (ev.origin === "BONUS" ? "ASSUMED" : "CONFIRMED");
  ev.confidence = ev.status === "CONFIRMED" ? 0.95 : ev.status === "ASSUMED" ? 0.8 : 0.5;
  ev.accept = ev.status !== "REVIEW";
  return ev;
}
function parseDocumentMock(text, holdings) {
  const known = new Set(Object.keys(holdings || {}));
  const RESERVED = new Set(["BUY","SELL","DRP","SPP","BSP","ASX","AMIT","AMMA","FY","CGT","PTY","LTD","NOTE","PLAN"]);
  const DATE_RE = /(\d{4}-\d{2}-\d{2})|(\d{1,2}\/\d{1,2}\/\d{2,4})|(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})/g;
  const out = [];
  (text || "").split(/\n+/).map(l => l.trim()).filter(Boolean).forEach(line => {
    const low = line.toLowerCase();
    const date = findImportDate(line);
    // Strip dates before number extraction so day/year digits aren't read as qty/price.
    const rest = line.replace(DATE_RE, " ");
    const tickers = (rest.match(/\b[A-Z]{2,5}\b/g) || []).filter(t => !RESERVED.has(t));
    const ticker = tickers.find(t => known.has(t)) || tickers[0] || "";
    const num = (re) => { const m = rest.match(re); return m ? parseFloat(m[1].replace(/,/g, "")) : null; };
    const price = () => num(/(?:@|at|for)\s*\$?([\d,]+\.?\d*)/i);
    // Order matters: specific origins (which may also contain the word "bought")
    // are tested before the generic BUY/PURCHASE fallback.
    let ev = null;
    if (/amit|amma/i.test(low)) {
      ev = { kind:"adj", origin:"AMIT", amount:num(/\$\s*([\d,]+\.?\d*)/) || num(/([\d,]+\.\d{2})/), adjType:/decrease|negative|reduc/i.test(low) ? "decrease" : "increase" };
    } else if (/\bdrp\b|reinvest/i.test(low)) {
      ev = { kind:"parcel", origin:"DRP", qty:num(/([\d,]+(?:\.\d+)?)\s+[A-Z]{2,5}/) || num(/drp\s+([\d,]+)/i), costPerUnit:price() };
    } else if (/\bspp\b|share purchase plan/i.test(low)) {
      ev = { kind:"parcel", origin:"SPP", qty:num(/bought\s+([\d,]+)/i) || num(/([\d,]+)\s+[A-Z]{2,5}/), costPerUnit:price() };
    } else if (/\bbsp\b|bonus share plan/i.test(low)) {
      ev = { kind:"parcel", origin:"BSP", qty:num(/([\d,]+)\s+[A-Z]{2,5}/) || num(/bsp\D*?([\d,]+)/i), costPerUnit:price() };
    } else if (/\bbonus\b/i.test(low)) {
      ev = { kind:"parcel", origin:"BONUS", qty:num(/([\d,]+)\s+[A-Z]{2,5}/) || num(/bonus\D*?([\d,]+)/i), costPerUnit:0 };
    } else if (/\b(buy|bought|purchase)/i.test(low)) {
      ev = { kind:"parcel", origin:"PURCHASE", qty:num(/(?:buy|bought|purchase[d]?)\s+([\d,]+(?:\.\d+)?)/i), costPerUnit:price() };
    }
    if (!ev) return;
    ev.id = uid(); ev.ticker = ticker; ev.date = date; ev.sourceLine = line;
    out.push(gradeImportEvent(ev, holdings));
  });
  return out;
}
function makeImportSample(tickers) {
  const a = tickers[0] || "CBA", b = tickers[1] || a, etf = tickers.find(t => t === "VAS") || tickers[2] || b;
  return [
    "CONTRACT NOTE / registry advice — paste your own or edit this sample",
    `12/03/2024  BUY 500 ${a} @ $95.20  (brokerage $19.95)`,
    `DRP allotment 18 Sep 2024: 12 ${a} shares @ $98.10 — dividend reinvestment`,
    `SPP 2023-11-02 bought 300 ${b} at $42.50`,
    `Bonus issue: 50 ${b} bonus shares allotted 2024-06-01`,
    `AMMA statement 30/06/2024 — ${etf}: cost base decrease $48.50 (AMIT net adjustment)`,
  ].join("\n");
}

}

function DocumentImportModal({ client, holdings, onClose, onCommit }) {
  const tickers = Object.keys(holdings);
  const [text, setText]     = useState("");
  const [parsed, setParsed] = useState(null);
  const [parsing, setParsing] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [usedAI, setUsedAI] = useState(false);
  const [notice, setNotice] = useState("");

  const upd = (id, k, v) => setParsed(list => list.map(e => e.id === id ? gradeImportEvent({ ...e, [k]:v }, holdings) : e));

  async function runParse() {
    setParsing(true); setNotice(""); setParsed(null);
    if (apiKey.trim()) {
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{ "Content-Type":"application/json", "x-api-key":apiKey.trim(), "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
          body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1500, system:IMPORT_PARSE_SYSTEM, messages:[{ role:"user", content:text }] })
        });
        const data = await res.json();
        const raw = data.content?.[0]?.text || "";
        const arr = JSON.parse(raw.match(/\[[\s\S]*\]/)[0]);
        setParsed(arr.map(e => gradeImportEvent({ ...e, id:uid(), sourceLine:"AI-extracted" }, holdings)));
        setUsedAI(true); setParsing(false); return;
      } catch (e) {
        setNotice("AI parse unavailable (" + (e.message || "error") + ") — using the built-in parser.");
      }
    }
    setParsed(parseDocumentMock(text, holdings)); setUsedAI(false); setParsing(false);
  }

  function commit() {
    (parsed || []).filter(e => e.accept && e.status !== "REVIEW").forEach(e => {
      if (e.kind === "parcel") {
        const isBonus = e.origin === "BONUS";
        const parcel = { id:uid(), origin:e.origin, acquisitionDate:e.date,
          qty:Number(e.qty) || 0, costPerUnit:isBonus ? 0 : (Number(e.costPerUnit) || 0),
          totalCost:isBonus ? 0 : +(((Number(e.qty)||0) * (Number(e.costPerUnit)||0))).toFixed(2),
          status:"active", sourceActionId:null, sourceRightsId:null, replacesParcelId:null,
          importStatus:e.status, importConfidence:e.confidence,
          notes:"Imported from document — " + (e.sourceLine || "") };
        onCommit(e.ticker, parcel, null);
      } else {
        const parent = (holdings[e.ticker]?.parcels || []).find(p => p.status === "active");
        if (!parent) return;
        const adj = { id:uid(), parcelId:parent.id, sourceActionId:null, type:e.adjType,
          amount:Math.abs(Number(e.amount) || 0), amountPerUnit:0, effectiveDate:e.date,
          origin:"AMIT", notes:"Imported AMMA — " + (e.sourceLine || "") };
        onCommit(e.ticker, null, adj);
      }
    });
    onClose();
  }

  const acceptCount = (parsed || []).filter(e => e.accept && e.status !== "REVIEW").length;
  const cell = { ...S.input, padding:"4px 6px", fontSize:11 };

  return (
    <div style={S.modal}>
      <div style={{ ...S.modalBox, width:"min(960px,98vw)" }}>
        <div style={S.modalHead}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:32, height:32, borderRadius:8, background:"linear-gradient(135deg,#7F77DD,#AFA9EC)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>✦</div>
            <div>
              <div style={{ fontSize:15, fontWeight:600, color:C.text }}>Import from Document <span style={{ fontSize:10, color:C.muted, fontWeight:400 }}>· AI-assisted, preview before commit</span></div>
              <div style={{ fontSize:11, color:C.dim, marginTop:2 }}>Contract note · DRP/SPP advice · AMMA statement → proposed parcel events for {client.name}</div>
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.dim, fontSize:18, cursor:"pointer" }}>✕</button>
        </div>

        <div style={{ padding:"16px 20px", maxHeight:"72vh", overflowY:"auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
            <label style={S.label}>Paste document text</label>
            <button onClick={() => setText(makeImportSample(tickers))} style={{ ...S.btn("secondary"), padding:"4px 10px", fontSize:11 }}>Load sample</button>
          </div>
          <textarea value={text} onChange={e => setText(e.target.value)} rows={6} placeholder="Paste a contract note, DRP/SPP advice, or AMMA statement…"
            style={{ ...S.input, fontFamily:"'IBM Plex Mono',monospace", fontSize:11, lineHeight:1.6, resize:"vertical", width:"100%" }}/>

          <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap", margin:"12px 0" }}>
            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="Optional: Claude API key (blank = built-in parser)"
              style={{ ...S.input, width:320, fontSize:11 }}/>
            <button onClick={runParse} disabled={!text.trim() || parsing} style={{ ...S.btn("primary"), padding:"8px 18px", opacity:(!text.trim()||parsing)?0.5:1 }}>
              {parsing ? "Parsing…" : "✦ Parse document"}
            </button>
            <span style={{ fontSize:10, color:C.muted }}>{usedAI ? "Parsed with Claude" : parsed ? "Parsed with built-in regex parser (offline)" : ""}</span>
          </div>

          {notice && <div style={{ ...S.callout("251,191,36"), margin:"0 0 12px" }}>{notice}</div>}

          {parsed && (parsed.length === 0 ? (
            <div style={{ ...S.panel, padding:"24px", textAlign:"center", color:C.dim, fontSize:12 }}>
              No events recognised. Try the sample, or check that lines contain an action (BUY / DRP / SPP / bonus / AMMA), an ASX code, a date, and amounts.
            </div>
          ) : (
            <>
              <div style={{ fontSize:11, color:C.dim, marginBottom:8 }}>
                {parsed.length} event{parsed.length!==1?"s":""} found · {acceptCount} ready to commit · review the rest. Every figure keeps its source line — hover the ⓘ.
              </div>
              <div style={{ ...S.panel, marginBottom:14, overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                  <thead><tr>
                    {["✓","Origin","Security","Date","Qty / Type","Cost/Unit · Amount","Total","Status",""].map(h => <th key={h} style={{ ...S.th, padding:"8px 10px" }}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {parsed.map(e => (
                      <tr key={e.id} style={{ opacity:e.accept?1:0.55 }}>
                        <td style={{ ...S.td, padding:"7px 10px", textAlign:"center" }}>
                          <input type="checkbox" checked={!!e.accept} disabled={e.status==="REVIEW"} onChange={ev => upd(e.id,"accept",ev.target.checked)}/>
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px" }}><Pill origin={e.origin}/></td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          <select value={e.ticker} onChange={ev => upd(e.id,"ticker",ev.target.value)} style={{ ...cell, width:84 }}>
                            <option value="">—</option>
                            {tickers.map(t => <option key={t} value={t}>{t}</option>)}
                          </select>
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          <input type="date" value={e.date||""} onChange={ev => upd(e.id,"date",ev.target.value)} style={{ ...cell, width:130 }}/>
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          {e.kind==="parcel"
                            ? <input type="number" value={e.qty??""} onChange={ev => upd(e.id,"qty",ev.target.value)} style={{ ...cell, width:80 }}/>
                            : <select value={e.adjType} onChange={ev => upd(e.id,"adjType",ev.target.value)} style={{ ...cell, width:100 }}><option value="increase">increase</option><option value="decrease">decrease</option></select>}
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          {e.kind==="parcel"
                            ? (e.origin==="BONUS" ? <span style={{ color:C.muted }}>$0 (bonus)</span> : <input type="number" value={e.costPerUnit??""} onChange={ev => upd(e.id,"costPerUnit",ev.target.value)} style={{ ...cell, width:90 }}/>)
                            : <input type="number" value={e.amount??""} onChange={ev => upd(e.id,"amount",ev.target.value)} style={{ ...cell, width:90 }}/>}
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px", ...S.mono, color:C.dim }}>
                          {e.kind==="parcel" ? `$${fmt(e.totalCost||0)}` : `$${fmt(Math.abs(e.amount||0))}`}
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          <ImportStatusBadge status={e.status}/>
                          <ProvChip input={e.sourceLine} fn={usedAI?"Claude parse":"regex parser"} ruleset={`confidence ${(e.confidence*100).toFixed(0)}%`} status={e.status==="CONFIRMED"?"CONFIRMED":"PENDING"}/>
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px", textAlign:"right" }}>
                          <button onClick={() => setParsed(list => list.filter(x => x.id !== e.id))} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:13 }}>✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ ...S.callout("79,158,255"), margin:0 }}>
                Nothing is written until you commit. Accepted events are added to the parcel register exactly as if entered by hand — losses, discount and indexation then follow the same single engine. AMMA adjustments attach to the security's earliest active parcel. General modelling only — verify against source records.
              </div>
            </>
          ))}
        </div>

        <div style={{ padding:"14px 20px", borderTop:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:10, color:C.muted }}>Mock-first · offline-capable · preview before commit</span>
          <div style={{ display:"flex", gap:8 }}>
            <button style={S.btn("secondary")} onClick={onClose}>Cancel</button>
            <button style={{ ...S.btn("teal"), opacity:acceptCount?1:0.5 }} disabled={!acceptCount} onClick={commit}>Commit {acceptCount||""} event{acceptCount!==1?"s":""}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TrackerView({ client, allHoldings, allRights, allCgtEvents, onBack, onOpenReport, onReconcileClient, clients, holdings: allHoldingsForChat, rules }) {
  const holdings = Object.fromEntries(
    (client.holdingIds||[]).map(id => [id, allHoldings[id]]).filter(([,v])=>v)
  );
  const cgtEvents = allCgtEvents;

  const [page, setPage] = useState("summary");
  const [modal, setModal] = useState(null);
  const [calcPanel, setCalcPanel] = useState(null);
  const [showAPI, setShowAPI] = useState(false);
  const [showAgent, setShowAgent] = useState(false);
  const [showGlobalChat, setShowGlobalChat] = useState(false);
  const [localHoldings, setLocalHoldings] = useState(holdings);
  const [localRights, setLocalRights] = useState(allRights);
  const [parcelFocus, setParcelFocus] = useState("");
  // Seeded from the client record so a prior "Mark reconciled" stamp survives
  // navigating away and back (it also feeds the firm-wide readiness % on the list).
  const [reconMarker, setReconMarker] = useState(client.lastReconciledAt
    ? { marker: client.reconciledMarker, preparer: client.reconciledBy, timestamp: client.lastReconciledAt }
    : null); // {marker, preparer, timestamp}
  // Reconciling-period workflow: "Start new reconciling period" snapshots the
  // current position so "Rollback" has something real to restore to.
  const [reconciliationOpen, setReconciliationOpen] = useState(!!client.reconciliationOpen);
  const [reconSnapshot, setReconSnapshot] = useState(null);
  function handleReconcile(payload) {
    setReconMarker(payload);
    setReconciliationOpen(false);
    onReconcileClient && onReconcileClient(client.id, payload);
  }
  function handleStartReconcilingPeriod() {
    setReconSnapshot({ holdings: localHoldings, rights: localRights, reconMarker });
    setReconciliationOpen(true);
  }
  function handleRollback() {
    if (!reconSnapshot) { setReconciliationOpen(false); return; }
    setLocalHoldings(reconSnapshot.holdings);
    setLocalRights(reconSnapshot.rights);
    setReconMarker(reconSnapshot.reconMarker);
    setReconSnapshot(null);
    setReconciliationOpen(false);
  }
  const rights = localRights;
  function handleAddRights(record){ setLocalRights(rs=>[record, ...rs]); }
  function openParcels(ticker){ setParcelFocus(ticker||""); setPage("parcels"); }

  function handleAddSectionA(ticker, parcel, adj) {
    setLocalHoldings(h => {
      const holding = h[ticker];
      if (!holding) return h;
      const newAdjs = adj ? [...holding.adjustments, adj] : holding.adjustments;
      const newParcels = adj ? holding.parcels : [...holding.parcels, parcel];
      return { ...h, [ticker]: { ...holding, parcels:newParcels, adjustments:newAdjs } };
    });
  }

  function handleApplyAction(ticker, actionType, params) {
    setLocalHoldings(prev => {
      const holding = prev[ticker];
      if (!holding) return prev;
      if(actionType==="SPLIT")          return { ...prev, [ticker]: applyShareSplit(holding, params) };
      if(actionType==="CONSOLIDATION")  return { ...prev, [ticker]: applyConsolidation(holding, params) };
      if(actionType==="CAPITAL_RETURN") return { ...prev, [ticker]: applyCapitalReturn(holding, params) };
      if(actionType==="DEMERGER") {
        const { updatedOriginal, demergedHolding } = applyDemerger(holding, params, prev);
        return { ...prev, [ticker]: updatedOriginal, [params.demergedTicker]: demergedHolding };
      }
      if(actionType==="TAKEOVER") {
        const { updatedHolding, acquirerParcels, acquirerTicker, acquirerEntityName } = applyTakeover(holding, params);
        const existing = prev[acquirerTicker];
        const acqHolding = existing
          ? { ...existing, parcels:[...existing.parcels,...acquirerParcels] }
          : { id:uid(), ticker:acquirerTicker, name:acquirerEntityName, type:"Share", parcels:acquirerParcels, adjustments:[], actions:[], cgtEvents:[] };
        return { ...prev, [ticker]: updatedHolding, [acquirerTicker]: acqHolding };
      }
      return prev;
    });
  }

  function handleAddSell(ticker, parcelIds, params) {
    const { sellDate, pricePerUnit, method } = params;
    setLocalHoldings(prev => {
      const holding = prev[ticker];
      if (!holding) return prev;
      const newCgtEvents = [];
      const newParcels = holding.parcels.map(p => {
        if (!parcelIds.includes(p.id) || p.status!=="active") return p;
        const effCB = getEffectiveCostBase(p, holding.adjustments);
        const proceeds = pricePerUnit * p.qty;
        const gain = proceeds - effCB;
        const elig = discountEligible(p.acquisitionDate, sellDate);
        newCgtEvents.push({
          id: uid(), holdingId: holding.id, rightsRecordId:null, actionId:null,
          eventType:"A1", eventDate: sellDate,
          costBase: effCB, proceeds, capitalGain: gain>0?gain:0, capitalLoss: gain<0?-gain:0,
          discountEligible: elig, discountMethod: (elig&&gain>0)?"50_PERCENT":null,
          discountedGain: (elig&&gain>0)?gain*0.5:(gain>0?gain:0),
          rolloverApplied:false, rolloverType:null,
          parcelId: p.id,
          notes: `A1 — disposal of ${fmt(p.qty,0)} ${ticker} units (parcel ${p.id}). Manual entry, ${method} method. Proceeds $${fmt(pricePerUnit)}/unit.`,
        });
        return { ...p, status:"disposed", disposalDate: sellDate };
      });
      return { ...prev, [ticker]: { ...holding, parcels:newParcels, cgtEvents:[...(holding.cgtEvents||[]), ...newCgtEvents] } };
    });
  }

  const em = ENTITY_META[client.entityType] || { icon:"👤", color:C.blue };
  const readOnly = page==="legend";

  const navCounts = {
    summary: Object.keys(localHoldings).length,

    actions: Object.values(localHoldings).reduce((s,h)=>s+(h.actions||[]).length,0),
    rightsTotal: rights.length,

    cgtevents: [...cgtEvents, ...Object.values(localHoldings).flatMap(h=>h.cgtEvents||[])].length,
  };

  // CGT Events moved out of "CORPORATE ACTIONS": the page also covers rights and
  // manual disposals, contradicting that grouping (flagged by audit + benchmark).
  const sideNav = [
    { group:"PORTFOLIO", items:[
      { id:"summary", label:"Portfolio Dashboard", icon:"📊", count:navCounts.summary },
      { id:"parcels", label:"Parcel Register", icon:"📋", color:"79,158,255", count:navCounts.parcels },
    ]},
    { group:"CORPORATE ACTIONS", items:[
      { id:"actions", label:"Corporate Actions", icon:"⚡", color:"251,146,60", count:navCounts.actions },
      { id:"rights",  label:"Rights Register",  icon:"📜", color:"192,132,252", count:navCounts.rightsTotal, badge: navCounts.rightsPending>0?`${navCounts.rightsPending} pending`:null },
    ]},
    { group:"CGT", items:[
      { id:"cgtevents",label:"CGT Events", icon:"🧾", color:"251,191,36", count:navCounts.cgtevents },
    ]},
    { group:"REFERENCE", items:[
      { id:"legend", label:"Origin Guide", icon:"🏷️" },
    ]},
  ];

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={onBack} style={{background:"none",border:"none",color:C.dim,
                fontSize:12,cursor:"pointer",fontFamily:"'IBM Plex Mono',monospace",
                padding:"2px 6px",borderRadius:4,display:"flex",alignItems:"center",gap:4}}>
                ← Clients
              </button>
              <span style={{color:C.muted,fontSize:12}}>/</span>
              <span style={{display:"inline-flex",alignItems:"center",gap:5,
                fontFamily:"'IBM Plex Mono',monospace",fontSize:12,fontWeight:600,color:em.color}}>
                {em.icon} {client.name}
              </span>
              <span style={{display:"inline-flex",padding:"1px 7px",borderRadius:3,fontSize:9,
                fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,
                background:`${em.color}16`,color:em.color,border:`1px solid ${em.color}30`}}>
                {client.entityType}
              </span>
            </div>
            <div style={S.logoSub}>CGTrace · CGT Parcel Tracker · {client.fy}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {client.status==="review"&&(
            <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,padding:"3px 10px",borderRadius:4,
              background:"rgba(251,191,36,0.12)",color:C.amber,border:"1px solid rgba(251,191,36,0.3)"}}>
              ⚠ Needs Review
            </span>
          )}
        </div>
      </div>

      <div style={S.main}>
        <div style={S.sidebar}>
          {sideNav.map(({group,items})=>(
            <div key={group} style={{marginBottom:20}}>
              <div style={S.sideLabel}>{group}</div>
              {items.map(({id,label,icon,color,count,badge})=>(
                <div key={id} style={S.sideItem(page===id,color)} onClick={()=>setPage(id)} data-tour={id==="parcels"?"tour-parcel-register":id==="summary"?"tour-portfolio-dashboard":undefined}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13}}>{icon}</span>{label}</div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    {badge && <span style={{fontSize:8.5,fontFamily:"'IBM Plex Mono',monospace",color:"#fbbf24",background:"rgba(251,191,36,0.16)",border:"1px solid rgba(251,191,36,0.32)",borderRadius:3,padding:"1px 5px"}}>{badge}</span>}
                    {count!=null && <span style={{fontSize:9.5,fontFamily:"'IBM Plex Mono',monospace",color:CD.dim}}>{count}</span>}
                  </div>
                </div>
              ))}

// Build an augmented row list grouped first by PARTNER, then by client group, then
// the entities. Sentinels: { __partner } and { __hdr, __members }; clients render as-is.
function buildGroupedRows(list) {
  const out = [];
  const partners = [];
  PARTNER_GROUPS.forEach(g => { if (!partners.includes(g.partner)) partners.push(g.partner); });
  partners.forEach(p => {
    const pGroups = PARTNER_GROUPS.filter(g => g.partner === p)
      .map(g => ({ g, members: list.filter(c => g.entityIds.includes(c.id)) }))
      .filter(x => x.members.length);
    if (!pGroups.length) return;
    out.push({ __partner:p, __groups:pGroups.length });
    pGroups.forEach(({ g, members }) => { out.push({ __hdr:g, __members:members }); members.forEach(c => out.push(c)); });
  });
  const gset = new Set(PARTNER_GROUPS.flatMap(g => g.entityIds));
  const ung = list.filter(c => !gset.has(c.id));
  if (ung.length) { out.push({ __partner:null, __groups:1 }); out.push({ __hdr:null, __members:ung }); ung.forEach(c => out.push(c)); }
  return out;
}

// CGTrace's own CGT-work stage for a return: the state of the CGT portfolio
// reconciliation + report, distinct from the upstream Xero tax-return job.
// Reconciling → Report ready (reconciled & CGT report done) → Synced (figure pushed).
// Fully system-derived below (deriveCGTStatus) — no manual override anywhere.
const JOB_WORKFLOW = {
  "Reconciling":  { color:C.blue,  bg:"rgba(83,74,183,0.12)" },
  "Report ready": { color:C.amber, bg:"rgba(153,107,10,0.12)" },
  "Synced":       { color:C.teal,  bg:"rgba(15,110,86,0.12)" },
};
// Single source of truth for a job's CGT-work stage. Derived purely from real
// signals — last-reconciled timestamp vs. the FY end, and whether the figure has
// been pushed — never from any user-settable field. Client Portfolios and Tax
// Obligations both call this so the two views can never disagree about the same
// job (previously each held its own independently-editable jobStatus map; a 28 Jun
// fix patched one symptom — status not flipping to Synced after a push made
// elsewhere — this removes the underlying duplication that symptom came from).
function deriveCGTStatus(client, ps, jobFy) {
  if (!ps) return "Reconciling";
  if (ps.ret.cgtPushed && jobFy === ps.ret.year) return "Synced";
  const fyObj = FY_OPTIONS.find(f => f.label === jobFy);
  const reconciledPastFyEnd = !!(fyObj && client.lastReconciledAt && new Date(client.lastReconciledAt) >= new Date(fyObj.end));
  return reconciledPastFyEnd ? "Report ready" : "Reconciling";
}

// Single source of truth for "what's the CGT result" — used by Tax Obligations'
// CGT result column (CGTResultCell), its push/sync action, and Client Portfolios'
// CGT Outcome column, so the same client/FY can never show two different figures
// across tabs. Previously Tax Obligations computed its $ figure from
// getClientObligations() (flat gains-minus-losses netting) while this function
// computed a separate "estimated tax payable" (buildCGTSchedule()'s assessable
// gain × a flat entity MTR) — different engines AND different units dressed
// identically. Now there's one engine (buildCGTSchedule, the same one the CGT
// Report's "Bottom line" banner uses) and the headline figure is the assessable
// gain itself — the figure that's actually lodged/pushed to Xero, not a tax
// estimate.
//
// Status-gated: pass the job's deriveCGTStatus() result in. "In progress" fires
// purely off status === "Reconciling", regardless of whether a partial schedule
// already has rows — the data isn't final until the period is reconciled, so a
// not-yet-reconciled client must never read as a (false) "No CGT event". Only
// once status has moved past Reconciling does a genuine zero result become the
// distinct "No CGT event".
function cgtOutcomeForFY(client, holdings, fyObj, status) {
  if (!fyObj) return { kind:"none", label:"—", color:C.muted };
  if (status === "Reconciling") return { kind:"in_progress", label:"In progress", color:C.blue };
  const { rows, totalGrossGains, totalGrossLosses, netAssessableGain, lossesCarriedForward } =
    buildCGTSchedule(client, holdings, fyObj.start, fyObj.end);
  const breakdown = {
    disposals: rows.length,
    grossGains: totalGrossGains,
    grossLosses: totalGrossLosses,
    netPosition: totalGrossGains - totalGrossLosses,
    assessable: netAssessableGain,
    lossesCarriedForward,
  };
  if (netAssessableGain > 0) return { kind:"gain", label:`$${fmt(netAssessableGain,0)} gain due`, color:C.amber, breakdown };
  if (lossesCarriedForward > 0) return { kind:"loss", label:`$${fmt(lossesCarriedForward,0)} loss c/f`, color:C.blue, breakdown };
  return { kind:"none", label:"No CGT event", color:C.teal, breakdown };
}

// Small hover/focus "what does this mean" bubble for a metric tile. Deliberately
// plain (no fixed positioning) since tiles sit in a grid with room to spare —
// mirrors the app's existing ⓘ idiom (see StrategyInfo, GroupHierarchy) at a
// lighter weight for short one-line explanations.
function InfoDot({ text }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{ position:"relative", display:"inline-flex", marginLeft:5 }}
      onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
      <span tabIndex={0} onFocus={()=>setShow(true)} onBlur={()=>setShow(false)}
        style={{ cursor:"help", color:C.muted, fontSize:10.5, border:`1px solid ${C.border}`,
          borderRadius:9, padding:"0 5px", lineHeight:"14px" }}>ⓘ</span>
      {show && (
        <span style={{ position:"absolute", top:"calc(100% + 6px)", left:0, zIndex:60, width:220,
          background:"#0F0E17", border:"1px solid #2D2845", borderRadius:8, boxShadow:"0 10px 28px rgba(0,0,0,0.35)",
          padding:"8px 10px", fontSize:11, lineHeight:1.5, color:"#EEEDFE", fontWeight:400,
          fontFamily:"'IBM Plex Sans',sans-serif", whiteSpace:"normal" }}>
          {text}
        </span>
      )}
    </span>
  );
}

// Collapsible mini-dashboard for practice managers/accountants — sits in the
// Compliance header above the Client Portfolios / Tax Obligations tabs. Collapsed
// shows a compact one-line summary (today's behaviour, corrected); expanded drops
// a tile row below with the fuller picture. Numbers come straight from clients/pm
// props except "yet to reconcile", which is a static placeholder — see
// MOCK_UNRECONCILED for why.
function ComplianceMiniDashboard({ clients, pm }) {
  const [open, setOpen] = useState(true);
  const groups = PARTNER_GROUPS.length;
  const entities = clients.length;
  const readiness = computeReadiness(clients, PM_NOW);
  const returns = computeReturnStats(clients, pm, PM_NOW);

  const tile = (label, value, sub, info, color) => (
    <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8,
      padding:"10px 14px", minWidth:148, flex:"1 1 148px" }}>
      <div style={{ display:"flex", alignItems:"center", fontSize:10, letterSpacing:"0.06em",
        textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>
        {label}{info && <InfoDot text={info}/>}
      </div>
      <div style={{ fontSize:19, fontWeight:700, color:color||C.text, fontFamily:"'IBM Plex Mono',monospace", marginTop:4 }}>
        {value}
      </div>
      {sub && <div style={{ fontSize:10.5, color:C.dim, marginTop:2 }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        <span style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:12 }}>
          <span style={{ color:C.blue, fontWeight:700 }}>{groups}</span>
          <span style={{ color:C.muted, marginLeft:5 }}>client groups</span>
        </span>
        <span style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:12 }}>
          <span style={{ color:C.purple, fontWeight:700 }}>{entities}</span>
          <span style={{ color:C.muted, marginLeft:5 }}>entities</span>
        </span>
        <span style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:12 }}>
          <span style={{ color: readiness.pct>=80?C.teal:readiness.pct>=50?C.amber:C.red, fontWeight:700 }}>{readiness.pct}%</span>
          <span style={{ color:C.muted, marginLeft:5 }}>portfolios current</span>
        </span>
        <button onClick={()=>setOpen(o=>!o)} title={open ? "Collapse the summary tiles" : "Expand the summary tiles"}
          style={{ background:open?"rgba(96,165,250,0.14)":C.surface, border:`1px solid ${C.blue}`,
            color:C.blue, fontSize:11.5, fontWeight:700, cursor:"pointer", fontFamily:"'IBM Plex Mono',monospace",
            padding:"5px 12px", borderRadius:6, whiteSpace:"nowrap" }}>
          {open ? "▲ Hide details" : "▼ Show details"}
        </button>
      </div>

      {open && (
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:12 }}>
          {tile("Client groups", groups,
            PARTNER_GROUPS.map(g=>g.name.split(" ")[0]).join(" · "),
            "Family / relationship groups clustering related entities (e.g. an individual + their SMSF + family trust), as set up in your practice management system.",
            C.blue)}
          {tile("Entities", entities,
            "individuals, trusts, SMSFs & companies",
            "Every client record across all groups — one per legal entity, regardless of which family/client group it belongs to.",
            C.purple)}
          {tile("Portfolio readiness", `${readiness.pct}%`,
            `${readiness.current}/${readiness.total} reconciled in last ${READINESS_WINDOW_DAYS}d`,
            `Share of client portfolios with a "Mark reconciled" stamp (from the client's Summary tab) within the last ${READINESS_WINDOW_DAYS} days. Older than that — or never reconciled — counts as not current.`,
            readiness.pct>=80?C.teal:readiness.pct>=50?C.amber:C.red)}
          {tile("Returns due", `${returns.overdue + returns.soonDue}/${returns.total}`,
            `${returns.overdue} overdue · ${returns.soonDue} due ≤14d`,
            "Current-FY tax-return obligations that are either past their due date or due within 14 days, out of every return being tracked this FY.",
            returns.overdue>0?C.red:returns.soonDue>0?C.amber:C.teal)}
          {tile("Yet to reconcile", `${MOCK_UNRECONCILED.parcels} parcels`,
            `$${(MOCK_UNRECONCILED.costBase/1000).toFixed(0)}k cost base · demo figure`,
            "Parcels and cost base added since a client's last reconciliation, still awaiting accountant review — not yet wired to live parcel-import data, shown as a static demo figure.",
            C.amber)}
        </div>
      )}
    </div>
  );
}
