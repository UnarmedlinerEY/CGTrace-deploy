const fmt = (n, dp = 2) => n == null ? "—" : n.toLocaleString("en-AU", { minimumFractionDigits: dp, maximumFractionDigits: dp });
const fmtDate = d => { if (!d) return "—"; const [y, m, day] = d.split("-"); return `${day}/${m}/${y}`; };

const fmtDateTime = iso => { if (!iso) return "—"; const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,"0"), mm = String(d.getMonth()+1).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0"), mi = String(d.getMinutes()).padStart(2,"0");
  return `${dd}/${mm}/${d.getFullYear()}, ${hh}:${mi}`; };
const fmtMoney = n => "$" + Math.round(Math.abs(n)).toLocaleString("en-AU");
const fmtPct = n => (n * 100).toFixed(1) + "%";

/* Hash routing — plain location.hash, no router lib.
   Every screen the user can land on needs a hash entry, or the browser's real
   Back/Forward buttons silently skip it (29 Jun bug: Back appeared to jump
   "randomly" between pages because the CGT Report page and two in-page tab
   switches were plain useState, invisible to history). Route table:
     #/clients                  → clients tab (default)
     #/clients/obligations      → obligations tab
     #/client/:id               → client tracker
     #/report/:clientId/:fyLabel? → CGT report (fyLabel optional, e.g. "2024-25")
     #/partner                  → partner workspace tab (default)
     #/partner/overview         → partner overview tab
     #/tests                    → laws & engine reference
   param/param2 are reused per-view above — no schema change needed, just
   make sure every navigation that changes what's on screen goes through nav(). */
function parseHash() {
  const h = (window.location.hash || "#/clients").replace(/^#\/?/, "");
  const parts = h.split("/").filter(Boolean);
  return { view: parts[0] || "clients", param: parts[1] || null, param2: parts[2] || null };
}
const nav = path => { window.location.hash = path; };

function simulateDelay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

async function mockAPIFetch(endpoint, params = {}) {
  const jitter = Math.floor(Math.random() * 400) + 200;
  await simulateDelay(jitter);
  if (Math.random() < 0.08 && endpoint !== "prices") {
    throw new Error(`API_TIMEOUT: ${endpoint} did not respond within ${jitter}ms. Retrying…`);
  }
  switch (endpoint) {
    case "broker/transactions":
      return { ok:true, source:"CommSec/nabtrade", asAt:new Date().toISOString(), data: MOCK_BROKER_FEED[params.ticker] || [] };
    case "prices":
      if (params.tickers) {
        const result = {};
        params.tickers.forEach(t => { if (MOCK_PRICE_FEED[t]) result[t] = MOCK_PRICE_FEED[t]; });
        return { ok:true, source:"ASX Market Data", asAt:new Date().toISOString(), data:result };
      }
      return { ok:true, source:"ASX Market Data", asAt:new Date().toISOString(), data: MOCK_PRICE_FEED[params.ticker] || null };
    case "registry/corporate-actions":
      return { ok:true, source:"Computershare/Link Market Services", asAt:new Date().toISOString(), data: MOCK_REGISTRY_FEED[params.ticker] || [] };
    case "portfolio/summary":
      return { ok:true, source:"Portfolio Aggregator", asAt:new Date().toISOString(),
        data: { clientId:params.clientId, totalPositions:4, lastUpdated: new Date().toISOString(),
          dataSources:["CommSec","nabtrade","Computershare","Link Market Services"] } };
    default:
      return { ok:false, error:"Unknown endpoint", data:null };
  }
}

/* ── Shared UX helpers (v0.5 tracker-UX pass) ─────────────────────────────────
   useSort + SortTh: column-header sort, reusing the sort idea already proven in
   ClientListView. EmptyState: icon + reason + CTA (replaces bare gray text).
   StatusBadge: status with a non-colour glyph so colourblind users can still
   distinguish state (WCAG 1.4.1). */
function useSort(initialKey=null, initialDir="asc") {
  const [sort,setSort] = useState({ key:initialKey, dir:initialDir });
  const toggle = (key) => setSort(s => s.key===key ? { key, dir:s.dir==="asc"?"desc":"asc" } : { key, dir:"asc" });
  const sorted = (rows, accessors) => {
    if(!sort.key || !accessors[sort.key]) return rows;
    const get = accessors[sort.key];
    const arr = [...rows].sort((a,b)=>{
      const va=get(a), vb=get(b);
      if(va==null && vb==null) return 0;
      if(va==null) return 1;
      if(vb==null) return -1;
      if(typeof va==="number" && typeof vb==="number") return va-vb;
      return String(va).localeCompare(String(vb), undefined, { numeric:true });
    });
    return sort.dir==="desc" ? arr.reverse() : arr;
  };
  return { sort, toggle, sorted };
}
function SortTh({ label, sortKey, sort, toggle, align, style }) {
  const active = sort.key===sortKey;
  return (
    <th onClick={()=>toggle(sortKey)} title="Sort by this column"
      style={{ ...S.th, textAlign:align||"left", cursor:"pointer", userSelect:"none",
        color:active?C.blue:S.th.color, ...(style||{}) }}>
      {label}<span style={{ marginLeft:4, fontSize:8, opacity:active?1:0.3 }}>{active?(sort.dir==="asc"?"▲":"▼"):"⇅"}</span>
    </th>
  );
}
function EmptyState({ icon, title, hint, cta, onCta }) {

    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      gap:8, padding:"40px 24px", textAlign:"center", color:C.dim }}>

      <div style={{ fontSize:13, fontWeight:600, color:C.text }}>{title}</div>
      {hint && <div style={{ fontSize:11.5, color:C.muted, maxWidth:380, lineHeight:1.6 }}>{hint}</div>}
      {cta && onCta && <button style={{ ...S.btn("primary"), marginTop:4 }} onClick={onCta}>{cta}</button>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SEVEN-STEP METHOD STATEMENT WATERFALL (new s.102-5)
// Renders the trail returned by calcS: step1 current-year losses by category,
// step2 carry-forward, step3/step4 quarantine, discount, net, minTaxGain.
// ═══════════════════════════════════════════════════════════════════════════════
function WaterfallPanel({ trail, defLoss, title }) {
  if (!trail) return null;
  const cats = ["DNR","DR","NR","R"];
  const catLabel = { DNR:"Deferred non-res", DR:"Deferred res", NR:"Non-res", R:"Residential" };
  const cellStyle = { ...S.td, ...S.mono, fontSize:11, textAlign:"right" };
  const rowLabel = (label, sub) => (
    <td style={{ ...S.td, fontSize:11 }}>
      <div style={{ color:C.text, fontWeight:500 }}>{label}</div>
      {sub && <div style={{ fontSize:9, color:C.muted, marginTop:1 }}>{sub}</div>}
    </td>
  );
  const sumStep = step => cats.reduce((s,k)=>s+(step[k]||0),0);
  return (
    <div style={{ ...S.panel, marginBottom:14 }}>
      <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em",
        textTransform:"uppercase", color:C.gold, fontFamily:"'IBM Plex Mono',monospace" }}>
        {title || "Seven-step method statement (new s.102-5)"}
      </div>
      {defLoss > 0 && (
        <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border2}`,
          fontSize:11, color:C.red, fontFamily:"'IBM Plex Mono',monospace" }}>
          Deferred loss crystallised at deemed disposal: {fmtMoney(defLoss)} → enters Step 1 as a current-year loss
        </div>
      )}
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead><tr>
            <th style={S.th}>Step</th>
            {cats.map(k => <th key={k} style={{ ...S.th, textAlign:"right" }}>{catLabel[k]}</th>)}
            <th style={{ ...S.th, textAlign:"right" }}>Total</th>
          </tr></thead>
          <tbody>
            <tr>
              {rowLabel("Gains by category", "before losses")}
              {cats.map(k => <td key={k} style={cellStyle}>{trail.cat0 && trail.cat0[k] ? fmtMoney(trail.cat0[k]) : "—"}</td>)}
              <td style={{ ...cellStyle, color:C.text, fontWeight:600 }}>{trail.cat0 ? fmtMoney(sumStep(trail.cat0)) : "—"}</td>
            </tr>
            <tr>
              {rowLabel("Step 1 — current-year losses", `total ${fmtMoney(trail.curTotal || 0)} · drain order DNR→DR→NR→R`)}
              {cats.map(k => <td key={k} style={{ ...cellStyle, color:C.red }}>{trail.step1 && trail.step1[k] ? `−${fmtMoney(trail.step1[k])}` : "—"}</td>)}
              <td style={{ ...cellStyle, color:C.red }}>{trail.step1 ? `−${fmtMoney(sumStep(trail.step1))}` : "—"}</td>
            </tr>
            <tr>
              {rowLabel("Step 2 — carry-forward losses", `total ${fmtMoney(trail.cfTotal || 0)}`)}
              {cats.map(k => <td key={k} style={{ ...cellStyle, color:C.red }}>{trail.step2 && trail.step2[k] ? `−${fmtMoney(trail.step2[k])}` : "—"}</td>)}
              <td style={{ ...cellStyle, color:C.red }}>{trail.step2 ? `−${fmtMoney(sumStep(trail.step2))}` : "—"}</td>
            </tr>
            <tr>
              {rowLabel("Step 3 — quarantined → deferred residential", "never touches non-residential")}
              <td style={cellStyle}>—</td>
              <td style={{ ...cellStyle, color:C.purple }}>{trail.step3 ? `−${fmtMoney(trail.step3)}` : "—"}</td>
              <td style={cellStyle}>—</td><td style={cellStyle}>—</td>
              <td style={{ ...cellStyle, color:C.purple }}>{trail.step3 ? `−${fmtMoney(trail.step3)}` : "—"}</td>
            </tr>
            <tr>
              {rowLabel("Step 4 — quarantined remainder → residential", trail.qrUnused > 0 ? `${fmtMoney(trail.qrUnused)} unused` : null)}
              <td style={cellStyle}>—</td><td style={cellStyle}>—</td><td style={cellStyle}>—</td>
              <td style={{ ...cellStyle, color:C.purple }}>{trail.step4 ? `−${fmtMoney(trail.step4)}` : "—"}</td>
              <td style={{ ...cellStyle, color:C.purple }}>{trail.step4 ? `−${fmtMoney(trail.step4)}` : "—"}</td>
            </tr>
            <tr>
              {rowLabel("Step 5 — discount on deferred categories", "post-discount amounts")}
              <td style={{ ...cellStyle, color:C.teal }}>{trail.DNRdisc != null ? fmtMoney(trail.DNRdisc) : "—"}</td>
              <td style={{ ...cellStyle, color:C.teal }}>{trail.DRdisc != null ? fmtMoney(trail.DRdisc) : "—"}</td>
              <td style={cellStyle}>{trail.NRfinal != null ? fmtMoney(trail.NRfinal) : "—"}</td>
              <td style={cellStyle}>{trail.Rfinal != null ? fmtMoney(trail.Rfinal) : "—"}</td>
              <td style={{ ...cellStyle, color:C.teal }}>{trail.discounted != null ? fmtMoney(trail.discounted + (trail.NRfinal||0) + (trail.Rfinal||0)) : "—"}</td>
            </tr>
            <tr>
              {rowLabel("Step 6 — small business CGT concessions", "retained by Bill — not modelled")}
              <td style={cellStyle}>—</td><td style={cellStyle}>—</td><td style={cellStyle}>—</td><td style={cellStyle}>—</td><td style={cellStyle}>—</td>
            </tr>
            <tr style={{ background:"rgba(255,255,255,0.035)" }}>
              {rowLabel("Step 7 — net capital gain")}
              <td colSpan={4} style={cellStyle}></td>
              <td style={{ ...cellStyle, color:C.amber, fontWeight:700, fontSize:13 }}>{fmtMoney(trail.net || 0)}</td>
            </tr>
            <tr>
              {rowLabel("Minimum-tax gain", "post-step NR + R only — deferred amounts excluded")}
              <td colSpan={4} style={cellStyle}></td>
              <td style={{ ...cellStyle, color:C.orange, fontWeight:600 }}>{fmtMoney(trail.minTaxGain || 0)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// AU CGT CONTENT — comparison / waterfall / sensitivity / breakeven / snapshot
// All calculations via CBPDomain.parcelToInput + calcS with the selected ruleset.
// ═══════════════════════════════════════════════════════════════════════════════
function AUCalcContent({ activeTab, parcel, holding, effCB, holdingType, rules, client }) {
  const defaultSalePrice = parseFloat((effCB * 1.6).toFixed(0));
  const defaultSaleDate  = "2028-07-01";
  const TRANS = new Date(rules.transDate || "2027-07-01");

  const [inp, setInp] = useState({
    salePrice: defaultSalePrice,
    saleDate:  defaultSaleDate,
    marginalRate: 0.47,
    cpiRate: 0.028,
    capLosses: 0,
    investorType: ENTITY_TO_INV[client?.entityType] || "individual",
    incomeSupportExempt: false,
    mv2027: 0,
  });
  // hoisted from the old conditional render (rules-of-hooks fix)
  const [earlyDate, setEarlyDate] = useState("2026-12-31");
  const si = (k, v) => setInp(p => ({ ...p, [k]: v }));

  // Build calcS input via the adapter, run under the selected ruleset
  const runScenario = (ov) => {
    const m = { ...inp, ...(ov || {}) };
    try {
      const input = parcelToInput(parcel, holding,
        { salePrice: m.salePrice, saleDate: m.saleDate, mv2027: m.mv2027 },
        { inv: m.investorType, rules, overrides: {
            mtr: m.marginalRate, cpi: m.cpiRate, cl: m.capLosses,
            incsup: m.incomeSupportExempt,
            valMethod: m.mv2027 > 0 ? "actual" : "formula" } });
      return calcS(input, rules);
    } catch (e) { return null; }
  };

  const result = useMemo(() => runScenario(), [inp, effCB, parcel.acquisitionDate, rules]);

  const r = result;
  const showMV27 = new Date(parcel.acquisitionDate) < TRANS && new Date(inp.saleDate) > TRANS;

  const InputPanel = () => (
    <div style={{ background:C.surface2, border:`1px solid ${C.border}`, borderRadius:8,
      padding:"14px 16px", marginBottom:16 }}>
      <div style={{ ...S.label, marginBottom:10, color:C.gold }}>
        Calculator inputs — pre-populated from parcel · ruleset: {rules.label}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))", gap:10 }}>
        <div style={S.formGroup}>
          <label style={S.label}>Cost base (locked)</label>
          <div style={{ ...S.input, color:C.blue, background:"rgba(79,158,255,0.06)", cursor:"default" }}>{fg(effCB)}</div>
        </div>
        <div style={S.formGroup}>
          <label style={S.label}>Acq. date (locked)</label>
          <div style={{ ...S.input, color:C.dim, background:"rgba(255,255,255,0.02)", cursor:"default" }}>{fmtDate(parcel.acquisitionDate)}</div>
        </div>
        <div style={S.formGroup}>
          <label style={S.label}>Sale Price $</label>
          <input type="number" style={S.input} value={inp.salePrice} onChange={e => si("salePrice", parseFloat(e.target.value) || 0)}/>
        </div>
        <div style={S.formGroup}>
          <label style={S.label}>Sale Date</label>
          <input type="date" style={S.input} value={inp.saleDate} onChange={e => si("saleDate", e.target.value)}/>
        </div>
        <div style={S.formGroup}>
          <label style={S.label}>Marginal Rate %</label>
          <input type="number" style={S.input} value={(inp.marginalRate * 100).toFixed(0)} min="0" max="55"
            onChange={e => si("marginalRate", (parseFloat(e.target.value) || 0) / 100)}/>
        </div>
        <div style={S.formGroup}>
          <label style={S.label}>CPI Rate %</label>
          <input type="number" style={S.input} value={(inp.cpiRate * 100).toFixed(1)} step="0.1" min="0" max="15"
            onChange={e => si("cpiRate", (parseFloat(e.target.value) || 0) / 100)}/>
        </div>
        <div style={S.formGroup}>
          <label style={S.label}>Capital Losses $</label>
          <input type="number" style={S.input} value={inp.capLosses} min="0"
            onChange={e => si("capLosses", parseFloat(e.target.value) || 0)}/>
        </div>
        <div style={S.formGroup}>
          <label style={S.label}>Investor Type</label>
          <select style={S.select} value={inp.investorType} onChange={e => si("investorType", e.target.value)}>
            <option value="individual">Individual</option>
            <option value="trust">Trust</option>
            <option value="smsf">SMSF</option>
            <option value="company">Company</option>
          </select>
        </div>
        {showMV27 && (
          <div style={S.formGroup}>
            <label style={S.label}>MV at 1 Jul 2027 $</label>
            <input type="number" style={S.input} value={inp.mv2027} min="0" placeholder="0 = formula"
              onChange={e => si("mv2027", parseFloat(e.target.value) || 0)}/>
          </div>
        )}
      </div>
    </div>
  );

  if (!r) return <div style={{ color:C.muted, padding:20 }}>Enter a sale price and date to calculate.</div>;

  // Regimes — note the new engine returns richer trans objects (ttax/tat/teff/trail)
  const buildRegimes = () => {
    const regs = [
      { label:"Current Law", sub:"50% CGT discount (CONFIRMED)", tax:r.oldTax, at:r.oldAT, eff:r.oldEff, desc:r.oldDisc, color:C.blue, tg:r.oldTG, icb:effCB, rs:"current-law", rsStatus:"CONFIRMED" },
    ];
    // "Bill 2026" duplicates the formula-split transitional calc whenever isTransitional is true
    // (newTax just delegates to calcOneTrans(useVal,...) in that branch — see src/domain.js calcS),
    // so only show it standalone when there's no transitional split to compare against.
    if (!r.isTransitional) {
      regs.push({ label: rules.id === "bill-2026" ? "Bill 2026" : "Selected Ruleset", sub:`${rules.label} (${rules.status})`, tax:r.newTax, at:r.newAT, eff:r.newEff, desc:r.newDisc, color:C.teal, tg:r.newTG, icb:r.newICB, rs:rules.id, rsStatus:rules.status });
    }
    if (r.isTransitional && r.transF) {
      regs.push({ label:"Transitional (Formula) CGT bill26", sub:"ATO proxy ⚠ not yet official", tax:r.transF.ttax, at:r.transF.tat, eff:r.transF.teff, desc:"Pre-2027: 50% disc · Post-2027: idx + min tax", color:C.amber, tg:r.transF.trail?.net, icb:r.transF.idxCB2027, rs:"bill-2026 (formula split)", rsStatus:"PENDING" });
    }
    if (r.isTransitional && r.transA && inp.mv2027 > 0) {
      regs.push({ label:"Transitional (MV)", sub:"Your market value", tax:r.transA.ttax, at:r.transA.tat, eff:r.transA.teff, desc:"Pre-2027: 50% disc · Post-2027: idx + min tax", color:C.gold, tg:r.transA.trail?.net, icb:r.transA.idxCB2027, rs:"bill-2026 (MV at 1 Jul 2027)", rsStatus:"PENDING" });
    }
    return regs;
  };

  // Method statement trail for the waterfall — prefer the one calcS selected
  const activeTrail = r.ms || (r.transA && r.transA.trail) || (r.transF && r.transF.trail) || null;

  // ── COMPARISON TAB ──────────────────────────────────────────────────────────
  if (activeTab === "comparison") {
    const regimes = buildRegimes();
    const allTax = regimes.map(x => x.tax);
    const minTax = Math.min(...allTax);
    const maxTax = Math.max(...allTax);
    const best   = regimes.find(x => x.tax === minTax);
    const saving = maxTax - minTax;

    return (
      <div>
        <InputPanel/>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }}>
          {r.isPrecgt    && <span style={{ ...S.mono, fontSize:9, padding:"2px 8px", borderRadius:3, background:"rgba(248,113,113,0.12)", color:C.red,   border:"1px solid rgba(248,113,113,0.3)" }}>Pre-CGT asset</span>}
          {!r.held12m    && <span style={{ ...S.mono, fontSize:9, padding:"2px 8px", borderRadius:3, background:"rgba(251,191,36,0.12)",  color:C.amber, border:"1px solid rgba(251,191,36,0.3)"  }}>{"< 12 months held"}</span>}
          {r.saleAfterTrans  && <span style={{ ...S.mono, fontSize:9, padding:"2px 8px", borderRadius:3, background:"rgba(251,146,60,0.12)", color:C.orange, border:"1px solid rgba(251,146,60,0.3)" }}>Sale post 1 Jul 2027</span>}
          {r.isTransitional  && <span style={{ ...S.mono, fontSize:9, padding:"2px 8px", borderRadius:3, background:"rgba(247,201,72,0.12)", color:C.gold,   border:"1px solid rgba(247,201,72,0.3)" }}>Transitional split</span>}
          {r.defLoss > 0 && <span style={{ ...S.mono, fontSize:9, padding:"2px 8px", borderRadius:3, background:"rgba(248,113,113,0.12)", color:C.red, border:"1px solid rgba(248,113,113,0.3)" }}>Deferred loss {fmtMoney(r.defLoss)}</span>}
          {inp.capLosses > 0 && <span style={{ ...S.mono, fontSize:9, padding:"2px 8px", borderRadius:3, background:"rgba(79,158,255,0.12)", color:C.blue,  border:"1px solid rgba(79,158,255,0.3)" }}>Losses: {fg(inp.capLosses)}</span>}
        </div>
        {saving > 100 && (
          <div style={{ padding:"10px 14px", borderRadius:7, marginBottom:14,
            background:`${best.color}14`, border:`1px solid ${best.color}38`,
            display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:18 }}>🏆</span>
            <div>
              <span style={{ color:best.color, fontWeight:700, fontSize:13 }}>{best.label}</span>
              <span style={{ color:C.dim, fontSize:12 }}> saves </span>
              <span style={{ color:C.teal, fontWeight:700, fontSize:13 }}>{fmtMoney(saving)}</span>
              <span style={{ color:C.dim, fontSize:12 }}> vs most expensive alternative</span>
            </div>
          </div>
        )}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))", gap:12, marginBottom:16 }}>
          {regimes.map(reg => (
            <div key={reg.label} style={{ background:C.surface, border:`1px solid ${reg.tax === minTax ? reg.color : C.border}`,
              borderRadius:8, padding:"14px 16px", position:"relative",
              boxShadow: reg.tax === minTax ? `0 0 18px ${reg.color}20` : "none" }}>
              {reg.tax === minTax && (
                <div style={{ position:"absolute", top:8, right:10, fontSize:9, color:reg.color, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700 }}>▼ BEST</div>
              )}
              {reg.tax === maxTax && regimes.length > 1 && reg.tax !== minTax && (
                <div style={{ position:"absolute", top:8, right:10, fontSize:9, color:C.red, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700 }}>▲ MOST</div>
              )}
              <div style={{ fontSize:11, fontWeight:700, color:reg.color, marginBottom:2, fontFamily:"'IBM Plex Mono',monospace" }}>{reg.label}</div>
              <div style={{ fontSize:9, color:C.muted, marginBottom:12, fontFamily:"'IBM Plex Mono',monospace" }}>{reg.sub}</div>
              <div style={S.summLabel}>Tax payable<ProvChip input={`sale ${fg(inp.salePrice)} · CB ${fg(effCB)}`} fn="calcS() → comboTax (step 5–7)" ruleset={reg.rs} status={reg.rsStatus}/></div>
              <div style={{ fontSize:22, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", color:reg.tax === minTax ? reg.color : C.text, marginBottom:6 }}>{fmtMoney(reg.tax)}</div>
              <div style={S.summLabel}>After-tax proceeds<ProvChip input={`sale ${fg(inp.salePrice)} − tax`} fn="sp − calcS().tax" ruleset={reg.rs} status={reg.rsStatus}/></div>
              <div style={{ fontSize:14, fontFamily:"'IBM Plex Mono',monospace", color:C.teal, marginBottom:6 }}>{fmtMoney(reg.at)}</div>
              <div style={S.summLabel}>Effective rate on gain<ProvChip input={`tax ÷ raw gain ${fg(r.rawGain)}`} fn="calcS().eff" ruleset={reg.rs} status={reg.rsStatus}/></div>
              <div style={{ fontSize:12, fontFamily:"'IBM Plex Mono',monospace", color:C.dim, marginBottom:8 }}>{fmtPct(reg.eff)}</div>
              <div style={{ fontSize:10, color:C.muted, lineHeight:1.5, borderTop:`1px solid ${C.border}`, paddingTop:8 }}>{reg.desc}</div>
            </div>
          ))}
        </div>
        <div style={{ ...S.panel, marginBottom:0 }}>
          <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>
            Detailed comparison
          </div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead><tr>
                <th style={S.th}>Item</th>
                {regimes.map(reg => <th key={reg.label} style={{ ...S.th, color:reg.color }}>{reg.label}</th>)}
              </tr></thead>
              <tbody>
                {[
                  ["Gross capital gain",       regimes.map(() => fg(r.rawGain))],
                  ["Capital losses offset",    regimes.map(() => inp.capLosses > 0 ? `−${fg(inp.capLosses)}` : "—")],
                  ["Net gain after losses",    regimes.map(() => fg(r.gainAL))],
                  ["Cost base used",           regimes.map(reg => reg.icb != null ? fg(reg.icb) : "—")],
                  ["Taxable / net gain",       regimes.map(reg => reg.tg != null ? fg(reg.tg) : "—")],
                  ["Tax payable",              regimes.map(reg => fmtMoney(reg.tax))],
                  ["Effective rate on gain",   regimes.map(reg => fmtPct(reg.eff))],
                  ["After-tax proceeds",       regimes.map(reg => fmtMoney(reg.at))],
                ].map(([label, vals]) => (
                  <tr key={label}>
                    <td style={{ ...S.td, fontSize:11, color:C.dim, fontFamily:"'IBM Plex Mono',monospace" }}>{label}</td>
                    {vals.map((v, i) => (
                      <td key={i} style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11,
                        color: label === "Tax payable"
                          ? (regimes[i]?.tax === minTax ? C.teal : regimes[i]?.tax === maxTax ? C.red : C.dim)
                          : label === "After-tax proceeds" ? (regimes[i]?.tax === minTax ? C.teal : C.dim) : C.dim }}>
                        {v}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        {r.isTransitional && (
          <div style={{ marginTop:12, padding:"10px 14px", borderRadius:7,
            background:"rgba(251,191,36,0.06)", border:"1px solid rgba(251,191,36,0.2)",
            fontSize:11, color:C.amber, lineHeight:1.65 }}>
            ⚠ Transitional split applies. Formula val at 1 Jul 2027 = {fmtMoney(r.formulaVal)} (linear proxy).
            {inp.mv2027 > 0 ? ` Entered MV = ${fmtMoney(inp.mv2027)}.` : " Enter a market value above to compare against formula."}
            {" "}ATO official formula specification pending release.
          </div>
        )}
        {rules.id === "current-law" && (
          <div style={{ marginTop:12, padding:"10px 14px", borderRadius:7,
            background:"rgba(52,211,153,0.06)", border:"1px solid rgba(52,211,153,0.2)",
            fontSize:11, color:C.teal, lineHeight:1.65 }}>
            Current-law ruleset selected (CONFIRMED) — no minimum tax floor applies; the discount method
            column is the operative treatment. Switch to Bill 2026 to model the proposed regime.
          </div>
        )}
      </div>
    );
  }

  // ── METHOD STATEMENT / WATERFALL TAB ────────────────────────────────────────
  if (activeTab === "waterfall") {
    return (
      <div>
        <InputPanel/>
        {activeTrail ? (
          <>
            <WaterfallPanel trail={activeTrail} defLoss={r.defLoss}
              title={r.isTransitional ? `Method statement — ${inp.mv2027 > 0 ? "MV" : "formula"} transitional pathway` : "Method statement — asset pathway"}/>
            {r.msPort && (
              <WaterfallPanel trail={r.msPort} defLoss={0}
                title="Portfolio view — including other-parcel gain pools (steps 1–7)"/>
            )}
            <div style={{ fontSize:10, color:C.muted, fontFamily:"'IBM Plex Mono',monospace", lineHeight:1.6 }}>
              Categories: deferred amounts arise from the deemed disposal at 1 Jul 2027 (s.112-155(2));
              residential vs non-residential split drives quarantine steps 3–4. Minimum-tax gain excludes
              deferred amounts per the Bill. Discount at step 5: {inp.investorType === "smsf" ? "⅓ (SMSF — ASSUMED unaffected by Bill)" : "50%"}.
            </div>
          </>
        ) : (
          <div style={{ ...S.panel, padding:"32px", textAlign:"center", color:C.dim, fontSize:12 }}>
            No method-statement trail for this scenario — the seven-step waterfall applies to
            post-transition disposals under the Bill (deemed sale, indexation pathways).
            {rules.id === "current-law" && " The current-law ruleset uses the discount method without the new s.102-5 sequence."}
            {!r.held12m && " Assets held under 12 months take the full-gain pathway."}
          </div>
        )}
      </div>
    );
  }

  // ── SENSITIVITY TAB ─────────────────────────────────────────────────────────
  if (activeTab === "sensitivity") {
    const runWith = (overrides) => runScenario(overrides);

    const SensBlock = ({ label, items, getLabel, getKey, toValue }) => (
      <div style={{ ...S.panel, marginBottom:16 }}>
        <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>{label}</div>
        <div style={{ display:"grid", gridTemplateColumns:`repeat(${items.length}, 1fr)`, gap:0 }}>
          {items.map((v, i) => {
            const nr = runWith({ [getKey]: toValue ? toValue(v) : v });
            if (!nr) return null;
            const diff = nr.newTax - nr.oldTax;
            const newTax = nr.newTax;
            const allNew = items.map(x => { const rr = runWith({ [getKey]: toValue ? toValue(x) : x }); return rr ? rr.newTax : Infinity; });
            const isBest = newTax === Math.min(...allNew);
            return (
              <div key={v} style={{ padding:"10px 10px", borderRight: i < items.length - 1 ? `1px solid ${C.border}` : "none",
                borderBottom:`1px solid ${C.border}`, background: i === Math.floor(items.length / 2) ? "rgba(79,158,255,0.04)" : "transparent" }}>
                <div style={{ fontSize:9, fontFamily:"'IBM Plex Mono',monospace", color:C.muted, marginBottom:4 }}>{getLabel(v)}</div>
                <div style={{ fontSize:12, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600, color: isBest ? C.teal : C.text, marginBottom:2 }}>{fmtMoney(newTax)}</div>
                <div style={{ fontSize:9, fontFamily:"'IBM Plex Mono',monospace", color: diff > 0 ? C.red : C.teal }}>
                  {diff >= 0 ? "▲" : "▼"}{fmtMoney(Math.abs(diff))} vs current law
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );

    return (
      <div>
        <InputPanel/>
        <p style={{ fontSize:12, color:C.dim, marginBottom:14, lineHeight:1.65 }}>
          Adjust parameters in the inputs above. Each grid shows how tax under the selected ruleset
          ({rules.label}) changes across that dimension, with the current-law delta below each value.
        </p>
        <SensBlock label="CPI Rate Sensitivity" items={[0,1,2,3,4,5,6,8,10]}
          getLabel={v => `${v}%`} getKey="cpiRate" toValue={v => v / 100}/>
        <SensBlock label="Marginal Rate Sensitivity" items={[19,25,32,37,45,47]}
          getLabel={v => `${v}%`} getKey="marginalRate" toValue={v => v / 100}/>
        <div style={{ ...S.panel, marginBottom:0 }}>
          <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>Sale Price Sensitivity</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:0 }}>
            {[-30,-15,0,15,30,50,100].map((pct, i) => {
              const sp2 = Math.max(0, effCB * (1 + pct / 100));
              const sr  = runWith({ salePrice: sp2 });
              if (!sr) return null;
              return (
                <div key={pct} style={{ padding:"10px 10px", borderRight: i < 6 ? `1px solid ${C.border}` : "none",
                  borderBottom:`1px solid ${C.border}`, background: pct === 0 ? "rgba(79,158,255,0.04)" : "transparent" }}>
                  <div style={{ fontSize:9, fontFamily:"'IBM Plex Mono',monospace", color:C.muted, marginBottom:3 }}>{pct >= 0 ? "+" : ""}{pct}%</div>
                  <div style={{ fontSize:9, fontFamily:"'IBM Plex Mono',monospace", color:C.dim, marginBottom:3 }}>{fmtMoney(sp2)}</div>
                  <div style={{ fontSize:10, fontFamily:"'IBM Plex Mono',monospace", color:C.blue, marginBottom:2 }}>Cur: {fmtMoney(sr.oldTax)}</div>
                  <div style={{ fontSize:10, fontFamily:"'IBM Plex Mono',monospace", color: sr.newTax < sr.oldTax ? C.teal : C.orange }}>New: {fmtMoney(sr.newTax)}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── BREAK-EVEN TAB ──────────────────────────────────────────────────────────
  if (activeTab === "breakeven") {
    const isPrior = new Date(earlyDate) < TRANS;
    const earlyHeld12m = daysBetweenDates(parcel.acquisitionDate, earlyDate) >= 365;
    // taxable fraction after discount at the early-sale date (current-law treatment pre-2027)
    const taxFrac = earlyHeld12m && inp.investorType !== "company"
      ? (inp.investorType === "smsf" ? 2 / 3 : 0.5) : 1.0;
    const futNet  = r.isTransitional && r.transF ? inp.salePrice - r.transF.ttax : r.newAT;
    let beqPrice = 0, earlyNet = 0;
    if (isPrior) {
      const cb2 = effCB + inp.capLosses;
      beqPrice = Math.max((futNet + taxFrac * inp.marginalRate * cb2) / (1 - taxFrac * inp.marginalRate), effCB);
      const eg = Math.max(0, beqPrice - effCB - inp.capLosses);
      earlyNet = beqPrice - eg * taxFrac * inp.marginalRate;
    }
    const margin = beqPrice - inp.salePrice;

    return (
      <div>
        <InputPanel/>
        <div style={{ ...S.panel, marginBottom:14 }}>
          <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>Break-even calculator</div>
          <div style={{ padding:"16px" }}>
            <p style={{ fontSize:12, color:C.dim, marginBottom:14, lineHeight:1.65 }}>
              Minimum price to sell <em>before</em> 1 July 2027 to achieve the same after-tax proceeds as your target post-2027 sale.
            </p>
            <div style={{ ...S.formGroup, maxWidth:260, marginBottom:14 }}>
              <label style={S.label}>Early sale date (before 1 Jul 2027)</label>
              <input type="date" style={S.input} value={earlyDate} max="2027-06-30" onChange={e => setEarlyDate(e.target.value)}/>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:14 }}>
              {[
                ["Future sale price", fmtMoney(inp.salePrice), C.amber],
                ["After-tax (post-2027)", fmtMoney(futNet), C.teal],
                ["Break-even (early)", isPrior && beqPrice > 0 ? fmtMoney(beqPrice) : "Set date ↑", C.blue],
              ].map(([label, val, color]) => (
                <div key={label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:7, padding:"12px 14px" }}>
                  <div style={S.summLabel}>{label}</div>
                  <div style={{ fontSize:18, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700, color, marginTop:4 }}>{val}</div>
                </div>
              ))}
            </div>
            {isPrior && beqPrice > 0 && (
              <div style={{ padding:"10px 14px", borderRadius:7,
                background: margin > 0 ? "rgba(248,113,113,0.07)" : "rgba(52,211,153,0.07)",
                border: margin > 0 ? "1px solid rgba(248,113,113,0.25)" : "1px solid rgba(52,211,153,0.25)",
                fontSize:12, color: margin > 0 ? C.red : C.teal, lineHeight:1.65 }}>
                {margin > 0
                  ? `You need ${fmtMoney(beqPrice)} before 1 Jul 2027 to match a ${fmtMoney(inp.salePrice)} post-2027 sale. New law costs ${fmtMoney(margin)} in required price.`
                  : `Break-even is ${fmtMoney(beqPrice)} — below your target price. Selling early at or above this price is viable.`}
              </div>
            )}
            {!isPrior && (
              <div style={{ padding:"10px 14px", borderRadius:7, background:"rgba(251,191,36,0.07)", border:"1px solid rgba(251,191,36,0.25)", fontSize:12, color:C.amber }}>
                Set an early sale date before 1 July 2027 to see break-even analysis.
              </div>
            )}
          </div>
        </div>
        <div style={{ ...S.panel, marginBottom:0 }}>
          <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>Key CGT dates (2026–28)</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))" }}>
            {[
              ["Neg. gearing cutoff","7:30pm 12 May 2026","Established property contracts before this time: grandfathered.",C.red],
              ["CGT transition","1 July 2027","Indexation + 30% min replaces 50% discount. Straddle assets split here.",C.amber],
              ["Pre-CGT exemption end","1 July 2027","Pre-Sep 1985 assets lose full exemption. MV at 2027 becomes cost base.",C.orange],
              ["Trust min tax","1 July 2028","30% minimum tax on all discretionary trust income.",C.purple],
            ].map(([label, date, desc, color]) => (
              <div key={label} style={{ padding:"12px 14px", borderRight:`1px solid ${C.border}`, borderBottom:`1px solid ${C.border}`, borderTop:`3px solid ${color}` }}>
                <div style={{ ...S.label, marginBottom:3, color }}>{label}</div>
                <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:12, fontWeight:700, color:C.text, marginBottom:3 }}>{date}</div>
                <div style={{ fontSize:10, color:C.dim, lineHeight:1.5 }}>{desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── SNAPSHOT TAB ────────────────────────────────────────────────────────────
  if (activeTab === "snapshot") {
    const regimes = [
      { label:"Current Law", tax:r.oldTax, at:r.oldAT, eff:r.oldEff, color:C.blue },
      { label: rules.id === "bill-2026" ? "Bill 2026" : "Selected Ruleset", tax:r.newTax, at:r.newAT, eff:r.newEff, color:C.teal },
      ...(r.isTransitional && r.transF ? [{ label:"Transitional", tax:r.transF.ttax, at:r.transF.tat, eff:r.transF.teff, color:C.amber }] : []),
    ];
    const minTax = Math.min(...regimes.map(x => x.tax));
    const best   = regimes.find(x => x.tax === minTax);
    const saleD = inp.saleDate;

    const considerations = [
      r.isPrecgt && { icon:"🔴", title:"Pre-CGT asset — consider selling before 1 Jul 2027", body:"Full CGT exemption if sold before the transition date. After 1 Jul 2027, MV at that date becomes the cost base; 30% min applies with no 50% discount history.", color:C.red },
      !r.held12m && { icon:"⏳", title:"Under 12 months — no CGT discount", body:"Neither 50% discount nor indexation benefit applies until the 12-month anniversary. Consider holding if practical.", color:C.amber },
      r.saleAfterTrans && r.newTax > r.oldTax && { icon:"📅", title:"Current law is cheaper — model an early sale", body:`Selling pre-transition saves approximately ${fmtMoney(r.newTax - r.oldTax)} in tax for this parcel. Use the Break-even tab.`, color:C.orange },
      r.defLoss > 0 && { icon:"📉", title:"Deferred loss crystallises at the deemed disposal", body:`A ${fmtMoney(r.defLoss)} deferred loss enters Step 1 of the method statement as a current-year loss — it drains gain categories in DNR→DR→NR→R order.`, color:C.red },
      inp.capLosses === 0 && { icon:"📉", title:"No capital losses entered", body:"Available losses from other disposals can offset this gain. Enter them above to model the impact.", color:C.blue },
      r.isTransitional && { icon:"⚠", title:"Get a formal valuation at 1 Jul 2027", body:"A registered-valuer report near 1 Jul 2027 may produce a better split than the formula proxy. Enter above as 'MV at 1 Jul 2027'.", color:C.amber },
    ].filter(Boolean);

    return (
      <div>
        <InputPanel/>
        <div style={{ ...S.panel, marginBottom:14 }}>
          <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>Parcel snapshot</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))" }}>
            {[
              ["Holding", holding.ticker, HOLDING_TYPE_META[holdingType]?.color || C.blue],
              ["Asset type", holdingType, HOLDING_TYPE_META[holdingType]?.color || C.blue],
              ["Origin", ORIGINS[parcel.origin]?.label || parcel.origin, C.purple],
              ["Acq. date", fmtDate(parcel.acquisitionDate), C.dim],
              ["Qty", fmt(parcel.qty, parcel.qty < 1 ? 4 : 0), C.text],
              ["Raw cost base", fg(parcel.totalCost), C.dim],
              ["Eff. cost base", fg(effCB), C.blue],
              ["Days held at sale", `${Math.floor(holdingDays(parcel.acquisitionDate, saleD))}d`, C.dim],
              ["CGT discount at sale", discountEligible(parcel.acquisitionDate, saleD) ? "✓ Eligible" : "✗ Not yet", discountEligible(parcel.acquisitionDate, saleD) ? C.teal : C.red],
            ].map(([label, val, color]) => (
              <div key={label} style={{ padding:"10px 14px", borderRight:`1px solid ${C.border}`, borderBottom:`1px solid ${C.border}` }}>
                <div style={S.summLabel}>{label}</div>
                <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:12, color, fontWeight:500, marginTop:3 }}>{val}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ padding:"14px 16px", borderRadius:8, marginBottom:14,
          background:`${best.color}10`, border:`1px solid ${best.color}30` }}>
          <div style={{ fontSize:11, color:best.color, fontWeight:700, marginBottom:10 }}>
            Best outcome for this parcel: <span style={{ fontSize:13 }}>{best.label}</span>
          </div>
          <div style={{ display:"flex", gap:24, flexWrap:"wrap" }}>
            <div><div style={S.summLabel}>Tax payable</div><div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:20, color:best.color, fontWeight:700 }}>{fmtMoney(best.tax)}</div></div>
            <div><div style={S.summLabel}>After-tax proceeds</div><div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:20, color:C.teal, fontWeight:700 }}>{fmtMoney(best.at)}</div></div>
            <div><div style={S.summLabel}>Effective rate</div><div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:20, color:C.dim, fontWeight:700 }}>{fmtPct(best.eff)}</div></div>
          </div>
        </div>
        {considerations.length > 0 && (
          <div style={{ ...S.panel, marginBottom:0 }}>
            <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>Planning considerations</div>
            <div style={{ padding:"12px 14px", display:"flex", flexDirection:"column", gap:10 }}>
              {considerations.map((item, i) => (
                <div key={i} style={{ display:"flex", gap:10, padding:"10px 12px", borderRadius:7,
                  background:`${item.color}08`, border:`1px solid ${item.color}22` }}>
                  <span style={{ fontSize:16, flexShrink:0 }}>{item.icon}</span>
                  <div>
                    <div style={{ fontSize:12, fontWeight:600, color:item.color, marginBottom:3 }}>{item.title}</div>
                    <div style={{ fontSize:11, color:C.dim, lineHeight:1.6 }}>{item.body}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// CRYPTO CGT CONTENT — 3 tabs (FIFO via CBPDomain.calcCryptoFIFO)
// ═══════════════════════════════════════════════════════════════════════════════
function CryptoCalcContent({ activeTab, parcel, holding }) {
  const transactions = useMemo(() => {
    return holding.parcels.map(p => ({
      id: p.id,
      date: p.acquisitionDate,
      asset: p.notes?.includes("ETH") ? "ETH" : holding.ticker,
      type: (p.status === "disposed" || p.status === "cancelled") ? "sell" : "buy",
      quantity: p.qty,
      price: p.costPerUnit,
      fees: 0,
      wallet: "Portfolio",
    }));
  }, [holding]);

  const disposals = useMemo(() => calcCryptoFIFO(transactions), [transactions]);

  const totalGain = disposals.reduce((s, d) => s + d.gain, 0);
  const ltGain    = disposals.filter(d => d.longTerm).reduce((s, d) => s + d.gain, 0);
  const stGain    = disposals.filter(d => !d.longTerm).reduce((s, d) => s + d.gain, 0);
  const totalLoss = disposals.filter(d => d.gain < 0).reduce((s, d) => s + d.gain, 0);

  const fmtG = n => (n >= 0 ? "+" : "−") + "$" + Math.abs(n).toLocaleString("en-AU", { minimumFractionDigits:2, maximumFractionDigits:2 });

  const summCards = [
    ["Total Net Gain / Loss", fmtG(totalGain), totalGain >= 0 ? C.teal : C.red],
    ["Long-term Gains (≥365d)", fmtG(ltGain),    C.blue],
    ["Short-term Gains (<365d)", fmtG(stGain),   C.amber],
    ["Realised Losses",          fmtG(totalLoss), C.muted],
  ];

  if (activeTab === "disposal") return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))", gap:10, marginBottom:16 }}>
        {summCards.map(([label, val, color]) => (
          <div key={label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"12px 14px" }}>
            <div style={S.summLabel}>{label}</div>
            <div style={{ fontSize:18, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700, color, marginTop:4 }}>{val}</div>
          </div>
        ))}
      </div>
      <div style={{ ...S.panel, marginBottom:12 }}>
        <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>Disposal events — FIFO method</div>
        {disposals.length === 0
          ? <div style={{ padding:"20px", color:C.muted, fontSize:12 }}>No disposal events in this holding.</div>
          : (
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead><tr>
                  {["Date","Asset","Qty","Proceeds","Cost Basis","Gain / Loss","Hold Period"].map(h =>
                    <th key={h} style={S.th}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {disposals.map(d => (
                    <tr key={d.id}>
                      <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:C.dim }}>{d.date}</td>
                      <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700, color:C.crypto }}>{d.asset}</td>
                      <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11 }}>{d.quantity}</td>
                      <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11 }}>${fmt(d.proceeds)}</td>
                      <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:C.dim }}>${fmt(d.costBasis)}</td>
                      <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600, color: d.gain >= 0 ? C.teal : C.red }}>{fmtG(d.gain)}</td>
                      <td style={S.td}>
                        <span style={{ display:"inline-flex", padding:"2px 7px", borderRadius:3, fontSize:9, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700,
                          background: d.longTerm ? "rgba(79,158,255,0.12)" : "rgba(251,191,36,0.12)",
                          color: d.longTerm ? C.blue : C.amber,
                          border:`1px solid ${d.longTerm ? "rgba(79,158,255,0.25)" : "rgba(251,191,36,0.25)"}` }}>
                          {d.longTerm ? "LONG" : "SHORT"}
                        </span>
                        <span style={{ ...S.mono, fontSize:9, color:C.muted, marginLeft:5 }}>{d.heldDays}d</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
      </div>
      <div style={{ padding:"10px 14px", borderRadius:7, background:"rgba(248,113,113,0.06)", border:"1px solid rgba(248,113,113,0.2)", fontSize:10, color:C.red, lineHeight:1.65 }}>
        ⚠ FIFO method only. Crypto-to-crypto swaps, staking rewards, DeFi transactions, and per-wallet tracking not modelled. Parcel data is drawn from the register. Consult a crypto-specialist tax agent before filing.
      </div>
    </div>
  );

  if (activeTab === "transactions") return (
    <div>
      <div style={{ ...S.panel }}>
        <div style={{ padding:"8px 14px", borderBottom:`1px solid ${C.border}`, fontSize:9, letterSpacing:"0.14em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace" }}>
          All transactions — from parcel register ({transactions.length} records)
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead><tr>
              {["Date","Type","Asset","Qty","Price/Unit","Total Cost","Parcel Notes"].map(h => <th key={h} style={S.th}>{h}</th>)}
            </tr></thead>
            <tbody>
              {[...transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).map(tx => (
                <tr key={tx.id}>
                  <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:C.dim }}>{tx.date}</td>
                  <td style={S.td}>
                    <span style={{ display:"inline-flex", padding:"2px 7px", borderRadius:3, fontSize:9, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700,
                      background: tx.type === "buy" ? "rgba(52,211,153,0.1)" : "rgba(248,113,113,0.1)",
                      color: tx.type === "buy" ? C.teal : C.red,
                      border:`1px solid ${tx.type === "buy" ? "rgba(52,211,153,0.25)" : "rgba(248,113,113,0.25)"}` }}>
                      {tx.type.toUpperCase()}
                    </span>
                  </td>
                  <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700, color:C.crypto }}>{tx.asset}</td>
                  <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11 }}>{tx.quantity}</td>
                  <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11 }}>${fmt(tx.price)}</td>
                  <td style={{ ...S.td, fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color: tx.type === "buy" ? C.red : C.teal }}>
                    {tx.type === "buy" ? "−" : "+"}{fg(tx.quantity * tx.price)}
                  </td>
                  <td style={{ ...S.td, fontSize:10, color:C.dim }}>{tx.wallet}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );

  if (activeTab === "summary") return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))", gap:10, marginBottom:16 }}>
        {summCards.map(([label, val, color]) => (
          <div key={label} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"12px 14px" }}>
            <div style={S.summLabel}>{label}</div>
            <div style={{ fontSize:20, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700, color, marginTop:4 }}>{val}</div>
          </div>
        ))}
      </div>
      <div style={{ padding:"14px 16px", borderRadius:8, background:"rgba(247,201,72,0.06)", border:"1px solid rgba(247,201,72,0.2)", marginBottom:12 }}>
        <div style={{ fontSize:12, fontWeight:700, color:C.crypto, marginBottom:10 }}>AU Crypto CGT Key Rules</div>
        {[
          "Crypto assets are CGT assets under ITAA 1997 — not foreign currency. All standard CGT rules apply.",
          "Held ≥ 12 months: 50% discount (current law) or CPI indexation + 30% min tax (Bill 2026, from 1 Jul 2027 — PENDING).",
          "Every crypto-to-crypto swap is a CGT event — the disposed asset is treated as sold at market value.",
          "Staking and airdrop income is assessable at market value at receipt, creating a new cost base.",
          "Capital losses offset gains but cannot reduce ordinary income. Losses carry forward indefinitely.",
          "From 1 Jul 2027 (if enacted): CGT transition rules apply — assets acquired before that date get a split at the transition date.",
        ].map((rule, i) => (
          <div key={i} style={{ display:"flex", gap:8, padding:"6px 0", borderBottom: i < 5 ? `1px solid rgba(247,201,72,0.1)` : "none", fontSize:11, color:C.dim }}>
            <span style={{ color:C.crypto, flexShrink:0, fontFamily:"'IBM Plex Mono',monospace", fontSize:9, marginTop:1 }}>{String(i + 1).padStart(2, "0")}</span>
            {rule}
          </div>
        ))}
      </div>
      <div style={{ padding:"10px 14px", borderRadius:7, background:"rgba(248,113,113,0.06)", border:"1px solid rgba(248,113,113,0.2)", fontSize:10, color:C.red, lineHeight:1.65 }}>
        ⚠ This summary is based on parcel register data only. Staking rewards, airdrop income, DeFi transactions, NFTs, and cross-wallet transfers are not modelled. Engage a registered crypto tax agent for a complete return.
      </div>
    </div>
  );

  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECTION A — PARCEL REGISTER
// ═══════════════════════════════════════════════════════════════════════════════
function ParcelRegister({holdings, onAddSectionA, onApplyAction, onOpenCalc, initialSearch}) {
  const [search, setSearch] = useState(initialSearch||"");
  const [statusFilter, setStatusFilter] = useState("ALL");
  const q = search.trim().toLowerCase();

  const statusOk = (p) => statusFilter==="ALL" ? true
    : statusFilter==="active" ? p.status==="active"
    : (p.status==="disposed" || p.status==="cancelled");
  const holdingMatches = (h) => !q || h.ticker.toLowerCase().includes(q) || (h.name||"").toLowerCase().includes(q);
  const parcelMatches = (h,p) => holdingMatches(h) || (p.origin||"").toLowerCase().includes(q) || (p.notes||"").toLowerCase().includes(q);

  const all = Object.values(holdings);
  const counts = {
    ALL: all.reduce((s,h)=>s+h.parcels.length,0),
    active: all.reduce((s,h)=>s+h.parcels.filter(p=>p.status==="active").length,0),
    disposed: all.reduce((s,h)=>s+h.parcels.filter(p=>p.status==="disposed"||p.status==="cancelled").length,0),
  };
  const visible = all
    .map(h => ({ h, rows: h.parcels.filter(p => statusOk(p) && (q ? parcelMatches(h,p) : true)) }))
    .filter(x => x.rows.length>0);

  const pills = [["ALL","All"],["active","Active"],["disposed","Disposed/Cancelled"]];

  return (
    <div>
      <div style={S.pageTitle}>📋 Parcel Register</div>
      <div style={S.pageSub}>Investor-initiated acquisitions &amp; ETF cost base adjustments. Corporate action parcels shown with origin tag. Open the Disposal What-If from any active parcel row.</div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search ticker, origin, or note…"
          style={{...S.input,width:300,fontFamily:"'IBM Plex Sans',sans-serif"}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {pills.map(([k,label])=>(
            <button key={k} onClick={()=>setStatusFilter(k)} style={{padding:"5px 12px",borderRadius:4,fontSize:11,fontFamily:"'IBM Plex Mono',monospace",cursor:"pointer",
              border:`1px solid ${statusFilter===k?C.blue:C.border}`,
              background:statusFilter===k?"rgba(79,158,255,0.12)":"rgba(255,255,255,0.03)",
              color:statusFilter===k?C.blue:C.dim}}>
              {label} ({counts[k]})
            </button>
          ))}
        </div>
      </div>
      {visible.length===0
        ? <div style={S.panel}><EmptyState icon="🔍" title={q||statusFilter!=="ALL"?"No parcels match your filter":"No parcels yet"}
            hint={q||statusFilter!=="ALL"?"Try clearing the search or switching the status filter.":"Add a parcel by hand, or use Import Document to pull them from a contract note or AMMA statement."}
            cta={q||statusFilter!=="ALL"?"Clear filter":null} onCta={()=>{setSearch("");setStatusFilter("ALL");}}/></div>
        : visible.map(({h,rows}) => <HoldingPanel key={h.ticker} holding={h} rows={rows} onAddSectionA={onAddSectionA} onApplyAction={onApplyAction} onOpenCalc={onOpenCalc}/>)}
    </div>
  );
}

function HoldingPanel({holding, rows, onAddSectionA, onApplyAction, onOpenCalc}) {
  const [open, setOpen] = useState(true);
  const { adjustments } = holding;
  const { sort, toggle, sorted } = useSort();
  const allParcels = rows || holding.parcels;
  const activeParcels = allParcels.filter(p=>p.status==="active");
  const totalQty = activeParcels.reduce((s,p)=>s+p.qty,0);
  const totalEffCB = activeParcels.reduce((s,p)=>s+getEffectiveCostBase(p,adjustments),0);
  const discParcels = activeParcels.filter(p=>discountEligible(p.acquisitionDate)).length;
  const origins = [...new Set(allParcels.map(p=>p.origin))];
  const typeMeta = HOLDING_TYPE_META[holding.type] || { color:C.blue, icon:"📈" };
  const accessors = {
    section: p => ORIGINS[p.origin]?.section || "A",
    origin:  p => p.origin,
    status:  p => p.status,
    acq:     p => p.acquisitionDate,
    units:   p => p.qty,
    cpu:     p => p.costPerUnit,
    raw:     p => p.totalCost,
    effcb:   p => getEffectiveCostBase(p, adjustments),
    held:    p => holdingDays(p.acquisitionDate, p.disposalDate || undefined),
  };

  return (
    <div style={S.panel}>
      <div style={S.panelHead} onClick={()=>setOpen(o=>!o)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{...S.mono,fontSize:14,fontWeight:700,color:typeMeta.color}}>{holding.ticker}</span>
          <HoldingTypeBadge type={holding.type}/>
          <span style={{fontSize:12,color:C.dim}}>{holding.name}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{...S.mono,fontSize:11,color:C.muted}}>{activeParcels.length} active</span>
          <button style={S.btn()} onClick={e=>{e.stopPropagation();onAddSectionA(holding.ticker);}}>+ Parcel</button>
          <button style={S.btn("orange")} onClick={e=>{e.stopPropagation();onApplyAction(holding.ticker);}}>⚡ Action</button>
          <span style={{color:C.muted,fontSize:16}}>{open?"▾":"▸"}</span>
        </div>
      </div>
      {open && (
        <>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr>
                <SortTh label="§" sortKey="section" sort={sort} toggle={toggle}/>
                <SortTh label="Origin" sortKey="origin" sort={sort} toggle={toggle}/>
                <SortTh label="Status" sortKey="status" sort={sort} toggle={toggle}/>
                <SortTh label="Acq. Date" sortKey="acq" sort={sort} toggle={toggle}/>
                <SortTh label="Units" sortKey="units" sort={sort} toggle={toggle} align="right"/>
                <SortTh label="Cost/Unit" sortKey="cpu" sort={sort} toggle={toggle} align="right"/>
                <SortTh label="Raw Cost" sortKey="raw" sort={sort} toggle={toggle} align="right"/>
                <SortTh label="Eff. Cost Base" sortKey="effcb" sort={sort} toggle={toggle} align="right"/>
                <th style={S.th}>CGT Disc.</th>
                <SortTh label="Held" sortKey="held" sort={sort} toggle={toggle}/>
                <th style={S.th}>Notes</th>
                <th style={S.th}>What-If</th>
              </tr></thead>
              <tbody>
                {sorted(allParcels, accessors).map(p=>{
                  const section = ORIGINS[p.origin]?.section||"A";
                  const effCB = getEffectiveCostBase(p,adjustments);
                  const adjs = getParcelAdjustments(p.id,adjustments);
                  // For disposed/cancelled parcels test eligibility at the event date; otherwise now.
                  const asOf = p.disposalDate || undefined;
                  const days = holdingDays(p.acquisitionDate, asOf);
                  const eligible = discountEligible(p.acquisitionDate, asOf);
                  const isCancelled = p.status==="cancelled"||p.status==="disposed";
                  return (
                    <React.Fragment key={p.id}>
                      <tr style={{opacity:isCancelled?0.4:1, background:isCancelled?"rgba(248,113,113,0.03)":"transparent"}}>
                        <td style={S.td}><SectionTag section={section}/></td>
                        <td style={S.td}>
                          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                            <Pill origin={p.origin}/>
                            {p.importStatus && <span title={`Imported from document · ${p.importStatus}`}><ImportStatusBadge status={p.importStatus}/></span>}
                          </div>
                        </td>
                        <td style={S.td}><StatusBadge status={p.status}/></td>
                        <td style={{...S.td,...S.mono,fontSize:11,color:C.dim}}>{fmtDate(p.acquisitionDate)}</td>
                        <td style={{...S.td,...S.mono,textAlign:"right"}}>{fmt(p.qty,0)}</td>
                        <td style={{...S.td,...S.mono,textAlign:"right",fontSize:11}}>{p.costPerUnit>0?`$${fmt(p.costPerUnit)}`:"—"}</td>
                        <td style={{...S.td,...S.mono,textAlign:"right",fontSize:11,color:C.dim}}>{fg(p.totalCost)}</td>
                        <td style={{...S.td,...S.mono,textAlign:"right",color:isCancelled?C.dim:C.blue,fontWeight:500}}>{isCancelled?"—":fg(effCB)}</td>
                        <td style={S.td}>{!isCancelled&&<span style={S.discBadge(eligible)}>{eligible?"✓ 50%":"✗ FULL"}</span>}</td>
                        <td style={{...S.td,...S.mono,fontSize:11,color:C.dim}}>{!isCancelled&&(days>=365?`${Math.floor(days/365)}y ${Math.floor((days%365)/30)}m`:`${days}d`)}</td>
                        <td style={{...S.td,fontSize:11,color:C.dim,maxWidth:220}}>{p.notes}</td>
                        <td style={S.td}>{!isCancelled&&(
                          <button onClick={e=>{e.stopPropagation();onOpenCalc({parcel:p,holding});}} style={{...S.btn("calc"),padding:"4px 10px",fontSize:10,gap:3}}>📊 What-If</button>
                        )}</td>
                      </tr>
                      {adjs.map(a=>(
                        <tr key={a.id} style={{background:"rgba(255,255,255,0.012)"}}>
                          <td style={{...S.td,paddingLeft:26}}></td>
                          <td style={{...S.td,paddingLeft:0}} colSpan={2}>
                            <span style={{...S.mono,fontSize:10,color:a.type==="increase"?C.teal:C.red}}>
                              └ {a.origin} {a.type==="increase"?"▲":"▼"}
                            </span>
                          </td>
                          <td style={{...S.td,...S.mono,fontSize:10,color:C.muted}}>{fmtDate(a.effectiveDate)}</td>
                          <td style={S.td}></td>
                          <td style={{...S.td,...S.mono,fontSize:10,textAlign:"right",color:C.dim}}>{a.type==="increase"?`+$${fmt(a.amountPerUnit,4)}`:`−$${fmt(Math.abs(a.amountPerUnit),4)}`}/unit</td>
                          <td style={S.td}></td>
                          <td style={{...S.td,...S.mono,fontSize:10,textAlign:"right",color:a.type==="increase"?C.teal:C.red,fontWeight:500}}>
                            {a.type==="increase"?`+$${fmt(a.amount)}`:`−$${fmt(Math.abs(a.amount))}`}
                          </td>
                          <td colSpan={4} style={{...S.td,fontSize:10,color:C.muted}}>{a.notes}</td>
                        </tr>
                      ))}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={S.summRow}>
            <div style={S.summItem}><span style={S.summLabel}>Active Units</span><span style={S.summVal}>{fmt(totalQty,0)}</span></div>
            <div style={S.summItem}><span style={S.summLabel}>Eff. Cost Base</span><span style={{...S.summVal,color:C.blue}}>${fmt(totalEffCB)}</span></div>
            <div style={S.summItem}><span style={S.summLabel}>Avg Cost/Unit</span><span style={S.summVal}>${totalQty>0?fmt(totalEffCB/totalQty):"—"}</span></div>
            <div style={S.summItem}><span style={S.summLabel}>Disc. Eligible</span><span style={{...S.summVal,color:C.teal}}>{discParcels}/{activeParcels.length}</span></div>
            <div style={S.summItem}><span style={S.summLabel}>Origins</span>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:2}}>{origins.map(o=><Pill key={o} origin={o}/>)}</div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECTION B — CORPORATE ACTIONS VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function CorporateActionsView({holdings}) {
  const [filter,setFilter] = useState("ALL");
  const allActions = Object.values(holdings).flatMap(h=>
    (h.actions||[]).map(a=>({...a, ticker:h.ticker, holdingName:h.name}))
  ).sort((a,b)=>b.effectiveDate.localeCompare(a.effectiveDate));
  const actionTypes = ["ALL","SPLIT","CONSOLIDATION","CAPITAL_RETURN","DEMERGER","TAKEOVER","AMIT"];
  const filtered = filter==="ALL" ? allActions : allActions.filter(a=>a.actionType===filter);

  const dimLabel = (v) => {
    if(v===true) return <span style={{color:C.teal,fontSize:10}}>✓ Yes</span>;
    if(v===false) return <span style={{color:C.muted,fontSize:10}}>— No</span>;
    return <span style={{color:C.amber,fontSize:10}}>{v}</span>;
  };

  return (
    <div>
      <div style={S.pageTitle}>⚡ Corporate Actions</div>
      <div style={S.pageSub}>Company-initiated transformations. Each action assessed across all 7 CGT dimensions.</div>
      <div style={{...S.panel,marginBottom:20}}>
        <div style={{padding:"10px 18px",borderBottom:`1px solid ${C.border}`,fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",color:C.muted,fontFamily:"'IBM Plex Mono',monospace"}}>
          Seven-Dimension Impact Matrix
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr>
              {["Action","① New Parcel","② Changes Qty","③ Reapportions CB","④ User Designates","⑤ All Parcels","⑥ Forces Disposal","⑦ Exchanges Holding"].map(h=>(
                <th key={h} style={{...S.th,textAlign:h==="Action"?"left":"center"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {Object.entries(CA_DIMENSIONS).map(([k,d])=>(
                <tr key={k}>
                  <td style={S.td}><Pill origin={k}/></td>
                  <td style={{...S.td,textAlign:"center"}}>{dimLabel(d.createsParcel)}</td>
                  <td style={{...S.td,textAlign:"center"}}>{dimLabel(d.changesQty)}</td>
                  <td style={{...S.td,textAlign:"center"}}>{dimLabel(d.reapportionsCB)}</td>
                  <td style={{...S.td,textAlign:"center"}}>{dimLabel(d.userDesignates)}</td>
                  <td style={{...S.td,textAlign:"center"}}>{dimLabel(d.allParcels)}</td>
                  <td style={{...S.td,textAlign:"center"}}>{dimLabel(d.forcesDisposal)}</td>
                  <td style={{...S.td,textAlign:"center"}}>{dimLabel(d.exchanges)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {actionTypes.map(t=>(
          <button key={t} onClick={()=>setFilter(t)} style={{padding:"5px 12px",borderRadius:4,fontSize:11,fontFamily:"'IBM Plex Mono',monospace",cursor:"pointer",
            border:`1px solid ${filter===t?C.orange:C.border}`,
            background:filter===t?"rgba(251,146,60,0.12)":"rgba(255,255,255,0.03)",
            color:filter===t?C.orange:C.dim}}>
            {t} {t==="ALL"?`(${allActions.length})`:`(${allActions.filter(a=>a.actionType===t).length})`}
          </button>
        ))}
      </div>
      {filtered.length===0 && <div style={S.panel}><EmptyState icon="⚡"
        title={filter==="ALL"?"No corporate actions recorded":`No ${filter} actions`}
        hint={filter==="ALL"?"Splits, consolidations, capital returns, demergers and takeovers will appear here once applied. Use the ⚡ Corporate Action button to apply one.":"Switch the filter to ALL to see every recorded action."}/></div>}
      {filtered.map(action=><ActionCard key={action.id} action={action} holdings={holdings}/>)}
    </div>
  );
}

function ActionCard({action, holdings}) {
  const [open,setOpen] = useState(false);
  const holding = Object.values(holdings).find(h=>h.ticker===action.ticker);
  const dim = CA_DIMENSIONS[action.actionType]||{};
  const dimDot = (v) => v===true?"🟢":v===false?"⚪":"🟡";

  return (
    <div style={S.panel}>
      <div style={{...S.panelHead,cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Pill origin={action.actionType}/>
          <span style={{...S.mono,fontSize:13,fontWeight:700,color:C.blue}}>{action.ticker}</span>
          <span style={{fontSize:12,color:C.dim}}>{fmtDate(action.effectiveDate)}</span>
          {action.classRulingRef&&<span style={{...S.mono,fontSize:10,color:C.gold,background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.25)",padding:"1px 7px",borderRadius:3}}>{action.classRulingRef}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:10,color:C.dim}}>{action.parcelsImpacted.length} parcels impacted</span>
          {action.cgtEvents.length>0&&<span style={{...S.mono,fontSize:10,color:C.amber,background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.25)",padding:"1px 7px",borderRadius:3}}>{action.cgtEvents.length} CGT event{action.cgtEvents.length>1?"s":""}</span>}
          <span style={{color:C.muted,fontSize:14}}>{open?"▾":"▸"}</span>
        </div>
      </div>
      {open&&(
        <div style={{padding:"16px 18px"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {[["① New Parcel",dim.createsParcel],["② Qty Change",dim.changesQty],["③ CB Reapportionment",dim.reapportionsCB],
              ["④ User Designates",dim.userDesignates],["⑤ All Parcels",dim.allParcels],["⑥ Forces Disposal",dim.forcesDisposal],["⑦ Exchanges Holding",dim.exchanges]
            ].map(([label,val])=>(
              <div key={label} style={{padding:"4px 10px",borderRadius:4,background:C.surface2,border:`1px solid ${C.border}`,fontSize:10,display:"flex",gap:5,alignItems:"center"}}>
                <span>{dimDot(val)}</span><span style={{color:C.dim}}>{label}:</span>
                <span style={{color:val===true?C.teal:val===false?C.muted:C.amber,fontFamily:"'IBM Plex Mono',monospace"}}>{typeof val==="string"?val:val?"Yes":"No"}</span>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10,marginBottom:14}}>
            {Object.entries(action.parameters).map(([k,v])=>(
              <div key={k} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:5,padding:"8px 12px"}}>
                <div style={{...S.label,marginBottom:3}}>{k}</div>
                <div style={{...S.mono,fontSize:12,color:C.text}}>{typeof v==="boolean"?v?"Yes":"No":typeof v==="number"?v%1===0?v:`${v}`:typeof v==="object"?JSON.stringify(v):v}</div>
              </div>
            ))}
          </div>
          {action.parcelsImpacted.length>0&&(
            <div style={{marginBottom:10}}>
              <div style={{...S.label,marginBottom:6}}>Parcels impacted</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {action.parcelsImpacted.map(pid=>{
                  const p = holding?.parcels.find(x=>x.id===pid);
                  return p?<span key={pid} style={{...S.mono,fontSize:10,padding:"2px 8px",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:3,color:C.dim}}>
                    {pid} · {p.qty}u · acq {fmtDate(p.acquisitionDate)} · <Pill origin={p.origin}/>
                  </span>:<span key={pid} style={{...S.mono,fontSize:10,color:C.muted}}>{pid}</span>;
                })}
              </div>
            </div>
          )}
          {action.parcelsCreated.length>0&&(
            <div style={{marginBottom:10}}>
              <div style={{...S.label,marginBottom:6}}>Parcels created</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {action.parcelsCreated.map(pid=>{
                  const allParcels = Object.values(holdings).flatMap(h=>h.parcels);
                  const p = allParcels.find(x=>x.id===pid);
                  return p?<span key={pid} style={{...S.mono,fontSize:10,padding:"2px 8px",background:"rgba(52,211,153,0.07)",border:`1px solid rgba(52,211,153,0.2)`,borderRadius:3,color:C.teal}}>
                    {pid} · {p.qty}u · <Pill origin={p.origin}/>
                  </span>:<span key={pid} style={{...S.mono,fontSize:10,color:C.muted}}>{pid}</span>;
                })}
              </div>
            </div>
          )}
          {action.notes&&<div style={{fontSize:11,color:C.dim,marginTop:6,padding:"7px 10px",background:C.surface2,borderRadius:5,borderLeft:`2px solid ${C.border}`}}>{action.notes}</div>}
        </div>
      )}
    </div>
  );
}
