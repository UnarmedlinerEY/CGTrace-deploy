}

// ── Autopilot proactive briefing content — Advisory module. Rendered inside
// AutopilotPanel only when the global Autopilot flag is on (AssistantAutopilotSwitch
// in TopBar). Reuses data this page already computes (computeThreats,
// entityOpportunities) and PROPOSAL_PIPELINE — no new agent logic, this is the same
// data reframed as "here's what changed." Honesty note: entityOpportunities()
// carries no groupId, so an individual opportunity can't be matched 1:1 to a
// pipeline item — the briefing reports the two facts side by side (opportunities
// flagged vs. proposals open for this group) rather than implying a precise join
// the data model doesn't support.
function AutopilotBrief({ groupId, threats, allOpps, totalOpportunity, onExpandOpps, onExpandThreats }) {
  // Top events worth narrating — combines downside risk and harvestable-loss
  // opportunity from the same computeThreats output (see plan doc §7: threats vs.
  // opportunities are framings of the same underlying data, not separate feeds).
  const lines = [...threats.market, ...threats.property]
    .filter(t => t.severity > 0 || (t.impact && t.impact.label.indexOf("harvestable") >= 0))
    .map(t => {
      if (t.impact && t.impact.label.indexOf("harvestable") >= 0)
        return { text:`${t.title} — harvestable loss ≈ $${fmt(t.impact.value)} if crystallised this FY`, rank:t.impact.value, tone:"opp" };
      if (t.impact && t.impact.label.indexOf("Est. CGT") === 0)
        return { text:`${t.title} — would crystallise ≈ $${fmt(t.impact.value)} CGT for the group`, rank:t.severity, tone:"risk" };
      if (t.impact)
        return { text:`${t.title} — embedded liability swinging ≈ $${fmt(t.impact.value)} on recent volatility`, rank:t.severity, tone:"risk" };
      return { text:`${t.title} — down ${Math.abs(Math.round(t.trend.move*100))}%, embedded liability ≈ $${fmt(t.cgtDelta)} lower if sold now`, rank:t.severity, tone:"opp" };
    })
    .sort((a,b) => b.rank - a.rank)
    .slice(0, 2);

  const pipeline = PROPOSAL_PIPELINE.filter(p => p.groupId === groupId);
  const openProposals = pipeline.filter(p => p.status !== "converted");

  return (
    <>
      <div style={{ display:"grid", gap:6, marginBottom:10 }}>
        {lines.length===0 && (
          <div style={{ fontSize:11.5, color:"#D8B978" }}>No new market, property, or legislative movement worth flagging for this group.</div>
        )}
        {lines.map((l,i) => (
          <div key={i} style={{ fontSize:11.5, color:"#F3E3BD", lineHeight:1.5 }}>
            <span style={{ color: l.tone==="opp" ? "#5FC9A8" : "#E07A7A", marginRight:6 }}>{l.tone==="opp" ? "🍂" : "⚠"}</span>{l.text}
          </div>
        ))}
        {threats.legislative.length>0 && (
          <div style={{ fontSize:11, color:"#C9A35E" }}>+ {threats.legislative.length} legislative change{threats.legislative.length>1?"s":""} being tracked for this group.</div>
        )}
      </div>

      <div style={{ display:"flex", gap:14, flexWrap:"wrap", fontSize:11.5, color:"#F3E3BD", marginBottom:10, paddingTop:9, borderTop:"1px solid rgba(224,184,106,0.20)" }}>
        <span>📋 <strong>{allOpps.length}</strong> opportunit{allOpps.length===1?"y":"ies"} flagged this visit, worth ≈ <strong>${fmt(totalOpportunity)}</strong></span>
        <span>📨 <strong>{openProposals.length}</strong> of {pipeline.length} tracked proposal{pipeline.length===1?"":"s"} for this group still open</span>
      </div>

      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        <button onClick={onExpandOpps} style={{ background:"none", border:"1px solid rgba(224,184,106,0.35)", color:"#E0B86A", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>View opportunities →</button>
        <button onClick={onExpandThreats} style={{ background:"none", border:"1px solid rgba(224,184,106,0.35)", color:"#E0B86A", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>View threats →</button>
      </div>

      <div style={{ fontSize:10, color:"#9C7F47", marginTop:9, lineHeight:1.5 }}>
        Autopilot surfaces what's already computed on this page — opportunities, threats, and the proposal pipeline — it doesn't take any action on its own.
      </div>
    </>
  );
}

function PartnerDashboardView({ clients, holdings, pm, onOpenClient, autopilot, briefDismissed, setBriefDismissed, activeTab, onTabChange }) {
  // activeTab/onTabChange are controlled by App() via the #/partner(/overview)
  // route (29 Jun fix) — see the matching comment in ClientListView.
  const [groupId, setGroupId]   = useState(PARTNER_GROUPS[0].id);
  const [profiles, setProfiles] = useState(() => {
    const m = {};
    PARTNER_GROUPS.forEach(g => g.entityIds.forEach(id => { m[id] = g.goal; }));
    return m;
  });
  const [scopeOpen, setScopeOpen] = useState(false);
  const [favorites, setFavorites] = useState(() => new Set([PARTNER_GROUPS[0].id]));
  const [collapsed, setCollapsed] = useState({ opps:true, threats:true, disposal:true });
  const toggleSection = key => setCollapsed(c => ({ ...c, [key]:!c[key] }));
  const openSection = key => setCollapsed(c => ({ ...c, [key]:false }));
  const expandAllSections   = () => setCollapsed({ opps:false, threats:false, disposal:false });
  const collapseAllSections = () => setCollapsed({ opps:true,  threats:true,  disposal:true  });
  // briefDismissed is lifted to App level (mirrors ClientListView's cpBriefDismissed)
  // so the Assistant/Autopilot toggle's reopen fix can clear it directly — see
  // App.handleOpenAutopilot. Still reset on every groupId change, same as before.
  useEffect(() => { setBriefDismissed(false); }, [groupId]);

  const group = PARTNER_GROUPS.find(g => g.id === groupId);
  const groupSyncHrs = (pm.groups[groupId] || { lastSyncHrs:0 }).lastSyncHrs;
  const viewedHrs = (pm.groups[groupId] || {}).partnerViewedHrs;
  const entities = group.entityIds.map(id => clients.find(c => c.id === id)).filter(Boolean);

  const rows = entities.map(c => {
    const pos  = entityUnrealised(c, holdings, PARTNER_AS_OF);
    const opps = entityOpportunities(c, pos, profiles[c.id]);
    return { client:c, pos, opps };
  });
  const allOpps = rows.flatMap(r => r.opps);
  const totalOpportunity = allOpps.reduce((s,o) => s + (o.taxValue||0), 0);
  const totalEmbedded    = rows.reduce((s,r) => s + r.pos.embeddedTax, 0);
  // Bill 2026 forward scenario (group). Headline mechanics only — 50% discount removed; 30%
  // minimum-tax floor (Div 119) on each entity's loss-netted gain. Indexation relief and the
  // deemed-2027 split are NOT modelled here (both reduce the figure), so this is a directional
  // upper estimate; the per-parcel what-if gives the exact dated calculation. Never the live book.
  const totalEmbeddedBill = rows.reduce((s,r) => {
    const g = Math.max(0, r.pos.netAssessable + r.pos.discountApplied); // full loss-netted gain, no discount
    return s + Math.max(g * r.pos.mtr, g * 0.30);
  }, 0);
  const billDelta = totalEmbeddedBill - totalEmbedded;
  const totalMV          = rows.reduce((s,r) => s + r.pos.mv, 0);
  const allLots          = rows.flatMap(r => r.pos.lots);
  const reconciledPct    = allLots.length ? Math.round(allLots.filter(l=>l.reconciled).length / allLots.length * 100) : 100;
  const threats = computeThreats(group, entities, holdings);
  const mt = threats.main;
  const mtValue = mt ? (mt.severity > 0 ? `$${fmt(mt.severity)}` : (mt.kind==="legislative" ? "Watch" : "—")) : "—";
  const mtSub = mt ? `${mt.title} · ${threats.count} tracked` : "none tracked";
  const mtColor = mt && mt.severity > 0 ? C.red : C.amber;

  return (
    <div style={{ ...S.content, background:C.bg }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:10, marginBottom:6 }}>
        <div>
          <div style={S.pageTitle}>CGT Revenue Engine</div>
          <div style={S.pageSub}>Surfaces advisory opportunity straight from each client's CGT data, with a built-in pipeline to proposal — organic upsell, not a hard sell. Mock practice-management data · general modelling, not tax advice.</div>
        </div>
      </div>

      {/* in-page tabs — per-group workspace vs practice-wide rollup */}
      <div style={{ display:"flex", borderBottom:`1px solid ${C.border}`, marginBottom:18 }}>
        {[["workspace","🎯 Opportunity"],["overview","📊 Partner Dashboard"]].map(([id,label])=>(
          <button key={id} onClick={()=>onTabChange(id)} style={{
            background:"none", border:"none",
            borderBottom:`2px solid ${activeTab===id?C.blue:"transparent"}`,
            color:activeTab===id?C.text:C.dim,
            padding:"10px 4px", marginRight:22, fontSize:13, fontWeight:500, cursor:"pointer",
            fontFamily:"'IBM Plex Sans',sans-serif", marginBottom:-1, transition:"all 0.15s" }}>
            {label}
          </button>
        ))}
      </div>

      {/* Autopilot proactive briefing — pop-out panel, auto-opens on landing/group
          switch when Autopilot is on. Same chrome as GlobalAIChat, amber-themed so
          the two AI modes read as visually distinct (see AutopilotPanel above).
          Rendered above the tab ternary (not inside the "workspace" branch) so it
          stays mounted/open across the Opportunity ↔ Partner Dashboard tab switch
          instead of unmounting whenever the overview tab is selected — bug fix,
          29 Jun: this used to disappear the moment you switched to the Partner
          Dashboard tab. */}
      <AutopilotPanel isOpen={autopilot && !briefDismissed} onClose={()=>setBriefDismissed(true)}
        title={`Autopilot — ${group.name}`}
        subtitle={viewedHrs!=null ? `Advisory briefing · since you were last here (${pmSince(viewedHrs)})` : "Advisory briefing"}
        suggestedPrompts={(() => {
          // Mirrors AutopilotBrief's own pipeline filter (kept to two lines deliberately —
          // not worth threading a render-prop just to avoid this much duplication).
          const pipelineForGroup = PROPOSAL_PIPELINE.filter(p => p.groupId === groupId);
          const openForGroup = pipelineForGroup.filter(p => p.status !== "converted");
          const oldest = [...openForGroup].sort((a,b) => new Date(a.date) - new Date(b.date))[0];
          const daysSince = oldest ? Math.round((new Date(PARTNER_AS_OF) - new Date(oldest.date)) / 86400000) : 0;
          return [
            { label:"What's changed since I was last here?",
              reply:`Everything I flagged for this visit is in the briefing above — ${allOpps.length} opportunit${allOpps.length===1?"y":"ies"} worth ≈$${fmt(totalOpportunity)}, ${openForGroup.length} of ${pipelineForGroup.length} proposals still open. I don't keep a separate change-log beyond what's shown there in this demo.` },
            { label:"What should I do next?",
              reply: oldest
                ? `The highest-leverage move is following up on the ${oldest.tier} proposal sent ${daysSince} day${daysSince===1?"":"s"} ago — it's still awaiting a response. Beyond that, ${allOpps.length} opportunit${allOpps.length===1?"y":"ies"} ${allOpps.length===1?"is":"are"} flagged but not yet proposed.`
                : `No open proposals to chase for this group right now — the highest-leverage move is turning one of the ${allOpps.length} flagged opportunit${allOpps.length===1?"y":"ies"} (≈$${fmt(totalOpportunity)}) into a proposal.` },
            { label:"What's still outstanding?",
              reply:`${openForGroup.length} of ${pipelineForGroup.length} tracked proposals for this group are still open. ${allOpps.length} opportunit${allOpps.length===1?"y":"ies"} (≈$${fmt(totalOpportunity)}) haven't been turned into a proposal yet.` },
          ];
        })()}>
        <AutopilotBrief groupId={groupId} threats={threats} allOpps={allOpps} totalOpportunity={totalOpportunity}
          onExpandOpps={()=>openSection("opps")} onExpandThreats={()=>openSection("threats")}/>
      </AutopilotPanel>

      {activeTab==="overview" ? (
        <PracticeOverview clients={clients} holdings={holdings} profiles={profiles}/>
      ) : (
      <>

      {/* group selector — dropdown with saved favorites */}
      <GroupSelector groups={PARTNER_GROUPS} groupId={groupId} setGroupId={setGroupId} favorites={favorites} setFavorites={setFavorites}/>

      {/* PM sync state for this group + next planning meeting */}
      <GroupSyncBar pm={pm} groupId={groupId}/>

      {/* vitals strip — opportunity-led */}
      <OpportunityHero rows={rows} total={totalOpportunity} allOpps={allOpps} entities={entities} onScope={()=>setScopeOpen(true)}/>
      <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:8 }}>
        <PVTile label="Embedded CGT liability" value={`$${fmt(totalEmbedded)}`} color={C.amber}
          sub="tax if the group realised everything today, net of discount"
          prov={{ input:"Σ entity net assessable gain × MTR", fn:"entityUnrealised → embeddedTax", ruleset:"current law (pre-2027)", status:"ASSUMED" }}/>
        <PVTile label="Main threat" value={mtValue} color={mtColor}
          sub={mtSub}
          prov={{ input:"max downside $ across market + property + legislative", fn:"computeThreats → severity rank", ruleset:"mixed sources", status:"ASSUMED" }}/>
        <PVTile label="Data confidence" value={`${reconciledPct}%`} color={(reconciledPct>=90 && groupSyncHrs<168)?C.teal:C.amber}
          sub={`holdings reconciled · synced ${pmSince(groupSyncHrs)} from ${PM_SOURCES[pm.source].short}`}
          prov={{ input:`${allLots.filter(l=>l.reconciled).length}/${allLots.length} active parcels reconciled · ${PM_SOURCES[pm.source].name} ${pmFreshLabel(groupSyncHrs)}`, fn:"parcel.importStatus + PM sync freshness", ruleset:"data provenance", status: (reconciledPct>=90 && groupSyncHrs<168)?"CONFIRMED":"ASSUMED" }}/>
      </div>
      <div style={{ fontSize:11, color:C.muted, marginBottom:18, lineHeight:1.5 }}>
        Why not just run an unrealised-CGT report? Group aggregation across entities, the strategy each entity is run to, and per-figure provenance — that's the difference. The headline is the <i>opportunity</i>, not the liability.</div>

      {/* Bill 2026 forward scenario — explicitly separated from the live current-law book */}
      <div style={{ border:`1px solid ${C.border}`, borderLeft:`3px solid ${C.amber}`, borderRadius:8,
        background:"rgba(153,107,10,0.04)", padding:"14px 18px", marginBottom:18 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:11, flexWrap:"wrap" }}>
          <span style={{ fontSize:13, fontWeight:700, color:C.text, fontFamily:"'IBM Plex Mono',monospace" }}>Bill 2026 — forward scenario</span>
          <RulesetStatusBadge status="PENDING"/>
          <span style={{ fontSize:10, color:C.muted }}>not law · commences 1 Jul 2027 · modelled, not the live book</span>
        </div>

          <div>
            <div style={{ fontSize:9.5, letterSpacing:"0.1em", textTransform:"uppercase", color:C.muted, fontFamily:"'IBM Plex Mono',monospace", marginBottom:3 }}>Embedded CGT · current law</div>

          </div>
          <div style={{ fontSize:18, color:C.muted, paddingBottom:4 }}>→</div>

      {/* entities + profile assignment */}

          <div style={{ fontSize:11, color:C.dim }}>{group.note}</div>

        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12.5 }}>

// ── Q2: one-time coach-mark pointing at the TopBar "About this demo" button ──
// Fires after the WelcomeModal is dismissed (see App gate) so a reader who skipped the
// intro can still find their way back to the path picker. Anchors to #about-demo-btn via
// getBoundingClientRect — rendered OUTSIDE the #scale-root transform (like GlobalAIChat)
// so viewport coords line up — and pulses the button with the existing .tour-spotlight
// class. Auto-dismisses after 9s or on "Got it"; recomputes position on resize/scroll.
function AboutDemoCoachmark({ onDismiss }) {
  const [pos, setPos] = useState(null);
  useEffect(() => {
    const btn = document.getElementById("about-demo-btn");
    if (!btn) { onDismiss(); return; }
    btn.classList.add("tour-spotlight");
    const place = () => {
      const r = btn.getBoundingClientRect();
      setPos({ top: r.bottom + 11, left: r.left });
    };
    place();
    window.addEventListener("resize", place);
    window.addEventListener("scroll", place, true);
    const t = setTimeout(() => onDismiss(), 9000);
    return () => {
      clearTimeout(t);
      window.removeEventListener("resize", place);
      window.removeEventListener("scroll", place, true);
      btn.classList.remove("tour-spotlight");
    };
  }, []);
  if (!pos) return null;
  return (
    <div style={{ position:"fixed", top:pos.top, left:pos.left, zIndex:8000, width:250,
      background:"linear-gradient(160deg,#0F0E17,#1A1828)", border:"1px solid #7F77DD",
      borderRadius:10, boxShadow:"0 14px 40px rgba(0,0,0,0.55)", padding:"13px 15px" }}>
      {/* caret pointing up at the button */}
      <div style={{ position:"absolute", top:-7, left:22, width:12, height:12,
        background:"#0F0E17", borderLeft:"1px solid #7F77DD", borderTop:"1px solid #7F77DD",
        transform:"rotate(45deg)" }}/>
      <div style={{ fontSize:9, letterSpacing:"0.16em", textTransform:"uppercase", color:"#9088C0", fontFamily:"'IBM Plex Mono',monospace", marginBottom:5 }}>Tip</div>
      <div style={{ fontSize:12.5, color:"#EEEDFE", lineHeight:1.6, marginBottom:11 }}>
        Skipped the intro? Reopen it and switch demo paths anytime from{" "}
        <strong style={{ color:"#AFA9EC" }}>ⓘ About this demo</strong> up here.
      </div>
      <div style={{ display:"flex", justifyContent:"flex-end" }}>
        <button onClick={onDismiss} style={{ ...S.btn("primary"), padding:"5px 13px", fontSize:11.5 }}>Got it</button>
      </div>
    </div>
  );
}

// ---- Auto-fit-to-screen (Option A retry, 5 Jul) ---------------------------
// transform:scale on a wrapper div (#scale-root) — NOT CSS zoom on <html>
// (attempts 1–3, all reverted). transform doesn't change innerWidth/innerHeight
// (no self-resize feedback loop) and doesn't rescale vh units (no 100vh
// clipping mismatch / footer gap). GlobalAIChat, AutopilotPanel and all modals
// render as SIBLINGS of #scale-root so position:fixed keeps anchoring to the
// real viewport — they stay unscaled at 100% (user's choice, 5 Jul).
const FIT_W = 1880, FIT_H = 1230, FIT_MIN = 0.65, FIT_MAX = 1;
function calcFitScale() {
  return Math.max(FIT_MIN, Math.min(FIT_MAX,
    Math.min(window.innerWidth / FIT_W, window.innerHeight / FIT_H)));
}

function App() {
  const [clients, setClients]   = useState(INITIAL_CLIENTS);
  const [holdings, setHoldings] = useState(INITIAL_HOLDINGS);
  const [rights]    = useState(INITIAL_RIGHTS);
  const [cgtEvents] = useState(INITIAL_CGT_EVENTS);
  const [route, setRoute] = useState(parseHash());
  // Auto-fit: current scale for #scale-root (see calcFitScale above App).
  // Recomputes on window resize; the DPR guard skips recompute on manual
  // Ctrl+/− browser zoom (which fires resize AND changes devicePixelRatio) so
  // we don't fight the user's deliberate zoom choice.
  const [uiScale, setUiScale] = useState(calcFitScale);
  // Viewport dims kept in state alongside the scale: the canvas is sized
  // viewport÷scale, and at the 0.65 scale floor a resize changes the canvas
  // WITHOUT changing the (clamped) scale — so the scale alone can't be relied
  // on to trigger the re-render.
  const [viewport, setViewport] = useState(() => ({ w: window.innerWidth, h: window.innerHeight }));
  useEffect(() => {
    let t = null, lastDPR = window.devicePixelRatio;
    const onResize = () => {
      clearTimeout(t);
      t = setTimeout(() => {
        if (window.devicePixelRatio !== lastDPR) { lastDPR = window.devicePixelRatio; return; }
        setUiScale(calcFitScale());
        setViewport({ w: window.innerWidth, h: window.innerHeight });
      }, 150);
    };
    window.addEventListener("resize", onResize);
    return () => { window.removeEventListener("resize", onResize); clearTimeout(t); };
  }, []);
  // CGT Report is a route (#/report/:clientId/:fyLabel), not local state — it used
  // to be plain useState, which meant opening it never touched the URL, so browser
  // Back skipped straight past it (29 Jun "go back" bug). Derived from `route` below,
  // once route exists — see the reportClient/reportFY consts further down.
  const [globalChatOpen, setGlobalChatOpen] = useState(false);
  const [autopilot, setAutopilot] = useState(false);
  // Lifted from ClientListView/PartnerDashboardView so GuidedTour AND the
  // Assistant/Autopilot toggle (handleOpenAutopilot below) can reset them
  // directly — without this, the panel can stay silently dismissed from an
  // earlier auto-close or user ✕ click with no way to bring it back. cpBriefDismissed
  // is Compliance's panel (ClientListView); briefDismissed is Advisory's
  // (PartnerDashboardView) — the two routes are mutually exclusive but both get
  // cleared together since whichever one is actually mounted should reopen.
  const [cpBriefDismissed, setCpBriefDismissed] = useState(false);
  const [briefDismissed, setBriefDismissed] = useState(false);
  // Single entry point for "(re)open Autopilot" — the toggle's ⚡ Autopilot segment
  // calls this instead of setAutopilot directly, so a click always surfaces the
  // panel even if it was previously dismissed. Bug fix (28 Jun): before this,
  // clicking ⚡ Autopilot again after a dismiss was a no-op once autopilot was
  // already true (onSetAutopilot(true) on an already-true flag does nothing), and
  // there was no other affordance to bring the panel back short of a page reload.
  function handleOpenAutopilot() {
    setAutopilot(true);
    setCpBriefDismissed(false);
    setBriefDismissed(false);
  }
  // Lifted from ClientListView (29 Jun) so the Autopilot Compliance panel — see
  // showComplianceAutopilot/<AutopilotPanel> below — can be mounted once at the
  // App root and stay open across Client Portfolios ↔ Tax Obligations ↔ Portfolio
  // Tracker ↔ CGT Report navigation, instead of unmounting whenever ClientListView
  // itself unmounts (the bug: Autopilot only "opened" on the page it was coded into).
  const [autopilotAcceptedIds, setAutopilotAcceptedIds] = useState(() => new Set());
  function handleAutopilotAccept(ids) {
    setAutopilotAcceptedIds(prev => {
      const next = new Set(prev);
      ids.forEach(id => { if (next.has(id)) next.delete(id); else next.add(id); });
      return next;
    });
    // 29 Jun fix: surface the audit trail the moment a plan is accepted, instead
    // of leaving the user to find the Activity Log entry point on their own.
    setActivityLogOpen(true);
  }
  // Also lifted: the Compliance panel's "View in Client Portfolio List" deep link
  // needs to work (i.e. navigate AND filter) even when clicked from a page other
  // than the list itself.
  const [filterIds, setFilterIds] = useState(null);
  // Phase 7 (28 Jun): Autopilot's audit trail — what it did and decided, not a
  // simulated history. Starts with one system entry only; everything else is
  // appended live by logActivity as real Autopilot actions happen in this
  // session (see handleCommitReconstruction below for the one call site so
  // far). Deliberately NOT pre-seeded with "already reconstructed" entries for
  // c6/c7/c8 — they start at holdingIds:[] (see INITIAL_CLIENTS), so claiming
  // that work already happened would contradict the very state this log is
  // supposed to be honest about. New entries are prepended (newest first).
  const [activityLog, setActivityLog] = useState([
    { id:"act-0", client:null, title:"Activity log enabled",
      detail:"Records what Autopilot does and decides as you run it — accept a reconstruction plan or resolve a flagged contradiction to see entries appear here." },
  ]);
  function logActivity(entry) {
    setActivityLog(log => [{ id:"act-"+(log.length+1)+"-"+Math.random().toString(36).slice(2,7), ...entry }, ...log]);
  }
  const [activityLogOpen, setActivityLogOpen] = useState(false);
  const [tourOpen, setTourOpen] = useState(false);
  const [tourStart, setTourStart] = useState(0);   // which step the guided tour opens on
  const [onboardOpen, setOnboardOpen] = useState(false);
  // Standard "Build cost base" flow (5 Jul). null | {mode:"list"} | {mode:"client", clientId}.
  // Top button opens the worklist of synced-but-unbuilt clients; per-row button opens one
  // client's build directly. Distinct from the flagship Okafor AIOnboardingAgent (kept as
  // the "see a sample reconstruction" showcase) and from Premium Autopilot's batch flow.
  const [buildFlow, setBuildFlow] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [accessOpen, setAccessOpen] = useState(false);
  const [supportOpen, setSupportOpen] = useState(false);
  // Shows on every visit (old or new) — this is a portfolio/demo landing gate, not an
  // onboarding step to dismiss for good. Reopenable any time via TopBar "About this demo".
  const [welcomeOpen, setWelcomeOpen] = useState(true);
  // Q2 coach-mark: after the WelcomeModal is dismissed by ANY path (skip/close/pick a
  // path), arm a one-time pulse+tooltip on the TopBar "About this demo" button so a
  // reader who blew past the intro still knows how to reopen it and switch demo paths.
  // Renders only once they're on a plain main page (no tour/onboard/build flow in
  // front — see gate at render), and never again once seen or once About is clicked.
  const [aboutCoachArmed, setAboutCoachArmed] = useState(false);
  const [aboutCoachDone, setAboutCoachDone]   = useState(false);
  const closeWelcome = () => { setWelcomeOpen(false); setAboutCoachArmed(true); };

  // Practice-management sync state (mock). PM is master; CGTrace writes back only the CGT figure/job.
  const [pm, setPm] = useState({ source:"xpm", lastFull:"2h ago", entities:PRACTICE_SYNC_SEED, groups:GROUP_SYNC_SEED });
  const setPmSource = (s) => setPm(p => ({ ...p, source:s }));
  const pmSyncNow = () => setPm(p => {
    const ents = {}; for (const k in p.entities) ents[k] = { ...p.entities[k], lastSyncHrs:0, syncStatus:"synced" };
    const grps = {}; for (const k in p.groups)   grps[k] = { ...p.groups[k], lastSyncHrs:0 };
    return { ...p, lastFull:"just now", entities:ents, groups:grps };
  });
  const pmPushCGT = (clientId, cgtValue) => setPm(p => {
    const e = p.entities[clientId]; if (!e) return p;
    const ret = { ...e.ret, cgtPushed:true, workpaperAttached:true, cgtValue, pushedAt: PM_NOW.toISOString() };
    return { ...p, entities:{ ...p.entities, [clientId]:{ ...e, ret } } };
  });

  useEffect(() => {
    const onHash = () => setRoute(parseHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  // Commit handler for the AI onboarding agent: writes the new client + its freshly
  // reconstructed holdings (keyed by namespaced ids so they don't clobber the shared
  // ticker-keyed holdings), then navigates straight into the new client's tracker.
  function handleCommitNewClient(newClient, newHoldings) {
    setHoldings(h => ({ ...h, ...newHoldings }));
    setClients(cs => [...cs, newClient]);
    setOnboardOpen(false);
    nav("/client/" + newClient.id);
  }

  // Commit handler for Autopilot's Phase 4 multi-client reconstruction
  // (AUTOPILOT_RECON_SEEDS, AutopilotPermissionStep's Chain stage): adds freshly
  // reconstructed holdings onto an EXISTING client record — unlike
  // handleCommitNewClient above, which creates a brand-new one. c6/c7/c8 already
  // exist as clients with holdingIds:[] (the Autopilot Sample 1 seed), so this just
  // fills that in. Stays on the Client Portfolio List rather than navigating away,
  // since this can run across several clients in one batch.
  //
  // Phase 5 (28 Jun): once holdings land, also closes the loop into Practice
  // Manager — computes the client's real obligation for their open ret.year FY
  // off the holdings just committed (getClientObligations, the same top-level
  // function the Tax Obligations tab reads — one shared computation, not a
  // duplicate), pushes it via pmPushCGT, and stamps a reconciliation timestamp so
  // the Compliance readiness tile picks it up too. newHoldings IS each client's
  // complete holdings set here (c6/c7/c8 start at holdingIds:[]), so the figure
  // can be computed directly off it without waiting on setHoldings to land.
  // 29 Jun update: each of c6/c7/c8's seeds now also reconstructs one real disposed
  // parcel + matching cgtEvent for FY2025-26 (see AUTOPILOT_RECON_SEEDS), so this
  // resolves to a genuine non-zero, tax-payable figure per client — not the earlier
  // $0 "cost base recovered, no disposal" outcome. Nothing below changed to make
  // that happen: pushedAmount was always computed off whatever cgtEvents the seed's
  // buildHoldings() produced via getClientObligations, the same shared function the
  // Tax Obligations tab reads. The push still flips the job to "Synced" on both Tax
  // Obligations and Client Portfolios either way; it's just carrying a real liability
  // now instead of a nil result.
  // doPush (5 Jul): the Premium/Autopilot path commits AND pushes the CGT figure to
  // Practice Manager (pmPushCGT) in one motion. The Standard per-client "Build cost
  // base" flow (BuildCostBaseFlow) calls this with doPush=false — it reconstructs and
  // commits the reviewed cost base but STOPS there: no push to the return. Push is a
  // Premium action (see cgt-pricing.html). Standard still gets the reviewed figure +
  // audit-trail export; the preparer keys it into the return by hand. Backward-
  // compatible: existing 2-arg Autopilot callers keep doPush=true.
  function handleCommitReconstruction(clientId, newHoldings, doPush=true) {
    setHoldings(h => ({ ...h, ...newHoldings }));

    const client = clients.find(c => c.id === clientId);
    const ps = pm.entities[clientId];
    let pushedAmount = 0;
    if (client && ps) {
      const tempClient = { ...client, holdingIds: Object.keys(newHoldings) };
      const obligations = getClientObligations(tempClient, newHoldings);
      const ob = obligations.find(o => o.fy === ps.ret.year);
      pushedAmount = Math.round(ob ? ob.assessable : 0);
      if (doPush) pmPushCGT(clientId, pushedAmount);
    }

    setClients(cs => cs.map(c => c.id === clientId
      ? { ...c, holdingIds:[...(c.holdingIds || []), ...Object.keys(newHoldings)],
          lastReconciledAt: PM_NOW.toISOString().slice(0,10),
          reconciledMarker: doPush ? "WP-2026-Q2-AUTOPILOT" : "WP-2026-Q2-STANDARD",
          reconciledBy: doPush ? "Autopilot (mock)" : "Standard build (mock)" }
      : c));

    // Phase 7 (28 Jun): record this commit on the Activity Log. One entry per
    // client in the batch (Chain calls this once per client — see
    // AutopilotPermissionStep.continueToChain), plus a second entry if any
    // committed parcel's notes show Chain resolved a cross-source
    // contradiction. That note text is read as-is from AUTOPILOT_RECON_SEEDS.
    // buildHoldings (it already says which side won — registry or PDF), not
    // re-derived here, so this generalizes to any future seed that adds a
    // similar gate, not just Larsen/BHP.
    const clientName = client ? client.name : clientId;
    const tickers = Object.values(newHoldings).map(h => h.ticker).filter(Boolean).join(", ");
    const holdingCount = Object.keys(newHoldings).length;
    logActivity({
      client: clientName,
      title:`${doPush ? "Reconstructed" : "Built & reviewed"} ${holdingCount} holding${holdingCount===1?"":"s"}${tickers?` (${tickers})`:""}`,
      detail: !doPush
        ? (ps
            ? `Standard build — reviewed FY${ps.ret.year} CGT figure ready ($${pushedAmount.toLocaleString()}). Export the audit trail to key into the return; push to Xero Tax is a Premium action.`
            : "Cost base built & reviewed and committed to the client's portfolio. Push to the return is a Premium action.")
        : (ps
            ? `Pushed $${pushedAmount.toLocaleString()} FY${ps.ret.year} CGT figure to Practice Manager — job moves to Synced.`
            : "Cost base recovered and committed to the client's portfolio."),
    });
    const resolvedNote = Object.values(newHoldings)
      .flatMap(h => (h.parcels||[]).map(p => p.notes||""))
      .find(n => n.startsWith("Resolved —"));
    if (resolvedNote) {
      logActivity({ client: clientName, title:"Resolved cross-source contradiction",
        detail: resolvedNote.replace(" Reconstructed by Autopilot (mock).", "") });
    }
    return pushedAmount; // so callers (e.g. AutopilotPermissionStep.continueToChain) can
    // report the real combined figure instead of hardcoding an outcome.
  }

  // "Reset demo" (29 Jun) — unwinds whatever handleCommitReconstruction did for the
  // clients currently in autopilotAcceptedIds, restoring them to their original
  // INITIAL_CLIENTS/PRACTICE_SYNC_SEED ground truth rather than guessing at a
  // diff. Holdings added by Autopilot are namespaced TICKER__clientId (see
  // AUTOPILOT_RECON_SEEDS), so they can be identified generically by id suffix —
  // this isn't hardcoded to c6/c7/c8, it generalizes to any future client run
  // through the same flow. No-op if nothing has been accepted yet.
  function handleResetReconstruction() {
    const ids = Array.from(autopilotAcceptedIds);
    if (ids.length === 0) return;

    setHoldings(h => {
      const next = { ...h };
      Object.keys(next).forEach(k => { if (ids.some(id => k.endsWith("__" + id))) delete next[k]; });
      return next;
    });

    setClients(cs => cs.map(c => ids.includes(c.id)
      ? { ...c, holdingIds:[], lastReconciledAt:null, reconciledMarker:null, reconciledBy:null }
      : c));

    setPm(p => {
      const ents = { ...p.entities };
      ids.forEach(id => { if (PRACTICE_SYNC_SEED[id]) ents[id] = { ...ents[id], ret: { ...PRACTICE_SYNC_SEED[id].ret } }; });
      return { ...p, entities: ents };
    });

    const revertedNames = clients.filter(c => ids.includes(c.id)).map(c => c.name);
    setActivityLog(log => log.filter(e => !revertedNames.includes(e.client)));

    setFilterIds(f => (f && f.some(id => ids.includes(id))) ? null : f);

    setAutopilotAcceptedIds(prev => {
      const next = new Set(prev);
      ids.forEach(id => next.delete(id));
      return next;
    });
  }

  // Persists the per-client "Mark reconciled" stamp (set in the portfolio Summary
  // tab) back onto the client record, so it survives navigation and feeds the
  // Compliance mini-dashboard's portfolio-readiness % on the client list.
  function handleReconcileClient(clientId, payload) {
    setClients(cs => cs.map(c => c.id === clientId
      ? { ...c, lastReconciledAt: payload.timestamp, reconciledMarker: payload.marker, reconciledBy: payload.preparer }
      : c));
  }

  // Law is determined by disposal date, not by a user toggle. The live book (register,
  // CGT report, Advisory embedded-CGT) is current-law and ruleset-independent. The
  // per-parcel what-if uses bill-2026 as its forward-comparison basis — it always shows
  // a Current Law column alongside, and the engine date-gates the Bill treatment by the
  // entered sale date (pre-1-Jul-2027 disposals fall back to current law). Bill columns
  // are stamped PENDING. (Global ruleset toggle removed in v0.8.)
  const rules = RULESETS["bill-2026"];
  const selectedClient = route.view === "client" && route.param
    ? clients.find(c => String(c.id) === route.param) || null : null;
  // Derived from the #/report/:clientId/:fyLabel route (see parseHash comment above)
  // instead of useState, so opening/closing a report is a real hash navigation and
  // the browser's Back/Forward buttons land on it correctly.
  const reportClient = route.view === "report" && route.param
    ? clients.find(c => String(c.id) === route.param) || null : null;
  const reportFY = route.view === "report" && route.param2
    ? FY_OPTIONS.find(f => f.label === route.param2) || null : null;
  // Single conversion point for "open the CGT report" so every caller (Tracker,
  // Client List, Global AI Chat) pushes the same route shape.
  const openReport = (c, fy) => nav("/report/" + c.id + (fy && fy.label ? "/" + fy.label : ""));

  // Autopilot Compliance panel's mount condition — covers the "Route 1" cluster
  // (Client Portfolios, Tax Obligations, Portfolio Tracker, CGT Report). The
  // Advisory/Partner panel covers "Route 2" (Opportunity, Partner Dashboard) and
  // is mounted inside PartnerDashboardView itself since that route has no sibling
  // pages to persist across — see the comment there (29 Jun fix).
  const newClients = detectFreshNoTxnClients(clients, pm);
  const isPartnerRoute = route.view === "partner";
  const isTestsRoute = route.view === "tests";
  const showComplianceAutopilot = autopilot && !cpBriefDismissed && !isPartnerRoute && !isTestsRoute
    && (newClients.length > 0 || autopilotAcceptedIds.size > 0);

  let body;
  if (reportClient) {
    const clientHoldings = Object.fromEntries(
      (reportClient.holdingIds || []).map(id => [id, holdings[id]]).filter(([,v]) => v)
    );
    body = <CGTReportView client={reportClient} holdings={clientHoldings} initialFY={reportFY} pm={pm}
      onClose={() => window.history.back()}/>;
  } else if (route.view === "tests") {
    body = <LawsEngineView/>;
  } else if (route.view === "partner") {
    body = <PartnerDashboardView clients={clients} holdings={holdings} pm={pm} onOpenClient={(id)=>nav("/client/"+id)} autopilot={autopilot}
      briefDismissed={briefDismissed} setBriefDismissed={setBriefDismissed}
      activeTab={route.param === "overview" ? "overview" : "workspace"}
      onTabChange={id => nav("/partner" + (id === "overview" ? "/overview" : ""))}/>;
  } else if (selectedClient) {
    body = <TrackerView
      client={selectedClient}
      allHoldings={holdings}
      allRights={rights}
      allCgtEvents={cgtEvents}
      onBack={() => nav("/clients")}
      onOpenReport={openReport}
      onReconcileClient={handleReconcileClient}
      clients={clients}
      holdings={holdings}
      rules={rules}/>;
  } else {
    body = <ClientListView
      clients={clients}
      holdings={holdings}
      pm={pm}
      onPushCGT={pmPushCGT}
      onSelectClient={c => nav("/client/" + c.id)}
      onOpenReport={openReport}
      onAddWithAI={()=>setOnboardOpen(true)}
      onBuildWorklist={()=>setBuildFlow({mode:"list"})}
      onBuildClient={id=>setBuildFlow({mode:"client", clientId:id})}
      autopilot={autopilot}
      onCommitReconstruction={handleCommitReconstruction}
      autopilotAcceptedIds={autopilotAcceptedIds}
      filterIds={filterIds}
      setFilterIds={setFilterIds}
      activeTab={route.param === "obligations" ? "obligations" : "clients"}
      onTabChange={id => nav("/clients" + (id === "obligations" ? "/obligations" : ""))}/>;
  }

  // Auto-fit: below 1:1 the app lays out at the fixed 1880×1230 design size and
  // is scaled down visually; at 1:1+ (large monitors) it stays fluid full-width
  // exactly as before — no regression to a fixed canvas.
  // #scale-frame (5 Jul fix): transform:scale only shrinks the wrapper
  // VISUALLY — its layout box stays 1880×1230, so the page reserved scroll
  // room for the full unscaled canvas (user-reported: huge blank space below
  // the footer + phantom horizontal scrollbar in small windows). The frame div
  // is sized to the SCALED dimensions and clips the difference, so page scroll
  // extent matches what's actually visible.
  // Canvas dimensions (5 Jul revision): the canvas adopts the WINDOW's aspect
  // ratio (viewport ÷ scale) instead of the fixed 1880×1230 design box — the
  // constants only set the scale FACTOR now. Fixes the dead zone on wide
  // monitors (height-constrained scale left blank space right of a 1880-wide
  // canvas) and removes page-level scrolling entirely: the scaled canvas
  // always fills the window exactly, and the content column scrolls internally
  // just like the original fluid layout.
  const frameStyle = { width:"100%", height:"100vh", overflow:"hidden" };
  const fitStyle = uiScale < 1
    ? { width:Math.ceil(viewport.w/uiScale), height:Math.ceil(viewport.h/uiScale),
        transform:"scale(" + uiScale + ")", transformOrigin:"top left" }
    : { width:"100%", height:"100%" };
  return (
    <React.Fragment>
      <style>{GLOBAL_CSS}</style>
      <div id="scale-frame" style={frameStyle}>
      <div id="scale-root" style={fitStyle}>
      <div style={{ ...S.app, height:"100%", minHeight:0, overflow:"hidden" }}>
      <TopBar onAI={()=>setGlobalChatOpen(true)} onCloseAI={()=>setGlobalChatOpen(false)} onAbout={()=>{ setWelcomeOpen(true); setAboutCoachDone(true); }}
        onTour={()=>setTourOpen(true)}
        onSettings={()=>setSettingsOpen(true)} onAccess={()=>setAccessOpen(true)} onSupport={()=>setSupportOpen(true)}
        onActivityLog={()=>setActivityLogOpen(true)}
        pm={pm} setPmSource={setPmSource} pmSyncNow={pmSyncNow} autopilot={autopilot} onSetAutopilot={setAutopilot} onOpenAutopilot={handleOpenAutopilot}/>
      <div style={{ display:"flex", flex:1, minHeight:0 }}>
        <Sidebar route={route}/>
        <div style={{ flex:1, minWidth:0, display:"flex", flexDirection:"column", overflow:"auto" }}>
          {body}
        </div>
      </div>
      </div>{/* /S.app */}
      </div>{/* /#scale-root */}
      </div>{/* /#scale-frame — everything below stays OUTSIDE the transform (unscaled, viewport-fixed) */}
      <GlobalAIChat clients={clients} holdings={holdings}
        onSelectClient={c => nav("/client/" + c.id)}
        onOpenReport={openReport}
        isOpen={globalChatOpen} onClose={()=>setGlobalChatOpen(false)}
        onLaunchAgent={()=>setOnboardOpen(true)}/>
      {/* Autopilot — Compliance panel, lifted to the App root (29 Jun fix) so it
          persists across Client Portfolios ↔ Tax Obligations ↔ Portfolio Tracker ↔
          CGT Report navigation instead of unmounting with ClientListView. Mirrors
          GlobalAIChat's always-mounted pattern above. */}
      <AutopilotPanel isOpen={showComplianceAutopilot} onClose={()=>setCpBriefDismissed(true)}
        title="Autopilot — Client Portfolio" subtitle="New-client detection · Attention Engine v1"
        suggestedPrompts={(() => {
          const names = newClients.map(c=>c.name).join(", ");
          const n = newClients.length, s = n===1?"":"s", has = n===1?"has":"have";
          return [
            { label:"What's changed since I was last here?",
              reply:`${n} new client${s} synced from XPM since you were last here — ${names} — none with transactions imported yet. Nothing else has changed on this page.` },
            { label:"What should I do next?",
              reply:`Start with one of these — the plan to reconstruct all ${n} client${s}' portfolios is right below. Accept it to run the scripted (mock) engine — broker API, PDF search, registry scan — and commit real holdings, or click "View in Client Portfolio List" above to look first.` },
            { label:"What's still outstanding?",
              reply:`${n} client${s} still ${has} zero transactions imported: ${names}. They'll keep surfacing here every time you land on this page until that's resolved.` },
          ];
        })()}>
        <AutopilotComplianceBrief newClients={newClients} pm={pm}
          onViewClients={()=>{
            // 29 Jun fix: newClients is recomputed fresh every render and drops to
            // [] once Autopilot commits real holdings — so "View updated
            // portfolios" was filtering the list down to zero rows. Prefer the
            // accepted-ids set (exactly the clients this plan touched) whenever
            // it's non-empty; fall back to newClients for the pre-accept "View in
            // Client Portfolio List" case.
            setFilterIds(autopilotAcceptedIds.size > 0 ? Array.from(autopilotAcceptedIds) : newClients.map(c=>c.id));
            nav("/clients");
          }}
          onAcceptPlan={handleAutopilotAccept}
          onCommitReconstruction={handleCommitReconstruction}
          onResetReconstruction={handleResetReconstruction}/>
      </AutopilotPanel>
      {tourOpen && <GuidedTour onClose={()=>setTourOpen(false)} startAt={tourStart} clients={clients} setAutopilot={setAutopilot} setCpBriefDismissed={setCpBriefDismissed} setSettingsOpen={setSettingsOpen}/>}
      {onboardOpen && <AIOnboardingAgent onClose={()=>setOnboardOpen(false)} onCommit={handleCommitNewClient}/>}
      {buildFlow && <BuildCostBaseFlow flow={buildFlow} setFlow={setBuildFlow} clients={clients}
        onCommit={(id, holds)=>handleCommitReconstruction(id, holds, false)}
        onSeeSample={()=>{ setBuildFlow(null); setOnboardOpen(true); }}/>}
      {settingsOpen && <SettingsModal onClose={()=>setSettingsOpen(false)}/>}
      {accessOpen && <UserAccessModal onClose={()=>setAccessOpen(false)}/>}
      {supportOpen && <SupportModal onClose={()=>setSupportOpen(false)}/>}
      {activityLogOpen && <ActivityLogModal onClose={()=>setActivityLogOpen(false)} entries={activityLog}/>}
      {welcomeOpen && <WelcomeModal
        onSkip={closeWelcome}
        onTour={(startAt)=>{ closeWelcome(); setTourStart(startAt||0); setTourOpen(true); }}
        onCalc={()=>{ window.open("artifacts/australia_cgt_analyser_v1.0.1.html","_blank","noopener"); closeWelcome(); }}
        onAI={()=>{ closeWelcome(); nav("/clients"); setOnboardOpen(true); }}
        onHub={()=>{ window.open("cgt-portfolio-hub.html","_blank","noopener"); closeWelcome(); }}/>}
      {aboutCoachArmed && !aboutCoachDone && !welcomeOpen && !tourOpen && !onboardOpen && !buildFlow &&
        <AboutDemoCoachmark onDismiss={()=>setAboutCoachDone(true)}/>}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
