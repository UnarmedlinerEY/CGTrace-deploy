// ═══════════════════════════════════════════════════════════════════════════════
// GUIDED TOUR (Phase 6) — unattended-viewer walkthrough. Steps navigate the app
// via nav() and describe each surface; rendered at App root so it persists across
// routes. Backdrop is click-through (pointer-events none) except the card.
// ═══════════════════════════════════════════════════════════════════════════════
function GuidedTour({ onClose, startAt, clients, setAutopilot, setCpBriefDismissed, setSettingsOpen }) {
  // Rebuilt 28 Jun 2026 (v2) per user critique — steps now do more than navigate.
  // `spotlight` pulses a ring around a real on-page control (data-tour attribute +
  // direct DOM class toggle — cheaper than threading a forceOpen prop through every
  // popover several components away) so a first-timer's eye lands on the right thing
  // without the tour clicking for them. `open`/`close` are reserved for the handful
  // of things that are ALREADY App-level state (Autopilot, Settings, the CGT Report)
  // — those genuinely open, and close again the moment the user leaves the step, so
  // nothing is left toggled on behind them (Skip/Done/X included — see the effect's
  // cleanup below, which fires on every step change and on unmount).
  const hargreaves = clients.find(c => c.id === "c1");
  const fy2024_25 = FY_OPTIONS.find(f => f.label === "2024-25");

  // Two copy options for the Autopilot step — house-voice is active, sales-pitch is
  // drafted but unused. House-voice matches the disclosed-scripted tone used
  // everywhere else Autopilot shows up (AssistantAutopilotSwitch, WelcomeModal);
  // sales-pitch is what was asked for verbatim. Swap which constant STEPS[9].body
  // points to if the sales-forward version is preferred after review.
  const AUTOPILOT_BODY_HOUSE_VOICE = "Try the AI-led workflow: flip from Assistant (reactive, on demand) to Autopilot and the AI goes proactive — it tracks every client's status and briefs you before you ask. Watch the panel pop out now, flagging any client with no transactions yet; the same pattern briefs group vitals on the Advisory dashboard. Scripted prototype — two scenarios live, nothing behind it calls a live model yet.";
  const AUTOPILOT_BODY_SALES_PITCH = "Meet your AI co-pilot. Try our brand-new AI-led workflow — Autopilot puts the AI in the driver's seat, automating the daily grind of spotting what needs attention so you don't have to go looking for it. Flip it on and watch it brief you immediately, no asking required. (Scripted prototype today — two scenarios live.)";

  const STEPS = [
    { route:"/clients",   title:"Welcome to CGTrace", body:"A living CGT parcel register for accounting firms — not a spreadsheet. This tour covers the Compliance workspace, Practice-Manager sync, the reconciliation workflow, Advisory and Autopilot in a few minutes. Everything shown is general modelling, not tax advice." },
    { route:"/clients",   title:"1 · Client workspace", body:"Every client's portfolio in one place — search, filter by entity type, and read cost base and parcel counts at a glance. The Tax Obligations tab surfaces what's due, including return sync status. Newly synced clients with no history yet get the ⚡ Build cost base history flow — the top-right button opens that worklist. Click any client row to open their tracker." },
    { route:"/clients",   title:"2 · Practice-Manager sync", spotlight:"[data-tour='tour-pm-sync']", clickOpen:"[data-tour='tour-pm-sync']", clickOpenPanel:"[data-tour-panel='tour-pm-sync']",
      body:"The chip in the top bar shows the connected practice-management system — Xero Practice Manager, MYOB AE/AO togglable — and lets you sync now. CGTrace reads client, job and return context from the PM and writes back exactly one thing, the CGT figure, onto the matching Tax Obligations row. No duplicate entry." },
    { route:"/client/c1", title:"3 · Portfolio dashboard", spotlight:"[data-tour='tour-download-tx']", clickOpen:"[data-tour='tour-download-tx']", clickOpenPanel:"[data-tour-panel='tour-download-tx']",
      body:"This is Margaret & Bruce's portfolio dashboard — the aggregate view across parcels, corporate actions, rights and CGT events. Reconciliation Workflow Central lives right here too; Download transactions (▾) is how new data gets in, either a live API pull or an Import Document upload." },
    { route:"/client/c1", title:"4 · Reconciliation workflow", spotlight:["[data-tour='tour-reconciliation-actions']","[data-tour='tour-reconcile-complete']"],
      body:"Reconciliation Workflow Central tracks five locked stages — reconcile inputs, review parcels & corporate actions, resolve CGT events, generate report, mark reconciled. Pull transactions via API or Import Document, or go manual with Add Parcel / Add Sell / Apply Action. Rollback restores the last reconciled stamp if something's wrong." },
    { route:"/client/c1", title:"5 · Parcel register", spotlight:"[data-tour='tour-parcel-register']", clickOpen:"[data-tour='tour-parcel-register']", clickClose:"[data-tour='tour-portfolio-dashboard']",
      body:"Margaret & Bruce's CBA holding spans the origin types that break spreadsheets — market purchases, DRP, SPP, a bonus issue, and a Bonus Share Plan (BSP) parcel whose acquisition date relates back under s.6BA. Click into the Parcel Register (left sidebar) to see every parcel's own cost base and audit notes — and use a parcel's calc button there to run the current-law-vs-2026-Bill what-if on a sale." },
    { route:"/client/c1", title:"6 · CGT Report & tax-return push",
      // Report is now a route (#/report/:id/:fy), not lifted state — open it by
      // navigating forward, close it by returning to this step's own route. The
      // base nav(step.route) at the top of the effect already re-fires "/client/c1"
      // on the next/prev step change, so this close() just gets us there one tick
      // sooner and keeps history consistent if the user hits browser Back instead.
      open: () => { if (hargreaves) nav("/report/" + hargreaves.id + (fy2024_25 ? "/" + fy2024_25.label : "")); },
      close: () => { nav("/client/c1"); },
      body:"Margaret & Bruce's FY2024-25 return: the CGT Report turns every reconciled parcel and disposal into a lodgment-ready schedule. Push sends only the final CGT figure back onto the matching Tax Obligations row — the same writeback step 2 described — so the return stays in the PM and reconciliation stays in CGTrace. Need fresh data first? Loop back to Download transactions → Import Document on the dashboard." },
    { route:"/tests",     title:"7 · 2027 CGT changes & the calculator", body:"This is where the domain expertise becomes product. Current law is in effect now and authoritative for every live figure; the Tax Reform (No. 1) Bill 2026 passed both Houses on 25 June 2026 and awaits Royal Assent — commencement stays 1 July 2027, so it's applied only as a forward scenario, never to the live book. Open the New 2027 CGT Calculator to model the change hands-on — indexation vs. the 50% discount, pre-CGT transition, straddle-asset splits and break-even timing — and to watch the validation suite run live in its own tab." },
    { route:"/partner",   title:"8 · Advisory — Partner Dashboard", body:"The up-sell surface. Pick a client group, read its one-peek vitals (advisory opportunity, embedded CGT, main threat, data confidence), and scan opportunities by entity × type. Assign each entity a strategy profile and hover the ⓘ beside it — the bubble shows that profile's goal, how it fits the entity's actual mix, and the talk points it invokes. The Threat Monitor surfaces corporate actions, property-market moves and legislative threats. Then ✦ Scope advisory engagement bundles the chosen observations into a profile-specific proposal." },
    { route:"/clients",   title:"9 · Autopilot",
      open: () => { setAutopilot(true); setCpBriefDismissed(false); },
      close: () => { setAutopilot(false); },
      body: AUTOPILOT_BODY_HOUSE_VOICE },
    { route:"/clients",   title:"10 · Account & settings", spotlight:"[data-tour='tour-account-menu']",
      open: () => setSettingsOpen(true),
      close: () => setSettingsOpen(false),
      body:"The avatar top-right is where Settings, User access control, Customer support and the Activity log (Autopilot's audit trail) live — we've opened Settings for you: broker API keys, the accounting-software connection that powers PM sync, and security. Mock content for this demo, wired for the shape of the real thing." },
    { route:"/clients",   title:"11 · Behind the build", external:"cgt-portfolio-hub.html", body:"The PM/PO portfolio hub: seven chapters tracing this product from raw market discovery through positioning, prioritisation, design, pricing, roadmap and delivery. Opens in a new tab — come back here when you're done." },
    { route:"/clients",   title:"That's the tour", body:"Explore freely from here. Reminder: CGTrace is an interview artefact — general modelling only, not tax advice." },
  ];
  const [i, setI] = useState(() => Math.min(Math.max(startAt || 0, 0), STEPS.length - 1));
  const step = STEPS[i];

  // Drives the step's route, spotlight, click-driven open (a real .click() on a
  // local-state toggle — popovers like the PM-sync chip and Download-transactions
  // dropdown have no external open prop, so dispatching a native click is cheaper
  // than threading one through; for the Parcel Register tab it instead clicks
  // between TrackerView's own sidebar items, since that page state isn't lifted
  // either) and forced-open App-level state, and reverses all of it (React's own
  // effect-cleanup, not a custom ref) the instant the step changes — covering Next,
  // Back, jumping via the dots, and Skip/Done/X, since unmount runs the same
  // cleanup. The 60ms delay gives the route/page a moment to render before querying
  // the DOM for the spotlight/click target.
  useEffect(() => {
    if (step.route) nav(step.route);
    let spotlightEls = [];
    let clickedOpen = false;
    let opened = false;
    const t = setTimeout(() => {
      if (step.spotlight) {
        const sels = Array.isArray(step.spotlight) ? step.spotlight : [step.spotlight];
        sels.forEach((sel, idx) => {
          const el = document.querySelector(sel);
          if (el) {
            el.classList.add("tour-spotlight");
            spotlightEls.push(el);
            if (idx === 0) el.scrollIntoView({ behavior:"smooth", block:"center" });
          }
        });
      }
      if (step.clickOpen) {
        const openEl = document.querySelector(step.clickOpen);
        if (openEl) { openEl.click(); clickedOpen = true; }
      }
      if (step.open) { step.open(); opened = true; }
    }, 60);
    return () => {
      clearTimeout(t);
      spotlightEls.forEach(el => el.classList.remove("tour-spotlight"));
      // Only re-click to close if the panel is still genuinely open — if the user
      // already closed it manually, a blind toggle-click would re-open it instead.
      if (clickedOpen && (!step.clickOpenPanel || document.querySelector(step.clickOpenPanel))) {
        const closeEl = document.querySelector(step.clickClose || step.clickOpen);
        if (closeEl) closeEl.click();
      }
      if (opened && step.close) step.close();
    };
  }, [i]);
  const last = i === STEPS.length - 1;
  return (
    <div style={{ position:"fixed", inset:0, zIndex:9000, pointerEvents:"none", display:"flex", alignItems:"flex-end", justifyContent:"center", padding:"0 16px 28px" }}>
      <div style={{ pointerEvents:"auto", width:"min(560px,96vw)", background:"linear-gradient(160deg,#0F0E17,#1A1828)", border:"1px solid #2D2845", borderRadius:12, boxShadow:"0 20px 60px rgba(0,0,0,0.6)", padding:"18px 20px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <span style={{ fontSize:9, letterSpacing:"0.16em", textTransform:"uppercase", color:"#9088C0", fontFamily:"'IBM Plex Mono',monospace" }}>Guided tour · {i+1}/{STEPS.length}</span>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#7A72B0", fontSize:15, cursor:"pointer" }}>✕</button>
        </div>
        {/* Angle switcher — the tour is one linear track, but readers arrive via
            "Compliance core" (step 0) or "Advisory add-on" (step 8) and expect to
            hop between the two without closing. Highlights by which half you're in
            (i<8 = compliance-side, i>=8 = advisory-side). setI reuses existing state. */}
        <div style={{ display:"flex", gap:3, marginBottom:10, background:"#15131F", border:"1px solid #2D2845", borderRadius:8, padding:3 }}>
          {[{label:"Compliance core", at:0},{label:"Advisory add-on", at:8}].map(seg => {
            const active = seg.at===0 ? i<8 : i>=8;
            return <button key={seg.at} onClick={()=>setI(seg.at)}
              style={{ flex:1, padding:"5px 8px", fontSize:10.5, fontWeight:700, borderRadius:6, border:"none", cursor:"pointer", fontFamily:"'IBM Plex Mono',monospace", letterSpacing:"0.03em", background: active?"#7F77DD":"transparent", color: active?"#0F0E17":"#9088C0", transition:"all .15s" }}>{seg.label}</button>;
          })}
        </div>
        <div style={{ fontSize:15, fontWeight:700, color:"#EEEDFE", marginBottom:6, fontFamily:"'IBM Plex Mono',monospace" }}>{step.title}</div>
        <div style={{ fontSize:12.5, color:"#AFA9EC", lineHeight:1.7, marginBottom:step.external?10:14 }}>{step.body}</div>
        {step.external && (
          <button onClick={()=>window.open(step.external,"_blank","noopener")}
            style={{ ...S.btn("primary"), padding:"6px 14px", fontSize:11.5, marginBottom:14 }}>Open hub ↗</button>
        )}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:10 }}>
          <div style={{ display:"flex", gap:4 }}>
            {STEPS.map((_, n) => <span key={n} onClick={() => setI(n)} style={{ width:7, height:7, borderRadius:"50%", cursor:"pointer", background:n===i?"#7F77DD":"#2D2845" }}/>)}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={onClose} style={{ ...S.btn("secondary"), padding:"6px 12px" }}>Skip</button>
            {i>0 && <button onClick={() => setI(i-1)} style={{ ...S.btn("secondary"), padding:"6px 12px" }}>Back</button>}
            <button onClick={() => last ? onClose() : setI(i+1)} style={{ ...S.btn("primary"), padding:"6px 14px" }}>{last ? "Done" : "Next →"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// AI ONBOARDING AGENT — the flagship journey. Single component, internal state
// machine: basics → connect → reconstruct (Phase 1) → reconcile (Phase 2) → review.
// Scripted/deterministic (Wizard-of-Oz): reuses APIConnectionPanel's status helpers,
// gradeImportEvent's CONFIRMED/ASSUMED/REVIEW semantics, ProvChip (extended), and
// DocumentImportModal's preview-before-commit pattern.
// ═══════════════════════════════════════════════════════════════════════════════
function AIOnboardingAgent({ onClose, onCommit }) {
  const [phase, setPhase]   = useState("basics");      // basics|connect|run1|run2|review
  const [name, setName]     = useState("Daniel & Priya Okafor");
  const [entityType, setET] = useState("Individual");
  const [sources, setSources] = useState({ broker:true, workpaper:true, sharesight:false });
  const [runLog, setRunLog] = useState([]);            // {label,src,status}
  const [rows, setRows]     = useState(null);          // proposals

  const statusIcon  = (s) => s==="ok"?"✓":s==="error"?"✗":s==="loading"?"⏳":"·";
  const statusColor = (s) => s==="ok"?C.teal:s==="error"?C.red:s==="loading"?C.amber:C.muted;

  // Run a visible step sequence deterministically (no random failure on flagship path).
  async function runSteps(steps, after) {
    const logs = [];
    for (const st of steps) {
      logs.push({ ...st, status:"loading" });
      setRunLog([...logs]);
      await simulateDelay(st.ms);
      logs[logs.length-1] = { ...logs[logs.length-1], status:"ok" };
      setRunLog([...logs]);
    }
    after && after();
  }

  async function startReconstruct() {
    setPhase("run1"); setRunLog([]);
    await runSteps(ONBOARD_STEPS_P1, () => {
      setRows(buildOnboardProposals());
      setTimeout(() => startReconcile(), 650);
    });
  }
  async function startReconcile() {
    setPhase("run2"); setRunLog([]);
    await runSteps(ONBOARD_STEPS_P2, () => setTimeout(() => setPhase("review"), 500));
  }

  const upd = (id, k, v) => setRows(list => list.map(r => {
    if (r.id !== id) return r;
    const next = { ...r, [k]:v };
    // editing or explicitly accepting a REVIEW row promotes it to committable
    if (k === "accept" && v && r.status === "REVIEW") next._reviewed = true;
    return next;
  }));

  const proposals  = rows || [];
  const p1rows     = proposals.filter(r => r.phase === 1);
  const reviewRows = proposals.filter(r => r.status === "REVIEW");
  const acceptCount = proposals.filter(r => r.accept).length;
  const reviewBlock = proposals.filter(r => r.status === "REVIEW" && !r.accept).length;

  function rowTotal(r) {
    if (r.kind === "adj") return (r.adjType==="decrease"?-1:1) * (Number(r.amount)||0);
    return r.origin==="BONUS" ? 0 : +(((Number(r.qty)||0)*(Number(r.costPerUnit)||0)).toFixed(2));
  }

  function commit() {
    const accepted = proposals.filter(r => r.accept);
    const byKey = {};
    accepted.forEach(r => { (byKey[r.key] = byKey[r.key] || []).push(r); });
    const newHoldings = {};
    const holdingIds = [];
    Object.entries(byKey).forEach(([key, group]) => {
      const uniqueKey = key + "__okafor";
      const meta = group[0];
      const parcels = [];
      const adjustments = [];
      group.filter(r => r.kind === "parcel").forEach(r => {
        const isBonus = r.origin === "BONUS";
        parcels.push({
          id:uid(), origin:r.origin, acquisitionDate:r.date,
          qty:Number(r.qty)||0, costPerUnit:isBonus?0:(Number(r.costPerUnit)||0),
          totalCost:isBonus?0:+(((Number(r.qty)||0)*(Number(r.costPerUnit)||0)).toFixed(2)),
          status:"active", sourceActionId:null, sourceRightsId:null,
          replacesParcelId:null,
          notes:"Reconstructed by AI agent — see audit trail. " + (r.input||"") + (r.relateBack?" Acquisition date relates back to the original parcel (s.6BA).":"") });
      });
      group.filter(r => r.kind === "adj").forEach(r => {
        const parent = parcels[0];
        if (!parent) return;
        adjustments.push({
          id:uid(), parcelId:parent.id, sourceActionId:null,
          type:r.adjType||"decrease", amount:Math.abs(Number(r.amount)||0), amountPerUnit:0,
          effectiveDate:r.date, origin:r.origin==="DEMERGER"?"DEMERGER":"AMIT",
          notes:"Reconstructed by AI agent — see audit trail. " + (r.input||"") });
      });
      newHoldings[uniqueKey] = { id:uid(), ticker:meta.ticker, name:meta.name, type:meta.htype,
        parcels, adjustments, actions:[], cgtEvents:[] };
      holdingIds.push(uniqueKey);
    });
    const newClient = { ...ONBOARD_CLIENT, name, entityType, holdingIds };
    onCommit(newClient, newHoldings);
  }

  const stepDot = (active, done) => ({
    width:8, height:8, borderRadius:"50%", flexShrink:0,
    background: done ? C.teal : active ? C.purple : C.border,
  });
  const PHASES = [["basics","Basics"],["connect","Connect"],["run1","Reconstruct"],["run2","Reconcile"],["review","Review"]];
  const phaseIdx = PHASES.findIndex(([p]) => p === phase);

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(8,6,20,0.88)", zIndex:600,
      display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:12,
        width:"min(960px,98vw)", maxHeight:"92vh", display:"flex", flexDirection:"column", overflow:"hidden" }}>

        {/* Header + phase rail */}
        <div style={{ padding:"16px 22px", borderBottom:`1px solid ${C.border}`,
          display:"flex", alignItems:"center", justifyContent:"space-between", gap:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:11 }}>
            <div style={{ width:34, height:34, borderRadius:9, background:"linear-gradient(135deg,#7F77DD,#AFA9EC)",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, color:"#fff" }}>✦</div>
            <div>
              <div style={{ fontSize:15, fontWeight:600, color:C.text, display:"flex", alignItems:"center", gap:7 }}>Build cost base with AI
                <span style={{ fontSize:9, padding:"1px 7px", borderRadius:3, fontFamily:"'IBM Plex Mono',monospace", fontWeight:700,
                  background:`${C.teal}16`, color:C.teal, border:`1px solid ${C.teal}35` }}>STANDARD · SAMPLE</span>
                <span style={{ fontSize:10, color:C.muted, fontWeight:400 }}>· reconstruct a client's cost base from connected sources — one client at a time, build + review, no push</span></div>
              <div style={{ fontSize:10, color:C.gold, fontWeight:500, marginTop:3 }}>⚡ On Premium? <span style={{ fontWeight:400, color:C.muted }}>Autopilot builds your whole client list at once and pushes each reviewed figure into the return — with review gates. Standard stops at a built + reviewed cost base you export by hand.</span></div>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:5 }}>
                {PHASES.map(([p,lab], i) => (
                  <div key={p} style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ display:"flex", alignItems:"center", gap:5, fontSize:10,
                      fontFamily:"'IBM Plex Mono',monospace",
                      color: i===phaseIdx ? C.purple : i<phaseIdx ? C.teal : C.muted }}>
                      <span style={stepDot(i===phaseIdx, i<phaseIdx)}/>{lab}
                    </span>
                    {i<PHASES.length-1 && <span style={{ color:C.border, fontSize:10 }}>→</span>}
                  </div>
                ))}
              </div>
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:`1px solid ${C.border}`, color:C.dim,
            fontSize:16, cursor:"pointer", borderRadius:6, width:30, height:30 }}>✕</button>
        </div>

        <div style={{ flex:1, overflowY:"auto", padding:"20px 24px" }}>

          {/* ── STEP 1: BASICS ─────────────────────────────────────────── */}
          {phase==="basics" && (
            <div style={{ maxWidth:520 }}>
              <div style={{ fontSize:13, color:C.dim, marginBottom:14, lineHeight:1.6 }}>
                A sample walkthrough of the build. The agent pulls transaction history and prior workpapers
                from the sources you connect next, then rebuilds the cost base parcel-by-parcel for your review.
              </div>
              <div style={{ ...S.callout("79,158,255"), marginBottom:16 }}>
                In the live app you don't type a client here — they've already synced from Xero Practice Manager.
                You pick a synced client with no cost base yet (the <strong style={{color:C.text}}>Build cost base history</strong> queue)
                and the agent reconstructs from there. This sample is pre-filled so you can see the flow end-to-end.
              </div>
              <label style={S.label}>Client name <span style={{color:C.muted, fontWeight:400}}>· sample, pre-filled</span></label>
              <input value={name} onChange={e=>setName(e.target.value)} style={{ ...S.input, marginTop:5, marginBottom:14 }}/>
              <label style={S.label}>Entity type</label>
              <select value={entityType} onChange={e=>setET(e.target.value)} style={{ ...S.select, marginTop:5 }}>
                {ENTITY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          )}

          {/* ── STEP 2: CONNECT SOURCES ────────────────────────────────── */}
          {phase==="connect" && (
            <div>
              <div style={{ fontSize:13, color:C.dim, marginBottom:16, lineHeight:1.6 }}>
                Connect the data sources for <strong style={{color:C.text}}>{name}</strong>. The agent reconciles
                across sources — where they disagree, you'll see exactly which source won and why.
              </div>
              {[
                { k:"broker", icon:"🔌", title:"Broker API — CommSec / nabtrade", sub:"Full transaction history. Clean, high-confidence feed.", on:true },
                { k:"workpaper", icon:"📄", title:"Prior-firm workpaper (PDF)", sub:"Last accountant's workpaper. Messy — used to cross-check, not trusted blindly.", on:true, chip:"Okafor_workpaper_FY24.pdf" },
                { k:"sharesight", icon:"📊", title:"Sharesight export (competitor app)", sub:"Import an existing Sharesight portfolio.", on:false },
              ].map(s => (
                <div key={s.k} onClick={()=> s.on && setSources(v=>({...v,[s.k]:!v[s.k]}))}
                  style={{ display:"flex", alignItems:"center", gap:12, padding:"13px 15px", marginBottom:10,
                    borderRadius:8, cursor: s.on?"pointer":"not-allowed",
                    border:`1px solid ${ s.on && sources[s.k] ? C.purple : C.border }`,
                    background: s.on && sources[s.k] ? "rgba(127,119,221,0.07)" : C.surface2,
                    opacity: s.on?1:0.55 }}>
                  <span style={{ fontSize:20 }}>{s.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:C.text, display:"flex", alignItems:"center", gap:8 }}>
                      {s.title}
                      {!s.on && <span style={{ fontSize:9, padding:"2px 7px", borderRadius:3, fontFamily:"'IBM Plex Mono',monospace",
                        background:"rgba(148,163,184,0.15)", color:C.slate, border:`1px solid ${C.border}` }}>COMING SOON</span>}
                      {s.chip && <span style={{ fontSize:9, padding:"2px 7px", borderRadius:3, fontFamily:"'IBM Plex Mono',monospace",
                        background:"rgba(79,158,255,0.1)", color:C.blue, border:"1px solid rgba(79,158,255,0.25)" }}>{s.chip}</span>}
                    </div>
                    <div style={{ fontSize:11, color:C.dim, marginTop:2 }}>{s.sub}</div>
                  </div>
                  <span style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                    border:`1px solid ${ s.on && sources[s.k] ? C.purple : C.border }`,
                    background: s.on && sources[s.k] ? C.purple : "transparent",
                    display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:11 }}>
                    { s.on && sources[s.k] ? "✓" : "" }
                  </span>
                </div>
              ))}
              <div style={{ ...S.callout("79,158,255"), marginTop:6 }}>
                Demo mode — simulated CommSec, registry and workpaper data. No live connection is made.
              </div>
            </div>
          )}

          {/* ── PHASE 1/2: AGENT RUNS ──────────────────────────────────── */}
          {(phase==="run1" || phase==="run2") && (
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                <span style={{ fontSize:13, fontWeight:600, color:C.text }}>
                  {phase==="run1" ? "Phase 1 — Reconstruct" : "Phase 2 — Reconcile"}
                </span>
                <span style={{ fontSize:11, color:C.dim }}>
                  {phase==="run1" ? "Gathering and matching transactions across sources" : "Cross-checking sources & scanning corporate actions"}
                </span>
              </div>
              {runLog.map((log, i) => (
                <div key={i} style={{ marginBottom:8, background:C.surface2, border:`1px solid ${C.border}`,
                  borderRadius:6, padding:"10px 14px", display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:13,
                    color:statusColor(log.status), width:16 }}>{statusIcon(log.status)}</span>
                  <span style={{ fontSize:12, color:C.text, flex:1 }}>{log.label}</span>
                  <span style={{ fontSize:9, padding:"2px 8px", borderRadius:3, fontFamily:"'IBM Plex Mono',monospace",
                    background:"rgba(79,158,255,0.1)", color:C.blue, border:"1px solid rgba(79,158,255,0.25)" }}>{log.src}</span>
                </div>
              ))}
              {phase==="run2" && rows && (
                <div style={{ ...S.callout("167,139,250"), marginTop:12 }}>
                  Reconstructed {proposals.length} proposed entries · {reviewRows.length} flagged for review where sources disagree.
                </div>
              )}
            </div>
          )}

          {/* ── STEP 6: REVIEW & APPROVE (single demo gate) ─────────────── */}
          {phase==="review" && rows && (
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8, marginBottom:10 }}>
                <div style={{ fontSize:13, color:C.dim }}>
                  <strong style={{color:C.text}}>{proposals.length}</strong> proposed entries ·{" "}
                  <strong style={{color:C.teal}}>{proposals.filter(r=>r.status==="CONFIRMED").length}</strong> confirmed ·{" "}
                  <strong style={{color:C.red}}>{reviewRows.length}</strong> need review.{" "}
                  Hover any ⓘ to see which source won and why.
                </div>
              </div>

              {/* The gotcha, surfaced distinctly */}
              {proposals.filter(r=>r.gotcha).map(g => (
                <div key={g.id} style={{ marginBottom:14, padding:"12px 15px", borderRadius:8,
                  background:"rgba(248,113,113,0.06)", border:"1px solid rgba(248,113,113,0.3)", borderLeft:`3px solid ${C.red}` }}>
                  <div style={{ fontSize:12, fontWeight:700, color:C.red, marginBottom:4 }}>⚔ Source conflict — corporate action</div>
                  <div style={{ fontSize:12, color:C.text, lineHeight:1.6 }}>
                    The prior firm's workpaper taxed the <strong>CBA Bonus Share Plan</strong> as an ordinary dividend
                    (cost base $480). The registry shows it as <strong>bonus shares under s.6BA</strong> — $0 cost base,
                    acquisition date <strong>relating back to 10/04/2016</strong>. The agent adopted the registry treatment.
                    Confirm before commit.
                  </div>
                </div>
              ))}

              <div style={{ ...S.panel, overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                  <thead><tr>
                    {["✓","Security","Origin","Date","Qty / Type","Cost/Unit · Amount","Total","Source / Status",""].map(h =>
                      <th key={h} style={{ ...S.th, padding:"8px 10px" }}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {proposals.map(r => (
                      <tr key={r.id} style={{ opacity:r.accept?1:0.6, background:r.gotcha?"rgba(248,113,113,0.04)":"transparent" }}>
                        <td style={{ ...S.td, padding:"7px 10px", textAlign:"center" }}>
                          <input type="checkbox" checked={!!r.accept} onChange={e=>upd(r.id,"accept",e.target.checked)}/>
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px", fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{r.ticker}</td>
                        <td style={{ ...S.td, padding:"7px 10px" }}><Pill origin={r.origin}/></td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          <input type="date" value={r.date||""} onChange={e=>upd(r.id,"date",e.target.value)} style={{ ...S.input, padding:"4px 6px", fontSize:11, width:128 }}/>
                          {r.relateBack && <div style={{ fontSize:8, color:C.purple, fontFamily:"'IBM Plex Mono',monospace", marginTop:2 }}>relates back</div>}
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          {r.kind==="parcel"
                            ? <input type="number" value={r.qty??""} onChange={e=>upd(r.id,"qty",e.target.value)} style={{ ...S.input, padding:"4px 6px", fontSize:11, width:74 }}/>
                            : <span style={{ fontSize:10, color:C.dim }}>{r.adjType}</span>}
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          {r.kind==="parcel"
                            ? (r.origin==="BONUS" ? <span style={{ color:C.muted }}>$0 (bonus)</span>
                               : <input type="number" value={r.costPerUnit??""} onChange={e=>upd(r.id,"costPerUnit",e.target.value)} style={{ ...S.input, padding:"4px 6px", fontSize:11, width:84 }}/>)
                            : <input type="number" value={r.amount??""} onChange={e=>upd(r.id,"amount",e.target.value)} style={{ ...S.input, padding:"4px 6px", fontSize:11, width:84 }}/>}
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px", ...S.mono, color:C.dim }}>
                          {r.kind==="adj" && r.adjType==="decrease" ? "−" : ""}${fmt(Math.abs(rowTotal(r)))}
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <ImportStatusBadge status={r.status}/>
                            <ProvChip input={r.input} won={r.won} rejected={r.rejected} reason={r.reason}
                              fn="AI reconciler" ruleset={`confidence ${(r.confidence*100).toFixed(0)}%`}
                              status={r.status==="CONFIRMED"?"CONFIRMED":"PENDING"}/>
                          </div>
                        </td>
                        <td style={{ ...S.td, padding:"7px 10px", textAlign:"right" }}>
                          <button onClick={()=>setRows(list=>list.filter(x=>x.id!==r.id))}
                            style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:13 }}>✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={{ ...S.callout("251,191,36"), margin:"12px 0 8px" }}>
                Review every figure before approving — this becomes part of the client's permanent record.
                REVIEW-graded rows must be ticked to commit.
              </div>
              <div style={{ fontSize:10, color:C.muted, fontFamily:"'IBM Plex Mono',monospace", lineHeight:1.6,
                padding:"8px 12px", borderRadius:6, border:`1px dashed ${C.border}`, background:C.surface2 }}>
                ⓘ Demo: a single review gate. Production design gates twice — once after reconstruction
                (Phase 1), and again after reconciliation (Phase 2) — so the accountant signs off the
                rebuilt register before the agent applies corporate-action judgment on top of it.
              </div>

              {/* Q1 narrative closer — the "wow" is the build; this teases Autopilot as
                  the maintenance layer that follows. Build it once → Autopilot watches it. */}
              <div style={{ marginTop:12, padding:"11px 14px", borderRadius:8,
                background:"rgba(224,184,106,0.08)", border:"1px solid rgba(224,184,106,0.32)",
                display:"flex", gap:10, alignItems:"flex-start" }}>
                <span style={{ fontSize:14, lineHeight:1.4 }}>⚡</span>
                <div style={{ fontSize:11.5, color:C.text, lineHeight:1.6 }}>
                  <strong style={{ color:"#C88A2E" }}>Next — the book stays watched.</strong> Once you approve, this client's
                  register is built. Flip on <strong>Autopilot</strong> and the AI keeps tracing it for you — flagging new
                  transactions, corporate actions and cross-source drift before you go looking. Build it once; Autopilot
                  maintains it. <span style={{ color:C.muted }}>(Premium · try it from the top-bar switch.)</span>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Footer actions */}
        <div style={{ padding:"14px 22px", borderTop:`1px solid ${C.border}`,
          display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:10, color:C.muted }}>Scripted demo · offline · preview before commit</span>
          <div style={{ display:"flex", gap:8 }}>
            <button style={S.btn("secondary")} onClick={onClose}>Cancel</button>
            {phase==="basics" && (
              <button style={{ ...S.btn("primary"), opacity:name.trim()?1:0.5 }} disabled={!name.trim()}
                onClick={()=>setPhase("connect")}>Next: connect sources →</button>
            )}
            {phase==="connect" && (
              <button style={{ ...S.btn("primary"), opacity:(sources.broker||sources.workpaper)?1:0.5 }}
                disabled={!(sources.broker||sources.workpaper)} onClick={startReconstruct}>
                ✦ Run agent →</button>
            )}
            {(phase==="run1"||phase==="run2") && (
              <button style={{ ...S.btn("secondary"), opacity:0.5 }} disabled>Working…</button>
            )}
            {phase==="review" && (
              <button style={{ ...S.btn("teal"), opacity:(acceptCount && !reviewBlock)?1:0.5 }}
                disabled={!acceptCount || reviewBlock} onClick={commit}
                title={reviewBlock?`${reviewBlock} REVIEW row(s) still need to be ticked or removed`:""}>
                Approve & create client{reviewBlock?` (${reviewBlock} to review)`:` (${acceptCount})`}</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PM helpers ──────────────────────────────────────────────────────────────
function pmSince(hrs) {
  if (hrs <= 0) return "just now";
  if (hrs < 1)  return "<1h ago";
  if (hrs < 24) return Math.round(hrs) + "h ago";
  const d = Math.round(hrs / 24);
  return d + (d === 1 ? " day ago" : " days ago");
}
function pmFreshColor(hrs) {
  if (hrs >= 168) return C.red;     // ≥1 week — stale
  if (hrs >= 24)  return C.amber;   // ≥1 day — ageing
  return C.teal;                    // fresh
}
function pmFreshLabel(hrs) {
  if (hrs >= 168) return "stale";
  if (hrs >= 24)  return "ageing";
  return "current";
}
function pmDueAlert(dueStr, now) {
  const due = new Date(dueStr);
  const days = Math.round((due - now) / 86400000);
  if (days < 0)   return { label:`overdue ${Math.abs(days)}d`, color:C.red,   bg:"rgba(163,45,45,0.10)" };
  if (days <= 14) return { label:`due ${days}d`,               color:C.amber, bg:"rgba(153,107,10,0.10)" };
  return { label:fmtDate(dueStr), color:C.muted, bg:"rgba(148,163,184,0.08)" };
}

// ── Compliance mini-dashboard helpers (header on the Client Portfolios list) ──
// Portfolio readiness: a client counts as "current" if reconciled within the
// last READINESS_WINDOW_DAYS. Denominator is every client — there's no
// archived/closed-portfolio concept in the data model yet, so "active" == all.
const READINESS_WINDOW_DAYS = 30;
function computeReadiness(clients, now) {
  const total = clients.length;
  const current = clients.filter(c => c.lastReconciledAt &&
    (now - new Date(c.lastReconciledAt)) <= READINESS_WINDOW_DAYS * 86400000).length;
  return { current, total, pct: total ? Math.round(current / total * 100) : 0 };
}

// Return-obligation rollup for the header tile. Mirrors the overdue rule used by
// the Tax Obligations queue (due date passed + not yet pushed to Xero) but reads
// straight off the PM-synced ground truth (ps.ret.cgtPushed) rather than that
// queue's local in-session status override, so it can be computed from this
// component's props alone. "Soon due" reuses pmDueAlert's 14-day window.
function computeReturnStats(clients, pm, now) {
  let total = 0, overdue = 0, soonDue = 0;
  clients.forEach(c => {
    const ps = pm.entities[c.id];
    if (!ps) return;
    const job = ps.jobs.find(j => j.type === "tax-return");
    if (!job) return;
    total++;
    if (ps.ret.cgtPushed) return; // synced — neither overdue nor soon-due
    const days = Math.round((new Date(job.due) - now) / 86400000);
    if (days < 0) overdue++;
    else if (days <= 14) soonDue++;
  });
  return { total, overdue, soonDue };
}

// Attention Engine v1 (Autopilot Sample 1, plan doc §6/§9 phase 3) — "no

// Detect + surface only — this rule does not trigger any reconstruction itself.

}

// ── Engine-backed position math (no calcS copies; uses CBPDomain helpers) ──────
function effectiveCostBase(holding, parcel) {
  const adj = (holding.adjustments || [])
    .filter(a => a.parcelId === parcel.id)
    .reduce((s,a) => s + (a.amount || 0), 0);
  return parcel.totalCost + adj;
}

// Unrealised "if sold today" position for one entity, aggregated across its holdings.
// Loss ordering follows current-law optimal: capital losses applied to NON-discount
// gains first to preserve the discount on the rest (s.102-5 choice, pre-2027).
function entityUnrealised(client, holdings, asOf) {
  const disc = discountRate(client.entityType);
  const mtr  = defaultMTR(client.entityType);
  let mv = 0, costBase = 0, discGain = 0, nonDiscGain = 0, grossLoss = 0;
  const lots = [];
  (client.holdingIds || []).forEach(hid => {
    const h = holdings[hid];
    if (!h || h.type === "Crypto") return;
    const feed = MARKET_PRICES[h.ticker];
    if (!feed) return;
    (h.parcels || []).filter(p => p.status === "active").forEach(p => {
      const ecb  = effectiveCostBase(h, p);
      const val  = p.qty * feed.price;
      const gain = val - ecb;
      const elig = disc > 0 && discountEligible(p.acquisitionDate, asOf);
      mv += val; costBase += ecb;
      if (gain >= 0) { if (elig) discGain += gain; else nonDiscGain += gain; }
      else grossLoss += -gain;
      lots.push({ ticker:h.ticker, name:h.name, parcelId:p.id, origin:p.origin,
        acq:p.acquisitionDate, qty:p.qty, ecb, price:feed.price, val, gain, elig,
        days:holdingDays(p.acquisitionDate, asOf),
        reconciled: !p.importStatus || p.importStatus === "CONFIRMED" });
    });
  });
  let loss = grossLoss, nd = nonDiscGain, dg = discGain;
  const useND = Math.min(loss, nd); nd -= useND; loss -= useND;
  const useDG = Math.min(loss, dg); dg -= useDG; loss -= useDG;
  const discountApplied = dg * disc;
  const netAssessable   = Math.max(0, nd + dg - discountApplied);
  const embeddedTax     = netAssessable * mtr;
  return { mv, costBase, grossGain:discGain+nonDiscGain, grossLoss, discGain, nonDiscGain,
    discountApplied, netAssessable, embeddedTax, carryLoss:loss, lots, disc, mtr };
}

  if (pos.grossLoss > 1000) {
    const lossLots = pos.lots.filter(l => l.gain < 0);
    opps.push({ id:client.id+"-harvest", type:"harvest", entityId:client.id, entityName:client.name,
      goalTag:profileId, label:"Harvestable capital loss sitting idle", amount:pos.grossLoss,
      taxValue: pos.grossLoss * pos.mtr,
      detail:`$${fmt(pos.grossLoss)} of unrealised capital loss across ${lossLots.map(l=>l.ticker).join(", ")}. If realised and matched against gains, it would shelter roughly $${fmt(pos.grossLoss*pos.mtr)} of tax (indicative — losses best applied to non-discount gains at ${Math.round(pos.mtr*100)}%).`,
      prov:{ input:"Σ active parcels where market value < effective cost base", fn:"effectiveCostBase + mock market feed; loss × MTR", ruleset:"current law (pre-2027)", status:"ASSUMED" } });
  }
  // 2 — 12-month discount near-miss
  pos.lots.filter(l => l.gain > 0 && !l.elig && pos.disc > 0).forEach(l => {
    const toMark = 365 - l.days;
    if (toMark > 0 && toMark <= 120) {
      const taxAtRisk = l.gain * pos.disc * pos.mtr;
      opps.push({ id:client.id+"-nm-"+l.parcelId, type:"nearmiss", entityId:client.id, entityName:client.name,
        goalTag:profileId, label:`12-month discount near-miss · ${l.ticker}`, amount:taxAtRisk, taxValue:taxAtRisk,
        daysToMark:toMark,
        detail:`The ${l.ticker} parcel acquired ${fmtDate(l.acq)} reaches the 50% CGT-discount mark in ${toMark} days. Realising it now (unrealised gain $${fmt(l.gain)}) forgoes about $${fmt(taxAtRisk)} of discount benefit.`,
        prov:{ input:`holding days ${l.days} vs 365 · gain $${fmt(l.gain)}`, fn:"holdingDaysAt + gain × discount × MTR", ruleset:"current law (pre-2027)", status:"CONFIRMED" } });
    }
  });
  // 3 — concentration cap (the sell-candidate finder; emphasised for liquidity)
  const byTicker = {};
  pos.lots.forEach(l => { byTicker[l.ticker] = (byTicker[l.ticker]||0) + l.val; });
  const cap = 0.35;
  Object.entries(byTicker).forEach(([tk,val]) => {
    if (pos.mv > 0 && val / pos.mv > cap) {
      opps.push({ id:client.id+"-conc-"+tk, type:"concentration", entityId:client.id, entityName:client.name,
        goalTag:profileId, label:`Concentration · ${tk}`, amount:val - cap*pos.mv, taxValue:0,
        detail:`${tk} is ${Math.round(val/pos.mv*100)}% of this entity's portfolio (soft cap ${Math.round(cap*100)}%) — $${fmt(val - cap*pos.mv)} above the cap.${goal && goal.id==="liquidity" ? " For a cashflow raise, this is the natural disposal candidate to review first." : ""}`,
        prov:{ input:`${tk} market value $${fmt(val)} ÷ portfolio $${fmt(pos.mv)}`, fn:"Σ parcel market value by ticker", ruleset:"n/a — risk flag", status:"ASSUMED" } });
    }
  });
  return opps;
}

// One ticker's active lots for an entity, with effective cost base + discount flag.
function tickerPosition(client, holdings, ticker) {
  const h = holdings[ticker];
  if (!h || h.type === "Crypto") return null;
  const feed = MARKET_PRICES[ticker];
  if (!feed) return null;
  const disc = discountRate(client.entityType), mtr = defaultMTR(client.entityType);
  const lots = (h.parcels || []).filter(p => p.status === "active").map(p => ({
    ecb: effectiveCostBase(h, p), qty: p.qty, acq: p.acquisitionDate,
    elig: disc > 0 && discountEligible(p.acquisitionDate, PARTNER_AS_OF) }));
  if (!lots.length) return null;
  return { disc, mtr, price:feed.price, lots,
    qty: lots.reduce((s,l)=>s+l.qty,0), ecb: lots.reduce((s,l)=>s+l.ecb,0),
    mvNow: lots.reduce((s,l)=>s+l.qty*feed.price,0) };
}
function disposalTaxAt(tp, price) {
  return tp.lots.reduce((s,l) => {
    const gain = l.qty*price - l.ecb;
    if (gain <= 0) return s;
    const assessable = l.elig ? gain*(1-tp.disc) : gain;
    return s + assessable*tp.mtr;
  }, 0);
}
// Splits a disposal at `price` into discount-adjusted CGT (on gains) and crystallised loss.
function disposalSplitAt(tp, price) {
  let tax = 0, loss = 0;
  tp.lots.forEach(l => {
    const gain = l.qty*price - l.ecb;
    if (gain > 0) { tax += (l.elig ? gain*(1-tp.disc) : gain) * tp.mtr; }
    else loss += -gain;
  });
  return { tax, loss };
}
// Group-level CGT impact estimate for a market event, summed across holders.
function eventImpact(ev, tps) {
  if (!tps.length) return null;
  if (ev.kind === "takeover" || ev.kind === "buyback") {
    const price = ev.kind === "takeover" ? ev.offer : ev.capitalComponent;
    const base  = ev.kind === "takeover" ? "offer" : "capital component";
    const agg = tps.reduce((a,tp) => { const s = disposalSplitAt(tp, price); a.tax += s.tax; a.loss += s.loss; return a; }, { tax:0, loss:0 });
    if (agg.tax > 0) return { label:`Est. CGT if disposed at ${base}`, value:agg.tax, fn:`Σ lots (${base} − cost base), discount-adjusted × MTR` };
    return { label:"Capital loss crystallised (harvestable)", value:agg.loss, fn:`Σ lots (cost base − ${base}) where below cost` };
  }
  if (ev.kind === "capital_return")
    return { label:"Cost base reduced (group)", value: tps.reduce((s,tp)=>s+ev.perShare*tp.qty,0),
      fn:"Σ perShare × units held (s.104-135 reduction)" };
  if (ev.kind === "demerger")
    return { label:"Cost base apportioned (rollover available)", value: tps.reduce((s,tp)=>s+ev.apportionPct*tp.ecb,0),
      fn:"Σ apportionment % × effective cost base" };
  if (ev.kind === "volatility")
    return { label:"Embedded liability moves ~", value: Math.abs(tps.reduce((s,tp)=>s + (disposalTaxAt(tp, tp.price) - disposalTaxAt(tp, tp.price*(1+ev.move))),0)),
      fn:`Δ embedded tax at ${Math.round(ev.move*100)}% price move` };
  return null;
}

// Shared threat computation — feeds both the 'Main threats' vitals tile and the monitor.
// Severity = genuine downside $ for ranking: a CGT liability that an event would crystallise,
// a volatility swing in embedded liability, or property value erosion on a downward trend.
// Crystallised-loss / cost-base / favourable moves score 0 (shown, but not "the threat").
function computeThreats(group, entities, holdings) {
  const types = new Set(entities.map(e => e.entityType));
  const hasProperty = entities.some(e => (e.holdingIds||[]).some(hid => holdings[hid] && holdings[hid].type === "Property"));

  const market = MARKET_EVENTS.map(ev => {
    const tps = entities.map(e => tickerPosition(e, holdings, ev.ticker)).filter(Boolean);
    if (!tps.length) return null;
    const impact = eventImpact(ev, tps);
    const severity = ev.kind === "volatility" ? (impact?impact.value:0)
      : (impact && impact.label.indexOf("Est. CGT") === 0 ? impact.value : 0);
    return { kind:"market", id:ev.id, ev, impact, holders:tps.length, severity, title:ev.title };
  }).filter(Boolean);

  const property = PROPERTY_TRENDS.map(tr => {
    const tps = [];
    entities.forEach(e => (tr.tickers||[]).forEach(tk => {
      if ((e.holdingIds||[]).includes(tk)) { const tp = tickerPosition(e, holdings, tk); if (tp) tps.push(tp); }
    }));
    const revalu  = tps.reduce((s,tp)=>s + tp.mvNow*tr.move, 0);
    const cgtDelta = Math.abs(tps.reduce((s,tp)=>s + (disposalTaxAt(tp, tp.price) - disposalTaxAt(tp, tp.price*(1+tr.move))), 0));
    const severity = tr.move < 0 ? Math.abs(revalu) : 0;
    return { kind:"property", id:tr.id, trend:tr, holders:tps.length, revalu, cgtDelta, severity, title:`${tr.segment} · ${tr.region}` };
  }).filter(p => p.holders > 0 || (hasProperty && (p.trend.tickers||[]).length === 0));

  const legislative = LEGISLATIVE_THREATS.filter(t =>
    t.affects.goals.includes(group.goal) || [...types].some(ty => t.affects.entityTypes.includes(ty)))
    .map(t => ({ kind:"legislative", id:t.id, title:t.title, status:t.status, detail:t.impact, source:t.source, fn:t.fn, severity:0 }));

  const ranked = [...market, ...property].sort((a,b) => b.severity - a.severity);
  let main = ranked[0] && ranked[0].severity > 0 ? ranked[0] : (legislative[0] || ranked[0] || null);
  const count = market.length + property.length + legislative.length;
  return { market, property, legislative, hasProperty, main, count };
}

// Flagship: disposal-efficiency ranker. For a cash target, ranks an entity's lots by
// proceeds net of CGT so the partner sees the most tax-efficient way to raise cash.
function DisposalRanker({ entities, holdings, profiles, collapsed=false, onToggle }) {
  const [eid, setEid] = useState(entities[0] ? entities[0].id : null);
  const [target, setTarget] = useState(50000);
  const [showAll, setShowAll] = useState(false);
  const client = entities.find(e => e.id === eid);
  const pos = useMemo(() => client ? entityUnrealised(client, holdings, PARTNER_AS_OF) : null, [eid, holdings]);
  if (!client || !pos) return null;
  const ranked = pos.lots.map(l => {
    let tax = 0, lossBenefit = 0;
    if (l.gain > 0) { const assessable = l.elig ? l.gain*(1-pos.disc) : l.gain; tax = assessable*pos.mtr; }
    else lossBenefit = (-l.gain)*pos.mtr;
    const net = l.val - tax;
    return { ...l, tax, lossBenefit, net, eff: l.val>0 ? net/l.val : 1 };
  }).sort((a,b) => b.eff - a.eff || b.lossBenefit - a.lossBenefit);
  let cumProceeds = 0, cumTax = 0, hit = false;
  const rows = ranked.map(r => {
    const need = !hit;
    if (need) { cumProceeds += r.val; cumTax += r.tax; if (cumProceeds >= target) hit = true; }
    return { ...r, inPlan:need };
  });
  const planProceeds = rows.filter(r=>r.inPlan).reduce((s,r)=>s+r.val,0);
  const planTax = rows.filter(r=>r.inPlan).reduce((s,r)=>s+r.tax,0);
  return (
    <div style={S.panel}>
      <div style={{ ...S.panelHead, cursor:"default" }}>
        <div onClick={onToggle} style={{ cursor:"pointer", display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, color:C.muted }}>{collapsed ? "▸" : "▾"}</span>
          <div>
            <div style={{ fontSize:13.5, fontWeight:700, color:C.text }}>Disposal-efficiency ranker</div>
            <div style={{ fontSize:11, color:C.dim }}>To raise cash, which holdings give the most proceeds net of CGT — the proceeds-vs-tax-neutral view.</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
          <select value={eid} onChange={e=>setEid(e.target.value)} style={{ ...S.select, minWidth:170 }}>
            {entities.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:11, color:C.muted }}>Cash target $</span>
            <input type="number" value={target} min="0" step="5000" onChange={e=>setTarget(parseFloat(e.target.value)||0)} style={{ ...S.input, width:110 }}/>
          </div>
        </div>
      </div>
      {!collapsed && <>
      <div style={{ padding:"10px 16px", display:"flex", gap:18, flexWrap:"wrap", background:C.surface2, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontSize:12, color:C.dim }}>Plan raises <b style={{ color:C.teal }}>${fmt(planProceeds)}</b> for <b style={{ color:C.red }}>${fmt(planTax)}</b> CGT
          <span style={{ color:C.muted }}> · effective {planProceeds>0?Math.round(planTax/planProceeds*100):0}% on proceeds</span></div>
        {pos.carryLoss>0 && <div style={{ fontSize:12, color:C.teal }}>Capital loss available to offset: ${fmt(pos.carryLoss)}</div>}
      </div>
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead><tr>
            {["Holding","Acquired","Discount","Market value","CGT if sold","Net cash","Cash/$1",""].map((h,i)=>(
              <th key={i} style={{ ...S.th, textAlign:i>=3&&i<7?"right":"left" }}>{h}</th>))}
          </tr></thead>
          <tbody>
            {(showAll ? rows : rows.slice(0,6)).map((r,i) => (
              <tr key={i} style={{ background: r.inPlan ? "rgba(15,110,86,0.05)" : "transparent" }}>
                <td style={S.td}><b>{r.ticker}</b> <span style={{ color:C.muted, fontSize:10 }}>{r.parcelId}</span></td>
                <td style={S.td}>{fmtDate(r.acq)}</td>
                <td style={S.td}>{r.gain<=0 ? <span style={{ color:C.teal }}>loss</span> : r.elig ? <span style={{ color:C.teal }}>eligible</span> : <span style={{ color:C.amber }}>not yet</span>}</td>
                <td style={{ ...S.td, textAlign:"right", fontFamily:"'IBM Plex Mono',monospace" }}>${fmt(r.val)}</td>
                <td style={{ ...S.td, textAlign:"right", fontFamily:"'IBM Plex Mono',monospace", color:r.tax>0?C.red:C.teal }}>{r.tax>0?`$${fmt(r.tax)}`:r.lossBenefit>0?`−$${fmt(r.lossBenefit)}*`:"$0"}</td>
                <td style={{ ...S.td, textAlign:"right", fontFamily:"'IBM Plex Mono',monospace" }}>${fmt(r.net)}</td>
                <td style={{ ...S.td, textAlign:"right", fontFamily:"'IBM Plex Mono',monospace", color:r.eff>=1?C.teal:r.eff>=0.9?C.text:C.amber }}>{r.eff.toFixed(2)}</td>
                <td style={S.td}>{r.inPlan && <span style={{ fontSize:9, padding:"2px 6px", borderRadius:4, background:"rgba(15,110,86,0.12)", color:C.teal, fontFamily:"'IBM Plex Mono',monospace" }}>IN PLAN</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {rows.length>6 && <div style={{ padding:"8px 16px", borderTop:`1px solid ${C.border2}` }}>
        <button onClick={()=>setShowAll(s=>!s)} style={{ background:"none", border:`1px solid ${C.border}`, color:C.purple, borderRadius:6, padding:"5px 12px", fontSize:11, cursor:"pointer" }}>
          {showAll ? "Show top 6 only" : `Show all ${rows.length} holdings (${rows.length-6} more)`}</button>
      </div>}
      <div style={{ padding:"8px 16px", fontSize:10.5, color:C.muted, lineHeight:1.5 }}>
        Ranked by cash retained per $1 of market value (lowest CGT first; loss lots rank first and free an offset, marked *). Observation only — the partner decides what to realise. Indicative modelling, not tax advice.</div>
      </>}
    </div>
  );
}

const TYPE_ORDER = ["harvest","concentration","nearmiss"];

// Opportunity-led hero with a collapsible breakdown by type, then entity.
function OpportunityHero({ rows, total, allOpps, entities, onScope }) {
  const [open, setOpen] = useState(false);
  const byType = {};
  rows.forEach(r => r.opps.forEach(o => {
    const t = byType[o.type] || (byType[o.type] = { total:0, byEntity:{} });
    t.total += (o.taxValue||0);
    t.byEntity[r.client.name] = (t.byEntity[r.client.name]||0) + (o.taxValue||0);
  }));

// Dynamic "fit vs current mix" line — reads the entity's actual position.
function strategyFit(profileId, pos) {
  if (!pos || pos.mv <= 0) return "No valued holdings for this entity.";
  const byT = {}; pos.lots.forEach(l => byT[l.ticker] = (byT[l.ticker]||0) + l.val);
  const top = Object.entries(byT).sort((a,b)=>b[1]-a[1])[0];
  const topPct = top ? Math.round(top[1]/pos.mv*100) : 0;
  const gains = pos.discGain + pos.nonDiscGain;
  const discPct = gains > 0 ? Math.round(pos.discGain/gains*100) : 0;
  const F = {
    liquidity: `Top holding ${top?top[0]:"—"} is ${topPct}% of the portfolio${pos.grossLoss>0?`; $${fmt(pos.grossLoss)} harvestable loss on hand to keep a raise near tax-neutral`:""}.`,
    retirement: `${discPct}% of unrealised gains are already 12-month discount-eligible; embedded CGT to pace down is $${fmt(pos.embeddedTax)}.`,
    wealth_preservation: `$${fmt(pos.embeddedTax)} of embedded CGT sits unrealised — the profile's job is to keep it that way unless a gain must be offset.`,
    estate: `$${fmt(pos.embeddedTax)} embedded CGT would crystallise on a full transfer; staging + cost-base clarity reduce the shock.`,
    high_growth: `Concentration in ${top?top[0]:"—"} (${topPct}%) is tolerated here as conviction; disposals deferred to keep capital compounding.`,
    property: `Largest asset ${top?top[0]:"—"} is ${topPct}% of value; holding-period timing and a staged sell-down drive the plan.`,
  };
  return F[profileId] || "";
}

// ── Autopilot pop-out shell — same floating/draggable/resizable chrome as
// GlobalAIChat (position state, drag handlers, resize handle, scrollable body),
// re-skinned in the amber Autopilot palette (vs. GlobalAIChat's purple/indigo) so
// the two AI modes read as visually distinct at a glance. Unlike GlobalAIChat,
// this auto-opens on landing/mount rather than waiting for a click — Autopilot
// surfaces proactively, Assistant waits to be asked. Pure shell: callers own the
// detection logic and pass in title/subtitle/children; dismiss is wired by the
// caller via onClose (usually a per-view "dismissed" flag that resets on next visit).
function AutopilotPanel({ isOpen, onClose, title, subtitle, children, defaultPos, defaultSize, suggestedPrompts }) {
  const [pos, setPos] = useState(defaultPos || { x: typeof window!=="undefined" ? Math.max(0,window.innerWidth-440) : 760, y:80 });
  const [size, setSize] = useState(defaultSize || { w:420, h:560 }); // bumped from 400×460 — Permission-stage's 8-chip strip + plan text + buttons needs more room before manual resize
  const [resizeHover, setResizeHover] = useState(false); // visual-only — corner handle was functional but too small/low-contrast to notice

  // Keep the panel on-screen AND sized to the window (5 Jul fixes, same as
  // GlobalAIChat): pos/size are captured once at mount, so a window smaller
  // than the defaults (or resized smaller after load) left the panel off-view
  // or its chat input below the fold. fitToViewport caps the size to the
  // viewport (respecting the panel's 320×280 minimums) and clamps the position
  // back in; runs on open, after any size change, and on window resize. Bounds
  // are exact viewport px for every instance — the render below portals into
  // <body>, outside the #scale-root transform.
  // Panel content zooms with the app (5 Jul, user request) — same pattern as
  // GlobalAIChat: chrome stays viewport-anchored, inner wrapper applies the
  // calcFitScale() factor so content sizes track the scaled app.
  const [uiZoom, setUiZoom] = useState(calcFitScale);
  const fitToViewport = () => {
    setUiZoom(calcFitScale());
    const w = Math.max(320, Math.min(size.w, window.innerWidth  - 16));
    const h = Math.max(280, Math.min(size.h, window.innerHeight - 16));
    if (w !== size.w || h !== size.h) setSize({ w, h });
    setPos(p => ({
      x: Math.max(8, Math.min(p.x, window.innerWidth  - w - 8)),
      y: Math.max(8, Math.min(p.y, window.innerHeight - h - 8)),
    }));
  };
  useEffect(() => { if (isOpen) fitToViewport(); }, [isOpen, size.w, size.h]);
  useEffect(() => {
    const onR = () => fitToViewport();
    window.addEventListener("resize", onR);
    return () => window.removeEventListener("resize", onR);
  }, [isOpen, size.w, size.h]);

  // Freeform Q&A — scripted, same Wizard-of-Oz pattern as SupportModal's "Chat with
  // support team" tab. Cycles through canned, Autopilot-flavoured replies rather than
  // calling a live model; honest about what's mock vs. real, consistent with the rest
  // of this demo. suggestedPrompts (optional, per-scenario) lets a caller offer a
  // handful of one-click questions with a scripted reply tailored to its own data
  // (newClients / threats / pipeline) instead of falling back to the generic cycle —
  // typed freeform questions still fall back to AUTOPILOT_REPLIES below.
  const [chatMsgs, setChatMsgs] = useState([]);
  const [chatDraft, setChatDraft] = useState("");
  const AUTOPILOT_REPLIES = [
    "Good question — in a live build I'd pull that from this client's current portfolio and the active law version. For this demo, the briefing above is everything I've surfaced so far.",
    "I can flag that for follow-up, but I can't run a live lookup in this demo. Try ✦ Assistant for general Q&A, or check back once this scenario is wired to real data.",
    "Noted. Once the next build phase is in place — asking permission before acting — this is exactly the kind of question I'd resolve before requesting your go-ahead.",
  ];
  function sendMessage(text, replyOverride) {
    if (!text || !text.trim()) return;
    const mine = { from:"me", text:text.trim() };
    setChatMsgs(ms => [...ms, mine]);
    setChatDraft("");
    setTimeout(() => {
      setChatMsgs(ms => [...ms, { from:"ai", text: replyOverride || AUTOPILOT_REPLIES[ms.length % AUTOPILOT_REPLIES.length] }]);
    }, 700);
  }
  function sendChat() { sendMessage(chatDraft); }

  const handleDragStart = (e) => {
    if (e.target.closest("button")) return;
    e.preventDefault();
    const startX = e.clientX - pos.x, startY = e.clientY - pos.y;
    const onMove = (ev) => setPos({
      x: Math.max(0, Math.min(window.innerWidth  - size.w, ev.clientX - startX)),
      y: Math.max(40, Math.min(window.innerHeight - 80,    ev.clientY - startY)),
    });
    const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup",   onUp);
  };

  const handleResizeStart = (e) => {
    e.preventDefault(); e.stopPropagation();
    const sx=e.clientX, sy=e.clientY, sw=size.w, sh=size.h;
    const onMove = (ev) => setSize({
      w: Math.max(320, Math.min(window.innerWidth  - pos.x - 10, sw + ev.clientX - sx)),
      h: Math.max(280, Math.min(window.innerHeight - pos.y - 10, sh + ev.clientY - sy)),
    });
    const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup",   onUp);
  };

  // Top-left resize grip (5 Jul, user request): the bottom-right grip is
  // unreachable when the panel sits at the bottom/right screen edge. This one
  // resizes from the opposite corner — the bottom-right corner stays anchored,
  // so position shifts as size changes.
  const handleResizeStartTL = (e) => {
    e.preventDefault(); e.stopPropagation();
    const sx=e.clientX, sy=e.clientY, sw=size.w, sh=size.h, spx=pos.x, spy=pos.y;
    const onMove = (ev) => {
      const w = Math.max(320, Math.min(spx + sw - 8, sw - (ev.clientX - sx)));
      const h = Math.max(280, Math.min(spy + sh - 8, sh - (ev.clientY - sy)));
      setSize({ w, h });
      setPos({ x: spx + (sw - w), y: spy + (sh - h) });
    };
    const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup",   onUp);
  };

  if (!isOpen) return null;

  // Rendered via portal into <body> (5 Jul fix): the Advisory instance sits
  // INSIDE the scaled #scale-root wrapper, where transform:scale makes
  // position:fixed anchor to the wrapper instead of the viewport — user-reported
  // symptom: an "invisible wall" stopping the panel from being dragged to the
  // right side of the window (the wall = the wrapper's design-space edge).
  // Portaling the DOM node to <body> keeps it outside the transform from any
  // mount point, so drag/clamp coordinates are true viewport px and the panel
  // renders unscaled — same pattern as GlobalAIChat.
  return ReactDOM.createPortal(
    <div style={{ position:"fixed", top:pos.y, left:pos.x, zIndex:480, width:size.w, height:size.h }}>
    {/* Inner wrapper zooms the content; width/height divided by zoom so the

    </div>,
